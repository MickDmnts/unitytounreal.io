id:"cpp", icon:"⟬⟭", title:"C++ for Unreal", blurb:"Modern C++ as Unreal actually uses it — headers, pointers, reflection macros, delegates and the build system, translated from C#.",
chapters:[
{id:"cpp1", t:"From C# to C++", skills:["Explain headers & the build model","Use pointers & references correctly","Reason about stack vs heap & ownership"], lessons:[
{id:"cpp1a", t:"Headers, cpp files & the build model", min:7,
body:`<p>C# compiles a project as one happy family: every class sees every other class, no declarations needed. C++ compiles each <code>.cpp</code> <em>in isolation</em> (a "translation unit"), so each file must be told what exists — via <strong>#include</strong> of <strong>header files</strong>. Hence the split you'll live with: <code>MyActor.h</code> declares the class (the promise), <code>MyActor.cpp</code> defines the bodies (the delivery).</p>
<p>Two survival rules. One: headers get included into many files, so keep them lean — in headers, prefer a <strong>forward declaration</strong> (<code>class UCameraComponent;</code>) when you only use pointers/references to a type, and #include the full header in the .cpp. This slashes compile times and breaks circular includes, the C++ version of assembly-definition cycles. Two: every Unreal header starts with <code>#pragma once</code> (include guard) and your class's generated include (<code>MyActor.generated.h</code>) must be the <em>last</em> include in the file.</p>`,
code:`<span class="cm">// MyActor.h — the promise</span>
<span class="kw">#pragma once</span>
<span class="kw">#include</span> <span class="st">"GameFramework/Actor.h"</span>
<span class="kw">#include</span> <span class="st">"MyActor.generated.h"</span>  <span class="cm">// always last</span>

<span class="kw">class</span> UCameraComponent;              <span class="cm">// forward declaration</span>

<span class="mc">UCLASS</span>()
<span class="kw">class</span> AMyActor : <span class="kw">public</span> AActor {
    <span class="mc">GENERATED_BODY</span>()
    <span class="kw">void</span> DoThing();                   <span class="cm">// declared here…</span>
};

<span class="cm">// MyActor.cpp — the delivery</span>
<span class="kw">#include</span> <span class="st">"MyActor.h"</span>
<span class="kw">#include</span> <span class="st">"Camera/CameraComponent.h"</span> <span class="cm">// full include only where used</span>
<span class="kw">void</span> AMyActor::DoThing() { <span class="cm">/* …defined here */</span> }`,
cmp:[["One .cs file per class, no declarations","Header (.h) declaration + source (.cpp) definition"],["using UnityEngine;","#include specific headers"],["Assembly definition cycles","Circular includes|solved by forward declarations"],["Roslyn compiles the project as a whole","Each .cpp compiles alone, then links"]],
task:"Create a C++ Actor from the editor (Tools → New C++ Class) and study the generated .h/.cpp pair; identify the generated.h include and the UCLASS macro.",
quiz:[
{q:"Why do headers exist at all?",o:["Tradition","Each .cpp compiles in isolation and must be told what types exist","They're faster than .cpp","They hold assets"],a:1,x:"Translation units see nothing by default; #include pastes declarations in."},
{q:"In a header you use UCameraComponent* as a member. You should…",o:["#include the camera header there","Forward-declare in the .h, include fully in the .cpp","Use void*","Avoid pointers"],a:1,x:"Pointers/references only need the name; keep headers lean."},
{q:"MyActor.generated.h must be…",o:["First include","Anywhere","The last include in the header","In the .cpp only"],a:2,x:"UHT-generated code depends on everything above it — always last."}]},
{id:"cpp1b", t:"Pointers & references", min:8,
body:`<p>In C#, every class variable is secretly a reference; you never think about it. C++ makes the choice explicit, and Unreal code uses three flavours constantly. A <strong>pointer</strong> <code>AActor* Target</code> holds an address, can be <code>nullptr</code>, can be reseated; access members with <code>-></code>. A <strong>reference</strong> <code>AActor& A</code> is an alias that can never be null and never reseated — think of it as C#'s guarantee, made explicit. A plain <strong>value</strong> <code>FVector V</code> is a full copy (C# struct semantics).</p>
<p>Parameter-passing idioms you'll write daily: pass big read-only things as <strong>const reference</strong> — <code>const FVector&amp; Location</code> ≈ "borrow, don't copy, don't modify" (C# <code>in</code>); pass outputs as non-const reference (C# <code>out/ref</code>); pass "maybe an object" as a pointer. <strong>const</strong> is a real compiler-enforced contract, sprinkled everywhere: <code>const</code> methods promise not to mutate the object.</p>
<p>Null discipline: Unreal's <code>IsValid(Ptr)</code> beats a raw <code>Ptr != nullptr</code> for UObjects because it also checks <em>pending-kill</em> — the engine's equivalent of Unity's destroyed-but-not-null fake objects, except here checking is opt-in, not overloaded <code>==</code> magic.</p>`,
code:`<span class="kw">void</span> Fire(<span class="kw">const</span> FVector& Origin,      <span class="cm">// borrow, read-only  (≈ in)</span>
          FHitResult& OutHit,           <span class="cm">// caller's variable   (≈ out)</span>
          AActor* OptionalIgnored)      <span class="cm">// may be nullptr</span>
{
    <span class="kw">if</span> (IsValid(OptionalIgnored)) { <span class="cm">/* safe UObject check */</span> }
}`,
cmp:[["Class variables (implicit references)","T* pointers|explicit, nullable, use ->"],["struct copies","Value types (FVector, FRotator…)|copied unless passed by ref"],["in parameter","const T&"],["out / ref parameter","T& (non-const reference)"],["if (obj == null) with Unity's fake-null","if (IsValid(Ptr))|checks null AND pending-kill"]],
task:"Write a free function taking const FVector& and an FString& out-parameter that fills in a formatted description of the vector; call it from BeginPlay.",
quiz:[
{q:"const FVector& Location as a parameter means…",o:["Copy the vector","Borrow it read-only without copying","It can be null","It's static"],a:1,x:"Reference avoids the copy; const forbids mutation — the default for non-trivial read-only params."},
{q:"A reference (T&) differs from a pointer because it…",o:["Is slower","Cannot be null and cannot be reseated","Uses -> syntax","Only works on structs"],a:1,x:"References are guaranteed-valid aliases."},
{q:"For UObject pointers, prefer IsValid(Ptr) because…",o:["It's shorter","It also detects pending-kill (destroyed) objects","nullptr checks crash","It garbage collects"],a:1,x:"Like Unity's destroyed-object problem, but you check explicitly."}]},
{id:"cpp1c", t:"Memory, stack & ownership", min:8,
body:`<p>The scary part of C++ is "manual memory management." Here's the relief: <strong>in Unreal gameplay code you almost never call new/delete.</strong> Three territories: (1) <strong>Stack</strong> — locals like <code>FVector V;</code> live in the function frame and vanish at scope end; free and instant; most math/struct types live here. (2) <strong>UObjects</strong> (Actors, components, anything UCLASS) — created via engine factories (<code>SpawnActor</code>, <code>NewObject</code>, <code>CreateDefaultSubobject</code>) and <em>garbage collected</em>, just like C#… with one condition: the GC only sees references stored in <code>UPROPERTY</code> fields or engine containers. A raw C++ pointer to a UObject is invisible to GC — the object under it can be collected. Mark it <code>UPROPERTY()</code> (or use <code>TWeakObjectPtr</code> for non-owning). (3) <strong>Non-UObject heap data</strong> — owned by smart pointers: <code>TUniquePtr</code> (single owner), <code>TSharedPtr</code> (ref-counted). RAII means destruction is deterministic — the origin of C#'s <code>using</code>, but pervasive.</p>
<p>So the C# habit "assign to a field and forget" survives — as long as the field is a UPROPERTY. That macro is not decoration; it's a lifetime contract.</p>`,
cmp:[["GC handles everything","GC handles UObjects — only via UPROPERTY-visible refs"],["new MyClass() for plain classes","TUniquePtr / TSharedPtr / MakeShared|RAII ownership"],["struct on the stack (kind of)","True stack locals|deterministic, free"],["using / IDisposable","RAII destructors|automatic at scope exit"],["WeakReference","TWeakObjectPtr|non-owning UObject pointer"]],
task:"In a test Actor, store a spawned Actor in (a) a raw member pointer and (b) a UPROPERTY() pointer; add a comment explaining which one the GC can see and why.",
quiz:[
{q:"Unreal UObjects are freed by…",o:["delete calls you write","Garbage collection, tracking UPROPERTY references","Reference counting always","The level"],a:1,x:"UObjects are GC'd; UPROPERTY is how the collector sees your reference."},
{q:"A raw (non-UPROPERTY) member pointer to a UObject risks…",o:["Compile errors","The object being GC'd underneath it","Memory leaks","Slow access"],a:1,x:"GC can't see it, so the target may be collected — the classic Unreal dangling pointer."},
{q:"For a plain C++ helper object with one owner, use…",o:["new/delete","TUniquePtr","UPROPERTY","static"],a:1,x:"Unique ownership, auto-destroyed — modern C++ default."}]}
]},
{id:"cpp2", t:"Unreal C++ Core: Reflection & Types", skills:["Use UCLASS/UPROPERTY/UFUNCTION","Explain the reflection system","Pick FString vs FName vs FText","Use TArray/TMap/TSet"], lessons:[
{id:"cpp2a", t:"UCLASS, UPROPERTY, UFUNCTION & reflection", min:8,
body:`<p>C# has reflection built into the runtime; C++ has none. Unreal builds its own: the <strong>Unreal Header Tool (UHT)</strong> scans your headers before compilation and generates metadata code for anything you mark with its macros. That metadata powers everything you took for granted in Unity: the Details panel, serialization, Blueprint exposure, networking, and GC.</p>
<p>The trinity: <strong>UCLASS()</strong> on the class (plus <code>GENERATED_BODY()</code> inside) registers the type. <strong>UPROPERTY(...)</strong> on fields — with specifiers replacing Unity attributes: <code>EditAnywhere</code> ≈ serialized-and-editable, <code>VisibleAnywhere</code> ≈ shown read-only, <code>BlueprintReadWrite</code> exposes to BP graphs, <code>Category="Combat"</code> groups the Details panel. <strong>UFUNCTION(...)</strong> on methods: <code>BlueprintCallable</code> makes it a BP node; <code>BlueprintPure</code> ≈ a no-exec getter node.</p>
<p>Mental model: <em>the macros are Unity's [SerializeField]/[Header]/public-method-magic — but explicit, and mandatory for engine visibility.</em> Unmarked members are invisible to editor, GC and Blueprint: private in the deepest sense.</p>`,
code:`<span class="mc">UCLASS</span>()
<span class="kw">class</span> AWeapon : <span class="kw">public</span> AActor {
    <span class="mc">GENERATED_BODY</span>()

    <span class="mc">UPROPERTY</span>(EditAnywhere, BlueprintReadWrite, Category=<span class="st">"Combat"</span>)
    <span class="kw">float</span> Damage = 25.f;              <span class="cm">// [SerializeField] + inspector edit</span>

    <span class="mc">UFUNCTION</span>(BlueprintCallable, Category=<span class="st">"Combat"</span>)
    <span class="kw">void</span> Fire();                      <span class="cm">// callable node in Blueprint</span>

    <span class="mc">UFUNCTION</span>(BlueprintPure)
    <span class="kw">float</span> GetDPS() <span class="kw">const</span>;             <span class="cm">// pure getter node</span>
};`,
cmp:[["[SerializeField] float dmg;","UPROPERTY(EditAnywhere) float Damage;"],["[Header('Combat')]","Category=\"Combat\""],["public method visible to UnityEvents","UFUNCTION(BlueprintCallable)"],["C# runtime reflection","UHT-generated reflection|build-time code generation"],["[HideInInspector] public","UPROPERTY() with no Edit/Visible specifier|GC-visible, editor-hidden"]],

{id:"cpp2b", t:"Strings & core types: FString, FName, FText", min:6,
body:`<p>C# has one <code>string</code>; Unreal deliberately has three. <strong>FString</strong> — mutable working string; concatenation, parsing, <code>FString::Printf(TEXT("HP: %f"), HP)</code> ≈ <code>$"HP: {hp}"</code>. <strong>FName</strong> — immutable, case-insensitive, <em>interned</em> identifier: comparisons are integer-fast; used for asset names, bones, sockets, tags, DataTable rows. Nearest Unity concept: the string IDs you hash with <code>Animator.StringToHash</code> — built into the type system. <strong>FText</strong> — display text for humans: localization-aware, the only correct type for UI. Rule: <em>identity → FName, computation → FString, screen → FText.</em></p>
<p>Also meet the primitive conventions: <code>int32/uint8</code> instead of int/byte (sizes guaranteed), <code>float</code> widely used, and the <code>TEXT("...")</code> macro wrapping every literal (wide-char correctness). Prefix decoder while reading engine code: <code>A</code>ctor classes, <code>U</code>Objects, <code>F</code> plain structs/classes, <code>E</code>nums, <code>I</code>nterfaces, <code>T</code>emplates, and <code>b</code>Boolean fields.</p>`,

{id:"cpp2c", t:"Containers: TArray, TMap, TSet", min:6,
body:`<p>Direct swaps for your daily C# collections, with UHT-friendly powers: <strong>TArray&lt;T&gt;</strong> ≈ <code>List&lt;T&gt;</code> (<code>Add, Num()</code> ≈ Count, <code>Contains</code>, range-for works); <strong>TMap&lt;K,V&gt;</strong> ≈ <code>Dictionary</code> — note <code>Find</code> returns a <em>pointer</em> (nullptr if missing) rather than TryGetValue's bool+out; <strong>TSet&lt;T&gt;</strong> ≈ <code>HashSet</code>. All three can be UPROPERTYs: editable in Details, serialized, GC-tracked element pointers — the thing Unity's Dictionary famously couldn't do (no inspector, no serialization).</p>
<p>Performance habits transfer: <code>Reserve(N)</code> ≈ Capacity to avoid re-allocations; <code>RemoveAtSwap</code> for order-irrelevant O(1) removal; iterate by <code>const T&</code> to avoid copies. For fixed sets of options, <code>UENUM(BlueprintType)</code> enums join the reflection party and appear as dropdowns.</p>`,

{id:"cpp3", t:"OOP the Unreal Way", skills:["Override virtuals with Super calls","Build UINTERFACEs","Declare & bind delegates"], lessons:[
{id:"cpp3a", t:"Inheritance & virtual functions", min:7,
body:`<p>C# made you write <code>virtual</code>/<code>override</code>; C++ is the language that invented the pattern, with two differences. First, methods are non-virtual by default and there's no <code>new</code>-style hiding safety net — Unreal code marks overrides with the <code>override</code> keyword (do it always; it turns typos into compile errors). Second, and critically: <strong>base calls are not automatic and not optional in spirit.</strong> When you override <code>BeginPlay</code>, <code>Tick</code>, or any engine virtual, call <code>Super::BeginPlay()</code> — Unreal's <code>base.Method()</code> — or the engine's own setup silently doesn't run. Forgotten Super calls are a top-3 newcomer bug.</p>
<p>C++ has multiple inheritance; Unreal restricts you to <em>one UCLASS base</em> plus any number of interfaces — exactly the C# rule, enforced by convention. Constructors differ from Unity too: a UObject constructor runs for the <strong>Class Default Object</strong> at startup, not per-spawn gameplay setup — treat it like serialized-field initialization, and keep gameplay logic in BeginPlay (full story in Chapter 4).</p>`,
code:`<span class="kw">void</span> AMyActor::BeginPlay()
{
    Super::BeginPlay();      <span class="cm">// ≈ base.BeginPlay() — NEVER forget</span>
    <span class="cm">// your setup here</span>
}`,
cmp:[["override keyword (mandatory)","override keyword (optional but always use it)"],["base.Method()","Super::Method()|forgetting it breaks engine behaviour"],["Single class + interfaces","Same rule for UCLASSes"],["Awake/constructor confusion","Constructor = CDO setup; BeginPlay = gameplay setup"]],
task:"Override Tick in your C++ Actor, deliberately remove the Super::Tick call, note nothing visibly breaks — then write a comment explaining why it's still wrong (parent tick logic, plugins, future-proofing).",
quiz:[
{q:"Overriding BeginPlay without calling Super::BeginPlay()…",o:["Won't compile","Compiles but skips engine/base setup — a classic bug","Is recommended","Only matters in Blueprints"],a:1,x:"The engine relies on its base implementations running."},
{q:"Unreal's equivalent of base.TakeDamage() is…",o:["parent::TakeDamage()","Super::TakeDamage()","this->TakeDamage()","Base()"],a:1,x:"Super is a typedef for the parent class."},
{q:"UObject constructors are best used for…",o:["Spawning actors","Default values & CreateDefaultSubobject — CDO setup","Input binding","Loading levels"],a:1,x:"They run for the Class Default Object; gameplay init belongs in BeginPlay."}]},
{id:"cpp3b", t:"Interfaces in C++ (UINTERFACE)", min:6,
body:`<p>A C# interface is one keyword. An Unreal C++ interface is a two-part ritual: a tiny <code>UINTERFACE</code> UObject stub (reflection bookkeeping — ignore it) and the real <code>IInteractable</code> class holding the functions. Implement by inheriting <code>public IInteractable</code> alongside your UCLASS base.</p>
<p>The payoff is the same duck-typed superpower you met in Blueprints: check with <code>Ptr->Implements&lt;UInteractable&gt;()</code>, and — for BlueprintNativeEvent interface functions — call through <code>IInteractable::Execute_Interact(TargetActor, Instigator)</code>, which works whether the implementer is C++ or a Blueprint. That Execute_ prefix looks odd but it's what makes one interface span both worlds.</p>
<p>Design guidance carries over from C#: interfaces for capabilities (Damageable, Interactable, Saveable), base classes for shared implementation.</p>`,
code:`<span class="mc">UINTERFACE</span>(MinimalAPI, Blueprintable)
<span class="kw">class</span> UInteractable : <span class="kw">public</span> UInterface { <span class="mc">GENERATED_BODY</span>() };

<span class="kw">class</span> IInteractable {                <span class="cm">// the real interface</span>
    <span class="mc">GENERATED_BODY</span>()
<span class="kw">public</span>:
    <span class="mc">UFUNCTION</span>(BlueprintNativeEvent)
    <span class="kw">void</span> Interact(AActor* Instigator);
};

<span class="cm">// usage</span>
<span class="kw">if</span> (Hit->Implements<UInteractable>())
    IInteractable::Execute_Interact(Hit, <span class="kw">this</span>);`,
cmp:[["interface IInteractable {}","UINTERFACE stub + IInteractable class pair"],["obj is IInteractable","Ptr->Implements<UInteractable>()"],["((IInteractable)obj).Interact()","IInteractable::Execute_Interact(Obj, ...)|works for BP implementers too"]],
task:"Convert your Blueprint interaction system (Ch.5 of the Unreal path) to a C++ UINTERFACE, keeping the door Blueprint as an implementer — prove Execute_ reaches BP.",
quiz:[
{q:"Why two classes per Unreal interface?",o:["Legacy typo","The U-stub is reflection bookkeeping; the I-class is the real interface","Multiple inheritance","One is for structs"],a:1,x:"UINTERFACE registers with reflection; you implement and call via the I-side."},
{q:"Calling interface functions via Execute_ matters because…",o:["It's faster","It dispatches correctly to Blueprint implementers as well","It avoids Super","It compiles headers"],a:1,x:"Direct virtual calls would miss BP implementations."},
{q:"C#'s 'obj is IDamageable' becomes…",o:["Cast<IDamageable>","Ptr->Implements<UDamageable>()","dynamic_cast only","IsA<FDamageable>"],a:1,x:"Reflection-aware capability check."}]},
{id:"cpp3c", t:"Delegates: events, evolved", min:7,
body:`<p>C# events are delegates; Unreal reimplements the idea as a small zoo, declared with macros. The two you'll use daily: <strong>DECLARE_DYNAMIC_MULTICAST_DELEGATE_*</strong> — serializable, Blueprint-assignable (this is what an Event Dispatcher is under the hood), bind with <code>AddDynamic(this, &AMyActor::OnThing)</code>; and plain <strong>DECLARE_MULTICAST_DELEGATE_*</strong> — faster, C++-only, binds lambdas and raw methods. "Multicast" = many listeners, broadcast with <code>.Broadcast(args)</code> — precisely <code>event Action&lt;T&gt;</code> + <code>Invoke</code>.</p>
<p>The engine speaks delegate fluently: <code>OnComponentBeginOverlap.AddDynamic(...)</code> replaces Unity's magic-named <code>OnTriggerEnter</code> — instead of the engine finding your method by name, <em>you subscribe explicitly</em>. Same for timers: <code>GetWorldTimerManager().SetTimer(Handle, this, &A::Fn, 2.f, true)</code> ≈ <code>InvokeRepeating</code>, with a handle you can cancel — and it's the standard replacement for simple time-based coroutines.</p>`,
code:`<span class="cm">// declare (usually above the class)</span>
<span class="mc">DECLARE_DYNAMIC_MULTICAST_DELEGATE_OneParam</span>(FOnHealthChanged, <span class="kw">float</span>, NewHealth);

<span class="mc">UPROPERTY</span>(BlueprintAssignable)      <span class="cm">// shows up as an Event Dispatcher</span>
FOnHealthChanged OnHealthChanged;

OnHealthChanged.Broadcast(Health);  <span class="cm">// ≈ OnHealthChanged?.Invoke(health)</span>

<span class="cm">// engine events: subscribe explicitly, no magic names</span>
Trigger->OnComponentBeginOverlap.AddDynamic(<span class="kw">this</span>, &AMyActor::OnOverlap);`,
cmp:[["event Action<float> OnHealthChanged","DECLARE_DYNAMIC_MULTICAST_DELEGATE_OneParam + UPROPERTY(BlueprintAssignable)"],["OnHealthChanged?.Invoke(h)",".Broadcast(h)"],["+= handler","AddDynamic / AddUObject / AddLambda"],["Magic OnTriggerEnter method","Explicit AddDynamic to OnComponentBeginOverlap"],["InvokeRepeating / simple wait-coroutines","TimerManager SetTimer with a handle"]],
task:"Add an OnHealthChanged dynamic multicast delegate to a C++ health component, broadcast it on damage, and bind a Blueprint event to it that updates a Print String 'health bar'.",
quiz:[
{q:"An Event Dispatcher in Blueprint is, in C++ terms,…",o:["A UFUNCTION","A dynamic multicast delegate marked BlueprintAssignable","A timer","An interface"],a:1,x:"Same mechanism, two faces."},
{q:"Unity finds OnTriggerEnter by method name. Unreal instead…",o:["Uses the same magic names","Has you explicitly AddDynamic to the component's overlap delegate","Polls in Tick","Uses SendMessage"],a:1,x:"Explicit subscription — nothing happens unless you bind."},
{q:"Dynamic vs non-dynamic delegates: dynamic ones…",o:["Are faster","Support Blueprint binding & serialization at some speed cost","Can't multicast","Are deprecated"],a:1,x:"Dynamic = reflection-based (BP-friendly); plain = faster C++-only."}]}
]},
{id:"cpp4", t:"Actors & Components in C++", skills:["Explain the Actor lifecycle","Create components in constructors","Replace coroutines with timers/Timelines"], lessons:[
{id:"cpp4a", t:"The Actor lifecycle", min:7,
body:`<p>Unity's ritual order — Awake → OnEnable → Start → Update → OnDestroy — maps to a subtly different pipeline, with one big trap. The pipeline: <strong>Constructor</strong> (runs once for the Class Default Object at engine startup, and per-instance <em>before</em> properties load) → <strong>PostInitializeComponents</strong> (components exist; ≈ late-Awake) → <strong>BeginPlay</strong> (world is live; ≈ Start) → <strong>Tick(DeltaTime)</strong> (≈ Update) → <strong>EndPlay(Reason)</strong> (≈ OnDestroy/OnDisable, with a reason enum: destroyed, level change, PIE ended).</p>
<p>The trap: <em>the constructor is not Awake.</em> Editor-set values aren't loaded yet, the world may not exist, and it also runs for the CDO. Constructor = create default subobjects and set defaults, nothing else. Gameplay setup, GetWorld() calls, spawning, timers → BeginPlay.</p>
<p>The second trap you met in the performance lesson: C++ Actors default to <code>PrimaryActorTick.bCanEverTick = true</code> in generated templates — turn it off unless you truly tick.</p>`,
cmp:[["Awake()","Constructor (CDO caveat) + PostInitializeComponents"],["Start()","BeginPlay()"],["Update()","Tick(float DeltaSeconds)"],["FixedUpdate()","Tick of physics via substepping / async physics tick|no direct twin"],["OnDestroy()","EndPlay(EEndPlayReason)|tells you WHY it's ending"]],
diagTitle:"Actor lifetime pipeline",diag:["Constructor|CDO + instance defaults","PostInitComponents|components ready","BeginPlay|world is live","Tick|per frame (opt-in!)","EndPlay|with a reason"],
task:"Log a message from Constructor, BeginPlay and EndPlay in a C++ Actor; run PIE and observe the constructor firing earlier (and more often) than you'd expect.",
quiz:[
{q:"Editor-edited property values are reliably available in…",o:["The constructor","BeginPlay (and PostInitializeComponents)","Static init","Never"],a:1,x:"The constructor runs before serialized properties are applied."},
{q:"EndPlay improves on OnDestroy by…",o:["Running earlier","Providing the reason (destroyed / level change / quit)","Being optional","Being static"],a:1,x:"Branch cleanup on why the actor is leaving the world."},
{q:"Why must constructors avoid gameplay logic?",o:["Too slow","They run for the CDO and before the world/properties exist","They can't call functions","They're deprecated"],a:1,x:"CDO + pre-load timing makes them defaults-only territory."}]},
{id:"cpp4b", t:"Building Actors: components in C++", min:6,
body:`<p>Assembling an Actor in C++ is what the Blueprint components panel does, in code — and it happens in the constructor with <strong>CreateDefaultSubobject</strong>. Create each component, attach scene components with <code>SetupAttachment</code>, pick a root. These become the inherited components every Blueprint child sees.</p>
<p>Runtime addition exists too (<code>NewObject</code> + <code>RegisterComponent</code>) but is the exception, mirroring how <code>AddComponent</code> at runtime is rarer than prefab-authored components in mature Unity code.</p>`,
code:`AWeapon::AWeapon()
{
    Root = CreateDefaultSubobject<USceneComponent>(TEXT(<span class="st">"Root"</span>));
    SetRootComponent(Root);

    Mesh = CreateDefaultSubobject<UStaticMeshComponent>(TEXT(<span class="st">"Mesh"</span>));
    Mesh->SetupAttachment(Root);          <span class="cm">// ≈ transform.SetParent</span>

    Muzzle = CreateDefaultSubobject<USceneComponent>(TEXT(<span class="st">"Muzzle"</span>));
    Muzzle->SetupAttachment(Mesh);
}`,
cmp:[["Authoring components on a prefab","CreateDefaultSubobject in the constructor"],["transform.SetParent(parent)","SetupAttachment(Parent)|constructor-time"],["AddComponent<T>() at runtime","NewObject<T>() + RegisterComponent()|rarer"],["Attach to bone via code","SetupAttachment(Mesh, TEXT(\"SocketName\"))|sockets ≈ named attach points"]],
task:"Create AWeapon in C++ with root + static mesh + muzzle scene component; make a Blueprint child, assign a mesh asset in the BP, and place it in the level.",
quiz:[
{q:"Default components are created in…",o:["BeginPlay","The constructor via CreateDefaultSubobject","Tick","The Level BP"],a:1,x:"Constructor-created subobjects become the class's default component set."},
{q:"SetupAttachment corresponds to…",o:["Destroy","Parenting a transform under another","Casting","Possession"],a:1,x:"Builds the scene component tree."},
{q:"A socket on a mesh is most like Unity's…",o:["Layer","Named empty child transform on a rig for attachments","Tag","Anchor preset"],a:1,x:"Author attach points on the mesh, attach components/actors to them by FName."}]},
{id:"cpp4c", t:"Coroutines → Timers & Timelines", min:6,
body:`<p>The question every Unity dev asks by day two: <em>where are my coroutines?</em> Standard answer: they don't exist, and most uses decompose into better-named tools. Delay then act → <strong>Timer</strong> (<code>SetTimer</code>, once or looping, cancellable via handle). Animate a value over time → <strong>Timeline</strong> component (Blueprint's curve-driven darling; in C++, an FTimeline or a small lerp in Tick). Wait for a condition → bind to the <strong>delegate</strong> that fires when the condition changes (the event-driven refactor your coroutine was avoiding). Sequenced cinematic logic → the <strong>Sequencer</strong>. Latent multi-frame flow in Blueprints exists natively (Delay nodes are 'coroutines' visually).</p>
<p>Modern escape hatch: UE5 coroutines exist via C++20 in some plugins, but idiomatic Unreal remains timers + events. The mental rewrite: a coroutine was a state machine in disguise; Unreal asks you to name the states.</p>`,
cmp:[["yield return new WaitForSeconds(2)","SetTimer(Handle, this, &A::Fn, 2.f)"],["Value-lerping coroutine","Timeline (curve → update event)"],["yield return null loops (poll)","Bind a delegate; act when the event fires"],["StopCoroutine","ClearTimer(Handle)"],["Cutscene coroutine chains","Sequencer"]],
task:"Recreate this Unity pattern in C++: on BeginPlay wait 2 seconds, then start a repeating action every 0.5s, and stop it after 10 ticks via the handle.",
quiz:[
{q:"WaitForSeconds(3) then fire once →",o:["Tick counting","SetTimer with 3s, bLoop=false","Thread sleep","Delay node in C++"],a:1,x:"One-shot timer with a handle."},
{q:"Smoothly animating a door's rotation over 1.5s is idiomatic with…",o:["A while loop","A Timeline (curve-driven) or lerp in a bounded Tick","A coroutine plugin","Physics"],a:1,x:"Timelines are curve → callback per frame — designer-tunable."},
{q:"A coroutine that polls 'until enemy is dead' should become…",o:["A looping timer that checks","Binding to an OnDied delegate","A Tick check","Both A and C are ideal"],a:1,x:"Event-driven beats polling; broadcast death, react."}]}
]},
{id:"cpp5", t:"The Build System", skills:["Read a Build.cs","Add module dependencies","Use Live Coding safely"], lessons:[
{id:"cpp5a", t:"Modules & Build.cs", min:6,
body:`<p>Unity hides compilation behind asmdefs; Unreal exposes it. Code lives in <strong>modules</strong> — a folder with a <code>[Name].Build.cs</code> file (C# file, ironically) declaring dependencies. Your game starts as one module; the engine is hundreds. When the compiler says <em>unresolved external symbol</em> for an engine type, the fix is usually adding that type's module to <code>PublicDependencyModuleNames</code> in Build.cs — e.g. <code>"EnhancedInput"</code>, <code>"UMG"</code>, <code>"AIModule"</code>. This is exactly adding an asmdef reference, or a package to a manifest.</p>
<p><strong>UnrealBuildTool (UBT)</strong> orchestrates: runs UHT for reflection codegen, compiles modules, links. The <code>.uproject</code> + <code>.uplugin</code> files list modules; <strong>Public/</strong> headers in a module are its API surface, <strong>Private/</strong> is internal — the same public/internal discipline asmdefs encourage.</p>`,
code:`<span class="cm">// MyGame.Build.cs</span>
PublicDependencyModuleNames.AddRange(<span class="kw">new</span> <span class="kw">string</span>[] {
    <span class="st">"Core"</span>, <span class="st">"CoreUObject"</span>, <span class="st">"Engine"</span>, <span class="st">"InputCore"</span>,
    <span class="st">"EnhancedInput"</span>   <span class="cm">// ← added to use Enhanced Input in C++</span>
});`,
cmp:[["Assembly Definition (.asmdef)","Module + Build.cs"],["asmdef references / packages","PublicDependencyModuleNames"],["internal vs public APIs","Private/ vs Public/ header folders"],["Unity's invisible compile pipeline","UBT + UHT|explicit, configurable"]],
task:"Add \"EnhancedInput\" to your Build.cs dependencies, regenerate project files, and include an Enhanced Input header in a class to prove linkage.",
quiz:[
{q:"'Unresolved external symbol UInputAction' usually means…",o:["Bad C++","Missing module in Build.cs dependencies","Broken editor","Wrong UE version"],a:1,x:"The linker can't find the module — declare the dependency."},
{q:"Build.cs is closest to Unity's…",o:["ProjectSettings","Assembly Definition + its references","Player settings","Manifest.json alone"],a:1,x:"Per-module compilation unit with explicit dependencies."},
{q:"UHT runs…",o:["After linking","Before compilation, generating reflection code","At runtime","Only for Blueprints"],a:1,x:"Codegen first; the compiler then consumes .generated files."}]},
{id:"cpp5b", t:"Compile workflow & Live Coding", min:6,
body:`<p>Unity's edit → auto-recompile → domain reload loop becomes: edit in your IDE (Rider or VS; Rider is the community favourite) → <strong>Ctrl+Alt+F11 Live Coding</strong> patches function bodies into the running editor in seconds. The rules of the game: Live Coding is great for <em>logic changes inside functions</em>; for <strong>header changes</strong> (new UPROPERTY/UFUNCTION, new members) close the editor and rebuild — patching structural changes corrupts Blueprints in subtle ways. Respect this rule and C++ iteration feels close to C# iteration.</p>
<p>Workflow habits that pay: keep the editor closed for big refactors; build the <em>Development Editor</em> configuration; when things get weird, delete Binaries/ + Intermediate/ and regenerate project files (the "reimport Library" ritual). And embrace logging: <code>UE_LOG(LogTemp, Warning, TEXT("HP: %f"), HP)</code> ≈ <code>Debug.LogWarning($"...")</code>, plus on-screen <code>GEngine->AddOnScreenDebugMessage</code>.</p>`,
cmp:[["Save file → Unity recompiles + domain reload","Live Coding patch (Ctrl+Alt+F11)|function bodies only"],["Script change while playing","Live Coding works during PIE|same caveats"],["Debug.Log($\"HP {hp}\")","UE_LOG(LogTemp, Warning, TEXT(\"HP %f\"), HP)"],["Console window","Output Log + on-screen debug messages"],["Reimport / delete Library","Delete Binaries + Intermediate, regenerate projects"]],
task:"With PIE running, change a UE_LOG string in a function body and apply Live Coding; then add a new UPROPERTY and do it the right way — close, rebuild, reopen.",
quiz:[
{q:"Live Coding is safe for…",o:["Adding UPROPERTYs","Changing code inside function bodies","Renaming classes","Editing Build.cs"],a:1,x:"Structural/header changes need a full editor-closed rebuild."},
{q:"UE_LOG's closest Unity call is…",o:["print()","Debug.Log family with format strings","Console.Write","Assert"],a:1,x:"Category + verbosity + printf-style formatting."},
{q:"The 'delete Library folder' ritual translates to…",o:["Delete Content","Delete Binaries + Intermediate, regenerate project files","Delete Config","Reinstall engine"],a:1,x:"Generated build artifacts are disposable."}]}
]}
]},

id:"int", icon:"⚙", title:"Unreal + C++ Integration", blurb:"The professional workflow: C++ systems exposed to Blueprint content — spawning, input, collision, and a real mini-project.",
chapters:[
{id:"int1", t:"C++ ↔ Blueprint Workflow", skills:["Expose C++ to Blueprints","Choose Implementable vs Native events","Apply the C++ base / BP child pattern"], lessons:[
{id:"int1a", t:"The golden pattern: C++ base, Blueprint child", min:7,
body:`<p>Here's how professional Unreal teams actually split work, and it has no true Unity equivalent because Unity has one scripting layer. <strong>C++ defines the architecture</strong>: base classes, systems, performance-critical logic, data structures. <strong>Blueprint subclasses them for content</strong>: assigning meshes and sounds, tweaking numbers, scripting one-off feel. Your <code>AWeapon</code> C++ class holds Damage, FireRate, Fire() logic; <code>BP_Shotgun</code> and <code>BP_Sniper</code> are Blueprint children that set assets and values — designer-editable without touching code.</p>
<p>The nearest Unity analogy: a MonoBehaviour + a prefab with serialized fields tuned per prefab-variant — but here the "variant" is a real subclass that can also add logic. The rule of thumb Epic engineers repeat: <em>if it's a system, C++; if it's content or glue, Blueprint; expose the boundary deliberately with UPROPERTY/UFUNCTION.</em></p>
<p>Spawning respects the pattern: your C++ spawner exposes <code>TSubclassOf&lt;AWeapon&gt;</code> (a type-safe class reference ≈ a prefab slot restricted to AWeapon-derived) which designers fill with BP_Shotgun.</p>`,
cmp:[["MonoBehaviour + prefab variants tuning fields","C++ base class + Blueprint subclasses"],["public GameObject prefab slot","TSubclassOf<AWeapon>|type-restricted 'prefab' reference"],["One scripting layer for everything","Two deliberate layers: systems (C++) / content (BP)"]],
task:"Take your AWeapon C++ class, create BP_Pistol and BP_Rifle children with different meshes and Damage values, and spawn one via a TSubclassOf variable on a spawner Actor.",

{id:"int1b", t:"BlueprintImplementableEvent & NativeEvent", min:7,
body:`<p>Exposing C++ <em>to</em> Blueprint is UFUNCTION(BlueprintCallable). The reverse — C++ calling <em>into</em> Blueprint — is the magic Unity can't do, and it comes in two flavours. <strong>BlueprintImplementableEvent</strong>: declared in C++, implemented <em>only</em> in Blueprint; C++ calls <code>OnDeath()</code>, the BP child decides the explosion. No C++ body exists at all. <strong>BlueprintNativeEvent</strong>: C++ provides a default implementation (<code>OnDeath_Implementation()</code>), Blueprint <em>may</em> override — and can still call the parent, like base-method calls in C#.</p>
<p>This is the hook system that makes the golden pattern breathe: C++ drives the logic ("health hit zero"), Blueprint supplies the presentation ("play this montage, spawn this Niagara"). In Unity terms: imagine declaring an abstract method in a MonoBehaviour that a prefab could implement visually. There's no such thing — this is new power, use it constantly.</p>`,
code:`<span class="cm">// C++: declare hooks</span>
<span class="mc">UFUNCTION</span>(BlueprintImplementableEvent)      <span class="cm">// BP-only implementation</span>
<span class="kw">void</span> OnDeathFX();

<span class="mc">UFUNCTION</span>(BlueprintNativeEvent)             <span class="cm">// C++ default, BP may override</span>
<span class="kw">void</span> OnDamaged(<span class="kw">float</span> Amount);
<span class="kw">void</span> OnDamaged_Implementation(<span class="kw">float</span> Amount); <span class="cm">// the C++ default body</span>

<span class="cm">// C++ calls them; whoever implements, responds</span>
OnDamaged(25.f);  OnDeathFX();`,
cmp:[["No equivalent: script calling into prefab-authored logic","BlueprintImplementableEvent|C++ declares, BP implements"],["virtual method with default + override","BlueprintNativeEvent + _Implementation"],["UnityEvent assigned in Inspector as 'hook'","Closest spiritual cousin|but BIE is a real overridable function"]],
task:"Add OnDeathFX (ImplementableEvent) to your enemy C++ class, call it when health ≤ 0, and implement it in the BP child with a Niagara burst and sound.",
quiz:[
{q:"A function C++ declares but ONLY Blueprint implements is…",o:["BlueprintCallable","BlueprintImplementableEvent","BlueprintPure","virtual"],a:1,x:"C++ gets a callable hook with no body of its own."},
{q:"BlueprintNativeEvent requires the C++ body to be named…",o:["The same","FunctionName_Implementation","Super::FunctionName","Execute_FunctionName"],a:1,x:"The _Implementation suffix is the native default."},
{q:"The idiomatic division these hooks enable:",o:["BP logic, C++ visuals","C++ logic & state, BP presentation & feel","Everything in C++","Everything in BP"],a:1,x:"Gameplay truth in C++; juice in Blueprint."}]}
]},
{id:"int2", t:"Gameplay Systems in C++", skills:["Spawn & find actors from C++","Bind Enhanced Input in C++","Handle overlaps & hits in C++"], lessons:[
{id:"int2a", t:"Spawning, finding & world queries", min:7,
body:`<p><code>Instantiate</code> becomes <code>GetWorld()->SpawnActor&lt;AWeapon&gt;(WeaponClass, Location, Rotation)</code> — note it takes a <em>class</em> (usually a TSubclassOf filled with a BP child), not a scene object. Need to configure before BeginPlay fires? <code>SpawnActorDeferred</code> → set fields → <code>FinishSpawning</code>, replacing Unity's instantiate-inactive-then-activate trick. Destruction: <code>Actor->Destroy()</code>; there is no cross-scene <code>DontDestroyOnLoad</code> — persistent things belong to GameInstance or subsystems.</p>
<p>Finding things: <code>UGameplayStatics</code> is your static toolbox — <code>GetPlayerCharacter(this, 0)</code>, <code>GetAllActorsOfClass</code> (same Tick-crime warning as FindObjectsOfType), <code>GetGameMode</code>, plus utilities like <code>ApplyDamage</code>, <code>PlaySoundAtLocation</code>, <code>OpenLevel</code>. Almost every "static manager call" you made in Unity has a UGameplayStatics twin. For architecture-grade globals, meet <strong>Subsystems</strong> — engine-managed singletons scoped to GameInstance/World/LocalPlayer: declare a class, the engine instantiates and lifecycles it. It's the singleton pattern with the boilerplate deleted; prefer it over manager-Actors.</p>`,
code:`FActorSpawnParameters P;  P.Owner = <span class="kw">this</span>;
AWeapon* W = GetWorld()->SpawnActor<AWeapon>(WeaponClass, Loc, Rot, P);

ACharacter* Player = UGameplayStatics::GetPlayerCharacter(<span class="kw">this</span>, 0);
UMyScoreSubsystem* Score = GetGameInstance()->GetSubsystem<UMyScoreSubsystem>();`,
cmp:[["Instantiate(prefab, pos, rot)","GetWorld()->SpawnActor<T>(Class, Loc, Rot)"],["Instantiate inactive → configure → activate","SpawnActorDeferred → FinishSpawning"],["GameObject.FindObjectsOfType","UGameplayStatics::GetAllActorsOfClass|same perf sins"],["Camera.main / player singleton","UGameplayStatics::GetPlayerCharacter/Controller"],["Custom singleton managers","Subsystems|engine-managed, scoped, no boilerplate"]],

{q:"The modern home for a global score/audio/save manager is…",o:["A static class","A Subsystem (GameInstance/World scoped)","The Level BP","A component on the player"],a:1,x:"Declared once, engine handles creation and lifetime."}]},
{id:"int2b", t:"Enhanced Input in C++", min:6,
body:`<p>Same assets as the Blueprint lesson (IA + IMC) — only the binding moves to code. In <code>SetupPlayerInputComponent</code>, cast the input component to <code>UEnhancedInputComponent</code> and <code>BindAction(IA_Jump, ETriggerEvent::Started, this, &AMyChar::Jump)</code>. Add the mapping context through the local player's <strong>EnhancedInputLocalPlayerSubsystem</strong> (usually in BeginPlay or the PlayerController). The IA/IMC assets stay designer-owned UPROPERTYs — content in data, wiring in code: the golden pattern again.</p>
<p>Reading values: bound handlers receive <code>const FInputActionValue&</code>; call <code>Value.Get&lt;FVector2D&gt;()</code> for 2D axes — the typed replacement for ctx.ReadValue&lt;Vector2&gt;().</p>`,
code:`<span class="kw">void</span> AMyChar::SetupPlayerInputComponent(UInputComponent* IC)
{
    <span class="kw">auto</span>* EIC = CastChecked<UEnhancedInputComponent>(IC);
    EIC->BindAction(MoveAction, ETriggerEvent::Triggered, <span class="kw">this</span>, &AMyChar::Move);
    EIC->BindAction(JumpAction, ETriggerEvent::Started,   <span class="kw">this</span>, &ACharacter::Jump);
}
<span class="kw">void</span> AMyChar::Move(<span class="kw">const</span> FInputActionValue& V)
{
    <span class="kw">const</span> FVector2D Axis = V.Get<FVector2D>();   <span class="cm">// ≈ ctx.ReadValue<Vector2>()</span>
    AddMovementInput(GetActorForwardVector(), Axis.Y);
}`,
cmp:[["OnMove(InputAction.CallbackContext ctx)","Handler(const FInputActionValue&)"],["ctx.ReadValue<Vector2>()","Value.Get<FVector2D>()"],["actions.FindAction + performed +=","EnhancedInputComponent->BindAction(IA, TriggerEvent, this, &Fn)"],["PlayerInput component auto-wiring","Add IMC via EnhancedInputLocalPlayerSubsystem"]],
task:"Move the template's input bindings into C++: UPROPERTYs for the IA/IMC assets, BindAction calls in SetupPlayerInputComponent, context added in BeginPlay.",
quiz:[
{q:"Input bindings in a C++ Pawn go in…",o:["The constructor","SetupPlayerInputComponent","Tick","EndPlay"],a:1,x:"The engine calls it when input is (re)wired for possession."},
{q:"A 2D move axis arrives in the handler as…",o:["Two floats","FInputActionValue → Get<FVector2D>()","FVector always","A string"],a:1,x:"Typed extraction from the action value."},
{q:"The IA/IMC assets in this workflow are…",o:["Generated by C++","Designer-editable UPROPERTY references","Hardcoded paths","Deprecated"],a:1,x:"Data stays data; C++ binds behaviour to it."}]},
{id:"int2c", t:"Collision, overlaps & traces in C++", min:7,
body:`<p>Physics events complete the OnTriggerEnter translation from the delegates lesson. Recipe: give a component overlap enabled (<code>SetCollisionEnabled(QueryOnly)</code> ≈ isTrigger), then <code>AddDynamic</code> your handler to <code>OnComponentBeginOverlap</code> / <code>EndOverlap</code>; solid hits bind <code>OnComponentHit</code> (≈ OnCollisionEnter). The handler signature hands you the other actor and component directly — no <code>collision.gameObject</code> digging.</p>
<p>Raycasts: <code>GetWorld()->LineTraceSingleByChannel(OutHit, Start, End, ECC_Visibility, Params)</code> ≈ <code>Physics.Raycast</code>; sweeps by shape exist (<code>SweepSingleByChannel</code> ≈ SphereCast). Layers & LayerMask become <strong>collision channels + responses</strong> — a richer matrix where each object type chooses Block / Overlap / Ignore per channel, configured in Project Settings and per-component presets. 'Complex vs simple' collision replaces Mesh-vs-primitive collider choices.</p>`,
code:`Sphere->OnComponentBeginOverlap.AddDynamic(<span class="kw">this</span>, &APickup::OnOverlap);

<span class="kw">void</span> APickup::OnOverlap(UPrimitiveComponent* Comp, AActor* Other,
    UPrimitiveComponent* OtherComp, <span class="kw">int32</span> BodyIndex, <span class="kw">bool</span> bSweep,
    <span class="kw">const</span> FHitResult& Hit)
{
    <span class="kw">if</span> (Other && Other != GetOwner()) { <span class="cm">/* ≈ OnTriggerEnter(other) */</span> }
}

FHitResult HR;
<span class="kw">bool</span> bHit = GetWorld()->LineTraceSingleByChannel(HR, Start, End, ECC_Visibility);`,
cmp:[["Collider.isTrigger + OnTriggerEnter","QueryOnly collision + OnComponentBeginOverlap (AddDynamic)"],["OnCollisionEnter","OnComponentHit"],["Physics.Raycast(origin, dir, out hit)","LineTraceSingleByChannel(OutHit, Start, End, Channel)"],["Physics.SphereCast","SweepSingleByChannel with FCollisionShape"],["Layers + LayerMask matrix","Collision channels + Block/Overlap/Ignore responses"]],
task:"Build APickup in C++: sphere overlap destroys the pickup and broadcasts an OnCollected delegate. Bind a Blueprint to the delegate for the collect sound.",
quiz:[
{q:"Unity's isTrigger volume maps to collision enabled as…",o:["Physics Only","Query Only (overlaps, no blocking)","No Collision","Block All"],a:1,x:"Query = overlap/trace events without physical response."},
{q:"OnComponentHit fires when…",o:["Any overlap","Blocking (solid) collisions occur","Traces run","Tick runs"],a:1,x:"Hit = blocked contact; overlap = pass-through volume."},
{q:"LayerMask filtering becomes…",o:["Tags","Trace/collision channels with per-object responses","GameplayTags","Physics materials"],a:1,x:"Channels + response matrix, more expressive than layers."}]}
]},
{id:"int3", t:"Project: Putting It Together", skills:["Structure a hybrid project","Ship a full C++/BP feature","Plan your continued learning"], lessons:[
{id:"int3a", t:"Architecting a hybrid project", min:6,
body:`<p>A sane UE project layout, in Unity terms: <code>Source/MyGame/</code> holds the C++ "framework assembly" — your GameMode, Character, Subsystems, base classes for every content type (AWeaponBase, AEnemyBase, UItemData). <code>Content/</code> mirrors it with Blueprint children and assets, organized by feature (<code>Content/Weapons/</code>, <code>Content/Enemies/</code>) rather than by type — same debate as Unity, same modern answer.</p>
<p>Dependency rules that keep builds fast and sane: C++ never references Content (no hardcoded asset paths; use TSubclassOf/TSoftObjectPtr UPROPERTYs configured in BP or Data Assets); Blueprints reference C++ freely; heavy inter-BP references go through interfaces, tags, or soft refs. Naming conventions matter socially: <code>BP_</code>, <code>WBP_</code> (widgets), <code>M_</code>/<code>MI_</code> (materials), <code>IA_</code>/<code>IMC_</code>, <code>DA_</code> (data assets), <code>NS_</code> (Niagara) — your team reads the Content Browser by prefix.</p>`,
cmp:[["Core assembly + content referencing it","Source/ C++ module + Content/ BP children"],["Hardcoded Resources.Load paths (anti-pattern)","Also an anti-pattern|expose TSoftObjectPtr/TSubclassOf instead"],["Folder-by-feature debates","Same conclusion: by feature"],["Team naming conventions","BP_/WBP_/M_/MI_/DA_/NS_ prefixes|community-standard"]],
task:"Restructure your practice project: one C++ base per content type you have, folders by feature, correct asset prefixes throughout.",
quiz:[
{q:"C++ referencing Content assets by hardcoded path is…",o:["The standard","An anti-pattern — expose soft/class references as UPROPERTYs","Required for cooking","Faster"],a:1,x:"Data flows into code via reflected properties, not string paths."},
{q:"WBP_ prefixes mark…",o:["World BPs","UMG widget Blueprints","Physics assets","Wrapped BPs"],a:1,x:"Community convention; UI widgets in UMG."},
{q:"The dependency direction that keeps builds healthy:",o:["C++ → Content","Content (BP) → C++, never the reverse","Both ways","No references at all"],a:1,x:"Code defines contracts; content fills them."}]},
{id:"int3b", t:"Capstone: the pickup & inventory slice", min:9,
body:`<p>Time to prove the transition. Build this vertical slice using everything from all three paths — the spec is deliberately a Unity-familiar feature so you feel the translation end-to-end:</p>
<p><strong>1)</strong> <code>UItemData</code> (Primary Data Asset): Name (FText), Icon, MaxStack, GameplayTag category. <strong>2)</strong> <code>UInventoryComponent</code> (C++ UActorComponent): TArray of entries, AddItem/RemoveItem BlueprintCallable, OnInventoryChanged dynamic delegate. <strong>3)</strong> <code>APickupBase</code> (C++): sphere overlap → adds its DA_Item to the overlapping player's inventory → BlueprintImplementableEvent OnPickedUpFX → Destroy. <strong>4)</strong> BP children: BP_HealthPotion, BP_Coin with meshes and Niagara pickup bursts. <strong>5)</strong> An interact-driven chest using your UINTERFACE. <strong>6)</strong> Save/load the inventory through a USaveGame in your GameInstance. <strong>7)</strong> Bind IA_Interact via Enhanced Input in C++.</p>
<p>When it works, package a Development build and play it outside the editor. That's the whole professional loop: C++ systems, BP content, data assets, input, save, package.</p>`,
cmp:[["ScriptableObject items + MonoBehaviour inventory + prefab pickups","Data Assets + UActorComponent + C++ base/BP child pickups|the full translation in one feature"]],
task:"Complete the seven-step slice above. Budget 2–4 hours. Every step maps to a lesson you've finished — revisit them as needed.",

{q:"Pickup visual feedback belongs in…",o:["C++ Destroy code","A BlueprintImplementableEvent implemented per BP child","The Level BP","The GameMode"],a:1,x:"C++ logic, BP presentation — the golden pattern, applied."}]},
{id:"int3c", t:"Where to go next", min:5,
body:`<p>You now hold the complete conceptual map. What remains is mileage, plus a shortlist of deep systems worth your next months: <strong>UMG/Slate</strong> for real UI (UMG ≈ a retained-mode UI Toolkit; widgets are Blueprints too — the C++ base/BP child pattern applies); the <strong>Gameplay Ability System</strong> (GAS) — Epic's Fortnite-grade framework for abilities, effects and attributes, built on the Gameplay Tags you already know; <strong>replication</strong> for multiplayer (the framework classes you learned were shaped by it — you're better prepared than you think); <strong>Sequencer</strong> for cinematics (≈ Timeline, industrial strength); and <strong>Lyra</strong>, Epic's sample game, as the reference codebase for modern architecture.</p>
<p>Habits that compound: read engine source daily (you have all of it — Unity never gave you that); keep the Unity→Unreal map handy until reaching for Unreal idioms is reflex; and when you catch yourself building a manager singleton, a coroutine, or a component-only design, pause and ask what the Unreal-native shape is. Welcome across the bridge.</p>`,
cmp:[["UI Toolkit / UGUI","UMG (Slate underneath)"],["Custom ability/buff frameworks","Gameplay Ability System"],["Netcode packages","Built-in replication + the framework you already learned"],["Timeline","Sequencer"],["Learning from asset-store examples","Reading Lyra + engine source|full source access"]],
task:"Clone or install the Lyra sample, find its Character and Experience definitions, and identify five patterns from this course used in production code.",

{q:"GAS is built on which system you've already learned?",o:["Niagara","Gameplay Tags","World Partition","Sequencer"],a:1,x:"Tags identify abilities, effects and states throughout GAS."},
{q:"A structural advantage over your Unity life:",o:["Faster compiles","Full engine source code access","No build step","Smaller installs"],a:1,x:"When docs fail, read the engine — the ultimate documentation."},
{q:"Epic's reference sample for modern project architecture is…",o:["ShooterGame","Lyra","ThirdPerson template","ContentExamples"],a:1,x:"Lyra demonstrates current best practices at production scale."}]}
]}

#include <cstdio>

struct FString {
  std::string s;
  FString() {}
  FString(const char* c) : s(c) {}
  const char* operator*() const { return s.c_str(); }           // *MyStr like UE
  bool operator<(const FString& o) const { return s < o.s; }
  bool operator==(const FString& o) const { return s == o.s; }
  int Len() const { return (int)s.size(); }
  static FString Printf(const char* fmt, ...) {

    vsnprintf(buf, sizeof buf, fmt, a); va_end(a);
    return FString(buf);
  }
};
template<class T> struct TArray {
  std::vector<T> v;
  int Add(const T& x) { v.push_back(x); return (int)v.size() - 1; }
  bool Remove(const T& x) { for (size_t i=0;i<v.size();++i) if (v[i]==x) { v.erase(v.begin()+i); return true; } return false; }
  int Num() const { return (int)v.size(); }
  bool Contains(const T& x) const { for (auto& e : v) if (e == x) return true; return false; }
  T& operator[](int i) { return v[i]; }
  const T& operator[](int i) const { return v[i]; }
  auto begin() { return v.begin(); }  auto end() { return v.end(); }
  auto begin() const { return v.begin(); }  auto end() const { return v.end(); }
};
template<class K, class V> struct TMap {
  std::map<K,V> m;
  V& Add(const K& k, const V& val) { return m[k] = val; }
  V* Find(const K& k) { auto it = m.find(k); return it == m.end() ? nullptr : &it->second; }
  V& operator[](const K& k) { return m[k]; }
  int Num() const { return (int)m.size(); }
  auto begin() { return m.begin(); }  auto end() { return m.end(); }
};
struct FVector {
  float X=0, Y=0, Z=0;
  FVector() {} FVector(float x,float y,float z):X(x),Y(y),Z(z) {}
  float Size() const { return std::sqrt(X*X + Y*Y + Z*Z); }
  FVector operator+(const FVector& o) const { return {X+o.X, Y+o.Y, Z+o.Z}; }
  FVector operator*(float k) const { return {X*k, Y*k, Z*k}; }
};
template<class To, class From> To* Cast(From* p) { return dynamic_cast<To*>(p); }  // UE's Cast<T>
#define DECLARE_DELEGATE(Name) struct Name { std::function<void()> f; \
  void BindLambda(std::function<void()> fn) { f = fn; } \
  bool IsBound() const { return (bool)f; } \
  void Execute() { f(); } \

#define DECLARE_MULTICAST_DELEGATE_OneParam(Name, T) struct Name { std::vector<std::function<void(T)>> fs; \

expect:["boss hp: 5000","boss freed","wave sizes: 3 5 8","wave freed"],
checks:[[/Boss\s*\*\s*B\s*=\s*new\s+Boss/, "Heap-allocates with new"],[/B\s*->\s*HP/, "Accesses through the pointer with ->"],[/delete\s+B\s*;/, "Frees with delete"],[/B\s*=\s*nullptr/, "Nulls the pointer after delete"],[/new\s+int\s*\[\s*3\s*\]/, "Heap array with new[]"],[/delete\s*\[\s*\]\s*Wave/, "Frees the array with delete[]"]],
hint:"In real Unreal you'll almost never write new/delete — NewObject/SpawnActor plus the garbage collector handle UObjects. But every crash log you'll ever read speaks this language, so write it once by hand."},

{id:"lab-smart", t:"unique_ptr & std::move", xp:50, shim:false,
p:"Modern C++'s answer to the GC: <em>ownership</em>. A <code>unique_ptr</code> deletes its object the instant it goes out of scope (watch the destructor prints prove it), and it can't be copied — only <strong>moved</strong>. Create a quest with <code>make_unique</code>, hand ownership to <code>Complete</code> with <code>std::move</code>, and observe your original handle is now empty.",
starter:`#include <cstdio>
#include <memory>
#include <utility>

struct Quest {
    const char* Name;
    Quest(const char* N) : Name(N) { printf("quest '%s' created\\n", Name); }
    ~Quest()                       { printf("quest '%s' destroyed\\n", Name); }
};

void Complete(std::unique_ptr<Quest> Q) {      // takes OWNERSHIP by value
    printf("completing '%s'\\n", Q->Name);
}   // <- Q dies here, destructor fires automatically. That's RAII.

int main() {
    // TODO: auto Main = std::make_unique<Quest>("MainStory");
    // TODO: Complete(Main);              <- won't compile! unique = no copies
    //        Complete(std::move(Main));  <- transfer ownership explicitly
    // TODO: if (!Main) printf("main quest handle is now empty\\n");
    return 0;
}`,
expect:["quest 'MainStory' created","completing 'MainStory'","quest 'MainStory' destroyed","handle is now empty"],
checks:[[/std::make_unique<\s*Quest\s*>\s*\(\s*"MainStory"\s*\)/, "Creates with std::make_unique"],[/Complete\s*\(\s*std::move\s*\(\s*Main\s*\)\s*\)/, "Transfers ownership with std::move"],[/if\s*\(\s*!\s*Main\s*\)/, "Checks the moved-from handle is empty"]],
hint:"Destruction is deterministic here — no GC sweep 'eventually', the destructor runs at the closing brace. UE's TUniquePtr is this exact idea; UObjects use the engine GC instead, and now you know the difference."}]},

{cat:"Unreal types & reflection", items:[
{id:"lab-fstring", t:"FString / Printf drills", xp:35, shim:true,
p:"Build a kill-feed line with <code>FString::Printf</code> (Unreal's <code>string.Format</code>). Compose <code>Killer</code>, <code>Victim</code> and a distance into one FString, then log it.",

{id:"lab-tarray", t:"TArray inventory", xp:40, shim:true,
p:"Your <code>List&lt;T&gt;</code> reflexes, Unreal edition. Fill a <code>TArray&lt;FString&gt;</code>, print the count with <code>Num()</code>, range-for over it, <code>Remove</code> one item, and check membership with <code>Contains</code>.",

    TArray<FString> Inventory;

    // TODO:
    // 1) Add "Sword", "Potion", "Map"
    // 2) log -> Log: items: 3            (use Num())

{id:"lab-uprop", t:"UPROPERTY anatomy", xp:40, shim:true,
p:"Declare a weapon class the way you'd expose it to designers. The macros compile to nothing here, but the <em>choices</em> are the exercise: designer-tunable stats get <code>EditAnywhere</code>, runtime-visible-but-locked state gets <code>VisibleAnywhere</code>, and anything Blueprints should read needs <code>BlueprintReadOnly</code>.",
starter:`UCLASS()
class AWeapon {
    GENERATED_BODY()

    // TODO give each UPROPERTY the right specifiers:

    // Damage: designers tune it in the editor, BP can read it,
    // group it under Category = "Combat"
    UPROPERTY()
    float Damage = 25.f;

    // CurrentAmmo: visible in Details for debugging but NOT editable,
    // BP can read it
    UPROPERTY()
    int32 CurrentAmmo = 30;

    UFUNCTION()   // make it BlueprintCallable
    void Fire() {
        if (CurrentAmmo > 0) { CurrentAmmo--; UE_LOG(LogTemp, Log, "bang, ammo: %d", CurrentAmmo); }
    }
};

int main() { AWeapon W; W.Fire(); W.Fire(); return 0; }`,
expect:["bang, ammo: 29","bang, ammo: 28"],
checks:[[/UPROPERTY\s*\(\s*EditAnywhere[\s\S]{0,80}?float\s+Damage/, "Damage is EditAnywhere"],[/BlueprintReadOnly[\s\S]{0,80}?float\s+Damage/, "Damage is BlueprintReadOnly"],[/Category\s*=\s*"Combat"/, "Damage has Category = \"Combat\""],[/UPROPERTY\s*\(\s*VisibleAnywhere[\s\S]{0,90}?int32\s+CurrentAmmo/, "CurrentAmmo is VisibleAnywhere (not editable)"],[/UFUNCTION\s*\(\s*BlueprintCallable/, "Fire is BlueprintCallable"]],
hint:"UPROPERTY(EditAnywhere, BlueprintReadOnly, Category = \"Combat\") for Damage; UPROPERTY(VisibleAnywhere, BlueprintReadOnly) for ammo; UFUNCTION(BlueprintCallable) for Fire. Compare: [SerializeField] never carried this much meaning."}]},

{cat:"Classes, delegates, lifecycle", items:[
{id:"lab-super", t:"Inheritance & Super::", xp:40, shim:true,
p:"Unreal's <code>base.Method()</code> is <code>Super::Method()</code> — and forgetting it in <code>BeginPlay</code> is the classic UE bug. Derive <code>AEnemy</code> from <code>AActorBase</code>, override <code>BeginPlay</code>, and call the parent <em>first</em>.",
starter:`class AActorBase {
public:
    virtual ~AActorBase() {}
    virtual void BeginPlay() { UE_LOG(LogTemp, Log, "base systems online"); }
};

// TODO: class AEnemy : public AActorBase
// - use "using Super = AActorBase;"  (UE generates this for you normally)
// - override BeginPlay(): call Super::BeginPlay() FIRST,
//   then log "enemy ready"

int main() {
    AActorBase* A = new AEnemy();   // polymorphism via base pointer
    A->BeginPlay();
    delete A;
    return 0;
}`,
expect:["base systems online","enemy ready"],
checks:[[/class\s+AEnemy\s*:\s*public\s+AActorBase/, "AEnemy publicly inherits AActorBase"],[/using\s+Super\s*=\s*AActorBase/, "Defines Super alias like UE's generated code"],[/void\s+BeginPlay\s*\(\s*\)\s*override/, "Overrides BeginPlay with the override keyword"],[/Super::BeginPlay\s*\(\)/, "Calls Super::BeginPlay()"]],
hint:"class AEnemy : public AActorBase { public: using Super = AActorBase; void BeginPlay() override { Super::BeginPlay(); UE_LOG(LogTemp, Log, \"enemy ready\"); } }; — unlike C#, C++ never auto-calls the base."},

{id:"lab-cast", t:"Cast<T> & interfaces", xp:45, shim:true,
p:"Recreate the pickup pattern: a base pointer arrives at your overlap event, you <code>Cast&lt;&gt;</code> to check what it really is. Casts that fail return <code>nullptr</code> — branch on it like Unreal's Cast node.",
starter:`class AActorBase { public: virtual ~AActorBase() {} };

class IPickup {
public:
    virtual ~IPickup() {}
    virtual void Collect() = 0;   // pure virtual, like a C# interface
};

// TODO: class ACoin : public AActorBase, public IPickup
//   Collect() -> UE_LOG "coin collected"
// TODO: class ARock : public AActorBase   (NOT a pickup)

void OnOverlap(AActorBase* Other) {
    // TODO: IPickup* P = Cast<IPickup>(Other);
    // if valid -> P->Collect();  else -> UE_LOG "not a pickup"
}

int main() {
    ACoin Coin; ARock Rock;
    OnOverlap(&Coin);   // -> coin collected
    OnOverlap(&Rock);   // -> not a pickup
    return 0;
}`,
expect:["coin collected","not a pickup"],
checks:[[/class\s+ACoin\s*:\s*public\s+AActorBase\s*,\s*public\s+IPickup/, "ACoin inherits both the base and the interface"],[/void\s+Collect\s*\(\s*\)\s*override/, "Implements Collect() with override"],[/Cast<\s*IPickup\s*>/, "Uses Cast<IPickup>(...)"],[/if\s*\(\s*\w+\s*\)|!=\s*nullptr/, "Branches on the cast result (null check)"]],
hint:"IPickup* P = Cast<IPickup>(Other); if (P) { P->Collect(); } else { ... } — identical shape to Blueprint's Cast node with its failed pin."},

{id:"lab-delegate", t:"Delegates: OnHealthChanged", xp:45, shim:true,
p:"The observer pattern you used C# <code>event</code> for. Declare a one-param multicast delegate, expose it on <code>Health</code>, have the UI bind a lambda, and <code>Broadcast</code> on damage — the component never knows the UI exists.",
starter:`// TODO: DECLARE_MULTICAST_DELEGATE_OneParam(FOnHealthChanged, int)

class UHealthComponent {
public:
    // TODO: FOnHealthChanged OnHealthChanged;
    int HP = 100;
    void TakeDamage(int Amount) {
        HP -= Amount;
        // TODO: OnHealthChanged.Broadcast(HP);
    }
};

int main() {
    UHealthComponent Health;

    // TODO: bind a lambda ->  UE_LOG "UI: hp bar at %d"
    // (use AddLambda)

    Health.TakeDamage(30);   // -> UI: hp bar at 70
    Health.TakeDamage(25);   // -> UI: hp bar at 45
    return 0;
}`,
expect:["UI: hp bar at 70","UI: hp bar at 45"],
checks:[[/DECLARE_MULTICAST_DELEGATE_OneParam\s*\(\s*FOnHealthChanged\s*,\s*int\s*\)/, "Declares the multicast delegate type"],[/FOnHealthChanged\s+OnHealthChanged/, "Exposes it as a member"],[/\.Broadcast\s*\(/, "Broadcasts on change"],[/AddLambda\s*\(/, "Listener binds with AddLambda"]],
hint:"Health.OnHealthChanged.AddLambda([](int NewHP){ UE_LOG(LogTemp, Log, \"UI: hp bar at %d\", NewHP); }); — same inversion of dependency as C# events: broadcaster stays dumb."},

{id:"lab-lifecycle", t:"Lifecycle: a tickless timer", xp:50, shim:true,
p:"Capstone: an actor with the full lifecycle shape — constructor sets defaults, <code>BeginPlay</code> arms a cooldown, <code>Tick(DeltaTime)</code> counts it down and 'fires' every 1.5s, <code>EndPlay</code> reports shots. The harness simulates a 60fps world for you.",
starter:`class ATurret {
public:
    float Cooldown = 0.f;
    float FireInterval = 1.5f;
    int Shots = 0;

    void BeginPlay() {
        UE_LOG(LogTemp, Log, "turret online");
        // TODO: start Cooldown at FireInterval
    }

    void Tick(float DeltaTime) {
        // TODO: subtract DeltaTime from Cooldown
        // when it hits <= 0: Shots++, log "fire! (%d)", reset Cooldown to FireInterval
    }

    void EndPlay() {
        UE_LOG(LogTemp, Log, "turret offline after %d shots", Shots);
    }
};

int main() {                       // -- fake world: 5 seconds at 60fps --
    ATurret T;
    T.BeginPlay();
    for (int Frame = 0; Frame < 300; ++Frame) T.Tick(1.f / 60.f);
    T.EndPlay();                   // expected: 3 shots in 5s at 1.5s interval
    return 0;
}`,
expect:["turret online","fire! (1)","fire! (2)","fire! (3)","offline after 3 shots"],
checks:[[/Cooldown\s*=\s*FireInterval/, "BeginPlay arms the cooldown"],[/Cooldown\s*-=\s*DeltaTime/, "Tick subtracts DeltaTime (frame-rate independent!)"],[/Cooldown\s*<=\s*0/, "Checks expiry with <= 0"],[/Shots\+\+|\+\+Shots/, "Counts shots"]],
hint:"This is exactly what TimerManager does for you in real UE — but writing it once makes DeltaTime click. In Tick: Cooldown -= DeltaTime; if (Cooldown <= 0.f) { Shots++; UE_LOG(...); Cooldown = FireInterval; }"}]},

{cat:"Fix the compile error", items:[
{id:"fix-semicolon", t:"The cascade of doom", xp:35, shim:true,
p:"This code has <strong>one missing character</strong>, but the compiler will scream about dozens of unrelated-looking errors. Classic C++ hazing ritual: a class definition must end with <code>};</code> — forget the semicolon and everything <em>after</em> the class breaks. Run it, read the errors <em>top-down</em>, fix only the first one.",
starter:`class APickup {
public:
    int Value = 10;
    void Collect() { UE_LOG(LogTemp, Log, "collected %d", Value); }
}   // <- something is missing here…

int main() {
    APickup P;
    P.Collect();      // -> collected 10
    return 0;
}`,
expect:["collected 10"],
checks:[[/\}\s*;/, "Class definition ends with };"]],
hint:"Add the ; after the class's closing brace. Burn this into memory: when the compiler produces an avalanche of nonsense errors pointing at valid code, look one line ABOVE the first error — usually at the end of a class or struct."},

{id:"fix-virtual", t:"override with nothing to override", xp:40, shim:true,
p:"The derived class says <code>override</code>, but the compiler refuses: <em>'BeginPlay' marked 'override' but does not override</em>. In C# every method is overridable-ish with <code>virtual</code>/<code>new</code> warnings; C++ is strict — the <strong>base</strong> function must be declared <code>virtual</code> or polymorphism silently never happens. Fix the base class, not the child.",
starter:`class AActorBase {
public:
    ~AActorBase() {}                 // hmm, destructors of base classes…
    void BeginPlay() { UE_LOG(LogTemp, Log, "base ready"); }   // <- not virtual!
};

class ADoor : public AActorBase {
public:
    using Super = AActorBase;
    void BeginPlay() override {      // ERROR: nothing virtual to override
        Super::BeginPlay();
        UE_LOG(LogTemp, Log, "door ready");
    }
};

int main() {
    AActorBase* A = new ADoor();
    A->BeginPlay();                  // must print BOTH lines
    delete A;                        // and destroy safely via base pointer
    return 0;
}`,
expect:["base ready","door ready"],
checks:[[/virtual\s+void\s+BeginPlay/, "Base BeginPlay is virtual"],[/virtual\s+~AActorBase/, "Base destructor is virtual (safe delete via base pointer)"]],
hint:"Two fixes: virtual void BeginPlay() in the base, and virtual ~AActorBase() {} — deleting a derived object through a base pointer without a virtual destructor is undefined behavior. UE's AActor has both, which is why you never noticed."},

{id:"fix-const", t:"const infection", xp:40, shim:true,
p:"<code>Report</code> correctly takes the inventory by <code>const&amp;</code> — but now it won't compile: <em>'passing const TArray as this argument discards qualifiers'</em>. A <code>const</code> object may only call methods that <strong>promise</strong> not to modify it. Our shim's <code>Num()</code> makes that promise; the helper function below doesn't. Fix the promise, not the const.",
starter:`int CountValuable(TArray<int>& Items) {   // <- takes non-const ref…
    int N = 0;
    for (int V : Items) if (V >= 50) N++;
    return N;
}

void Report(const TArray<int>& Items) {       // const& — correct and idiomatic!
    UE_LOG(LogTemp, Log, "items: %d", Items.Num());
    UE_LOG(LogTemp, Log, "valuable: %d", CountValuable(Items));  // ERROR here
}

int main() {
    TArray<int> Loot;
    Loot.Add(10); Loot.Add(75); Loot.Add(90);
    Report(Loot);        // -> items: 3 / valuable: 2
    return 0;
}`,
expect:["items: 3","valuable: 2"],
checks:[[/CountValuable\s*\(\s*const\s+TArray<int>\s*&/, "CountValuable takes const TArray<int>&"]],
hint:"Change the helper's parameter to const TArray<int>&. This is 'const infection': once a caller holds const, everything it calls must accept const. Design rule — make parameters const& by default; loosen only when you truly mutate."},

{id:"fix-arrow", t:"Dot, arrow, and a missing prototype", xp:45, shim:false,
p:"Two distinct compile errors hide in here — a C# habit and a C++ rule. First: <code>Target.Health</code> on a <em>pointer</em> (C# uses dot for everything; C++ needs <code>-&gt;</code> through pointers). Second: <code>main</code> calls <code>Heal</code> before the compiler has ever heard of it — add a <strong>prototype</strong> above <code>main</code> or move the function. Read both errors, fix both.",
starter:`#include <cstdio>

struct Unit { int Health = 50; };

int main() {
    Unit Grunt;
    Heal(&Grunt, 25);                        // ERROR: 'Heal' was not declared
    printf("health: %d\\n", Grunt.Health);   // -> health: 75
    return 0;
}

void Heal(Unit* Target, int Amount) {
    Target.Health += Amount;                 // ERROR: '.' on a pointer
    printf("healed for %d\\n", Amount);      // -> healed for 25
}`,
expect:["healed for 25","health: 75"],
checks:[[/void\s+Heal\s*\(\s*Unit\s*\*\s*\w+\s*,\s*int\s+\w+\s*\)\s*;/, "Heal has a prototype before main (or was moved above it)"],[/Target\s*->\s*Health/, "Accesses Health through the pointer with ->"]],
hint:"Add 'void Heal(Unit* Target, int Amount);' above main, and change Target.Health to Target->Health. The declare-before-use rule is why every UE .cpp starts by including its own .h."},

{id:"fix-types", t:"Format string lies", xp:40, shim:true,
p:"It compiles… with warnings — and prints garbage. Every <code>printf</code>-family format specifier is an unchecked promise about the bytes you pass: <code>%d</code> for an <code>FString</code> reads a pointer as an integer, <code>%s</code> without <code>*</code> hands it a struct. Our compiler runs with <code>-Wall</code>: treat every warning as the error it morally is, and match all three specifiers to their arguments.",
starter:`int main() {
    FString Player = TEXT("Nyx");
    int Kills = 7;
    float Accuracy = 0.62f;

    // All three of these are wrong. The compiler only WARNS. The output lies.
    UE_LOG(LogTemp, Log, "player: %d", Player);        // FString is not %d… and no *
    UE_LOG(LogTemp, Log, "kills: %f", Kills);          // int printed as float
    UE_LOG(LogTemp, Log, "accuracy: %d%%", Accuracy);  // float printed as int

    // expected:
    //   player: Nyx
    //   kills: 7
    //   accuracy: 62%   (multiply by 100, print with %.0f)
    return 0;
}`,
expect:["player: Nyx","kills: 7","accuracy: 62%"],
checks:[[/%s"\s*,\s*\*\s*Player/, "Player printed with %s and the * dereference"],[/kills:\s*%d/, "Kills printed with %d"],[/%\.0f%%/, "Accuracy as %.0f%% (and scaled ×100)"]],
hint:"UE_LOG(LogTemp, Log, \"accuracy: %.0f%%\", Accuracy * 100.f); — %% prints a literal percent sign. In real UE the TCHAR mismatch version of this bug crashes at runtime, so the habit of matching specifiers exactly pays rent forever."}]},

{cat:"Free play", items:[
{id:"lab-scratch", t:"Scratchpad", xp:0, shim:true, scratch:true,
p:"Blank slate with the UE shim loaded — <code>UE_LOG</code>, <code>FString</code>, <code>TArray</code>, <code>TMap</code>, <code>FVector</code>, <code>Cast&lt;&gt;</code> and the delegate macros all work. Paste snippets from any lesson and poke at them.",
starter:`int main() {
    FVector Pos(3.f, 4.f, 0.f);
    UE_LOG(LogTemp, Log, "vector length: %.1f", Pos.Size());

    TMap<FString, int> Scores;
    Scores.Add("Ada", 1200);
    if (int* Found = Scores.Find("Ada"))
        UE_LOG(LogTemp, Log, "Ada: %d", *Found);

    return 0;
}`,
expect:null, checks:[], hint:"Anything goes here. Try the FVector operators, or declare a delegate and broadcast it."}]}
];

/* ===== Dojo: predict the output (all g++-verified) ===== */
const DOJO_PREDICT = [
{id:"pr1", t:"Copy or reference?",
code:`struct S { int V = 1; };
void F(S A, S& B) { A.V = 10; B.V = 20; }
int main() {
    S X, Y;
    F(X, Y);
    printf("%d %d\\n", X.V, Y.V);
}`,
o:["10 20","1 20","1 1","10 1"], a:1,
x:"A is a copy — mutating it changes nothing outside. B is a reference — the caller's Y really becomes 20. The single most C#-hostile line in C++."},
{id:"pr2", t:"Virtual dispatch",
code:`struct Base { virtual const char* Who() { return "base"; }
               const char* Say() { return Who(); } };
struct Kid : Base { const char* Who() override { return "kid"; } };
int main() {
    Kid K;
    Base* P = &K;
    printf("%s %s\\n", P->Who(), P->Say());
}`,
o:["base base","kid base","kid kid","base kid"], a:2,
x:"Who() is virtual, so both the direct call AND the call inside Say() dispatch to the Kid override — even through a Base*. This is exactly why Super::BeginPlay chains work."},
{id:"pr3", t:"Construction order",
code:`struct A { A() { printf("A"); } ~A() { printf("~A"); } };
struct B : A { B() { printf("B"); } ~B() { printf("~B"); } };
int main() { { B Obj; } printf(".\\n"); }`,
o:["AB~A~B.","BA~B~A.","AB~B~A.","BA~A~B."], a:2,
x:"Bases construct first (A then B); destruction runs exactly backwards (~B then ~A). Deterministic, at the closing brace — no GC 'eventually'."},
{id:"pr4", t:"Integer division strikes",
code:`int main() {
    float Ratio = 3 / 4;
    float Fixed = 3.f / 4;
    printf("%.2f %.2f\\n", Ratio, Fixed);
}`,
o:["0.75 0.75","0.00 0.75","0.00 0.00","0.75 0.00"], a:1,
x:"3 / 4 is INT division (=0) before the float ever sees it. One f suffix rescues the second. Health-percentage bugs are born here."},
{id:"pr5", t:"Pointer aliasing",
code:`int main() {
    int A = 5;
    int* P = &A;
    int B = *P;
    *P = 9;
    B += 1;
    printf("%d %d\\n", A, B);
}`,
o:["9 10","5 6","9 6","5 10"], a:2,
x:"B copied the VALUE 5 (then became 6) — it never aliased A. Writing through P changed A to 9. int b = *p copies; only the pointer itself aliases."},
{id:"pr6", t:"Hidden, not overridden",
code:`struct Base { const char* Who() { return "base"; } };  // no virtual!
struct Kid : Base { const char* Who() { return "kid"; } };
int main() {
    Kid K;
    Base* P = &K;
    printf("%s\\n", P->Who());
}`,
o:["kid","base","compile error","undefined"], a:1,
x:"Without virtual, the call binds to the pointer's STATIC type: Base. The Kid version merely hides it. In C# everything on a base reference still dispatched — here you must ask for it."},
{id:"pr7", t:"Postfix in the wild",
code:`int main() {
    int I = 5;
    int J = I++ + ++I;
    printf("%d %d\\n", I, J);
}`,
o:["7 12","7 11","6 11","7 13"], a:0,
x:"I++ yields 5 (then I=6), ++I makes 7 and yields 7. J = 5+7 = 12, I ends at 7. Legal here (the ++ operands differ) — but write code like this and your reviewer will find you."},
{id:"pr8", t:"Scope death",
code:`struct Note { const char* T;
    Note(const char* t):T(t) { printf("+%s ", T); }
    ~Note() { printf("-%s ", T); } };
int main() {
    Note A("A");
    { Note B("B"); }
    printf("| ");
}`,
o:["+A +B | -B -A","+A +B -B | -A","+A +B -A -B |","+A -A +B -B |"], a:1,
x:"B dies at its closing brace — BEFORE the |. A lives to the end of main. RAII in one line: scope IS lifetime. unique_ptr rides exactly this rule."}
];

/* ---------- storage adapter: artifact storage -> localStorage -> memory ---------- */
const Store = (() => {
  const KEY = "bridge-academy-v1";
  let mem = null;
  const hasWS = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
  let hasLS = false;
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); hasLS = true; } catch(e){}
  async function load(){
    if (hasWS){
      try { const r = await window.storage.get(KEY); if (r && r.value) return JSON.parse(r.value); } catch(e){}
      return null;
    }
    if (hasLS){
      try { const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; } catch(e){ return null; }
    }
    return mem;
  }
  let t = null;
  function save(state){
    clearTimeout(t);
    t = setTimeout(async () => {
      const v = JSON.stringify(state);
      if (hasWS){ try { await window.storage.set(KEY, v); } catch(e){} return; }
      if (hasLS){ try { localStorage.setItem(KEY, v); } catch(e){} return; }
      mem = state;
    }, 350);
  }
  return { load, save };
})();
