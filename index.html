{id:"ue2c", t:"GameMode, GameState, PlayerState", min:8,
body:`<p>In Unity you invent managers: GameManager, ScoreManager, MatchManager singletons. Unreal ships the manager architecture, split by <em>who needs to know</em> — a split designed for multiplayer but valuable everywhere:</p>
<p><strong>GameMode</strong> — the rules referee. Exists <em>only on the server</em>. Decides what to spawn for each player (default Pawn, Controller, HUD classes), when the match starts/ends, respawn logic. Set per-level in World Settings. <strong>GameState</strong> — replicated match facts everyone should see: time remaining, team scores, phase. <strong>PlayerState</strong> — replicated facts about one player: name, score, ping. Per-player data that must be public goes here, not on the Pawn (Pawns die; PlayerState persists). And from Chapter 1, <strong>GameInstance</strong> — one object for the whole app session, across levels: settings, save handles, meta-progression.</p>
<p>Even in a single-player game, using these buckets keeps you honest and makes a later co-op mode survivable.</p>`,
cmp:[["GameManager singleton (rules)","AGameModeBase|server-only referee, per level"],["Match/score manager visible to all","AGameState|replicated to everyone"],["Per-player score dictionary","APlayerState|replicated, outlives the Pawn"],["DontDestroyOnLoad app singleton","UGameInstance"],["Prefab wiring for 'what spawns for a player'","GameMode class defaults|DefaultPawnClass, PlayerControllerClass, HUDClass"]],
diagTitle:"Who spawns whom (game start)",diag:["GameMode|reads World Settings","PlayerController|one per player","Pawn/Character|possessed body","PlayerState|created alongside the Controller"],
task:"Create a Blueprint GameMode, set its Default Pawn Class to your character, assign it in World Settings, and confirm PIE still spawns you. You've replaced template wiring with your own.",
quiz:[
{q:"Which class exists only on the server in multiplayer?",o:["GameState","PlayerState","GameMode","GameInstance"],a:2,x:"GameMode is authoritative rules — clients never have it; they read GameState instead."},
{q:"A player's score that must survive death and be visible to others belongs in…",o:["The Pawn","PlayerState","GameMode","Level Blueprint"],a:1,x:"PlayerState persists across Pawn respawns and replicates."},
{q:"The closest thing to a cross-level DontDestroyOnLoad singleton is…",o:["GameMode","GameState","GameInstance","PlayerController"],a:2,x:"GameInstance spans the whole session including level loads."}]}
]},
{id:"ue3", t:"Blueprints & Input", skills:["Read & write Blueprint graphs","Communicate between Blueprints","Cast safely","Set up Enhanced Input"], lessons:[
{id:"ue3a", t:"Blueprint scripting essentials", min:8,
body:`<p><strong>Blueprints are not 'Unreal's visual scripting toy' — they are half the engine's API surface.</strong> A Blueprint class is a real class: it subclasses a C++ class (or another Blueprint), adds variables, functions and components, and compiles to bytecode. Think of a Blueprint as <em>prefab + script in one asset</em>: what took a prefab plus a MonoBehaviour in Unity is one BP asset in Unreal.</p>
<p>The graph vocabulary maps cleanly to C#: <strong>Event BeginPlay</strong> ≈ <code>Start()</code>, <strong>Event Tick</strong> ≈ <code>Update()</code> (with DeltaSeconds as a pin), white <em>exec</em> wires are statement order, coloured wires are data. Functions vs <strong>Macros</strong> vs <strong>Custom Events</strong>: functions return values and are callable; events are fire-and-forget and can be replicated; macros are inline graph snippets.</p>
<p>Performance reality check: Blueprint is roughly 10× slower than C++ per node-call, which matters in Tick and tight loops — and almost nowhere else. The professional pattern (Chapter theme of the Integration path) is C++ for systems, Blueprint for content and glue.</p>`,
cmp:[["Prefab + MonoBehaviour pair","One Blueprint class asset"],["Start() / Update()","Event BeginPlay / Event Tick"],["[SerializeField] private field","Variable, 'Instance Editable' ticked"],["public method","BlueprintCallable function"],["UnityEvent wired in Inspector","Event Dispatcher bound in graph"]],
task:"In your Character BP, add a float variable 'Health', make it Instance Editable, and on BeginPlay print it. Change the value on the placed instance (not the class) and see per-instance data — Blueprint's 'prefab override'.",
quiz:[
{q:"A Blueprint class is closest to…",o:["A Unity scene","A prefab and its script fused into one asset","A shader graph","An INI file"],a:1,x:"Components + data + logic in a single subclassable asset."},
{q:"Event Tick's DeltaSeconds pin corresponds to…",o:["Time.fixedTime","Time.deltaTime","Time.timeScale","frameCount"],a:1,x:"Same per-frame delta concept."},
{q:"Where does Blueprint's speed penalty actually bite?",o:["Everywhere, avoid BP","In per-frame Tick and tight loops","Only in shipping builds","In the editor only"],a:1,x:"Node overhead is per-call; event-driven BP logic is effectively free."}]},
{id:"ue3b", t:"Blueprint communication & casting", min:7,
body:`<p>"How do I make object A talk to object B?" — Unreal's most-asked question. The toolbox: <strong>direct reference</strong> (a variable of the target type, set via an exposed variable or spawn result), <strong>Casting</strong>, <strong>Interfaces</strong>, and <strong>Event Dispatchers</strong>.</p>
<p><strong>Cast To X</strong> is C#'s <code>as</code> operator with a built-in null-check branch: overlap gives you an <code>Actor</code>, you cast to <code>BP_Player</code>, and take the failed pin gracefully. But heavy casting to specific Blueprint classes creates hard load-time dependencies (casting to a BP loads that BP and everything it references) — the Unreal version of Unity's "everything references everything" prefab hell. The cure is the same instinct you have from C#: prefer <strong>interfaces</strong> ("does it implement Damageable?") over concrete casts, and use <strong>Event Dispatchers</strong> (≈ C# events/UnityEvents) so the sender never knows the listener.</p>
<p>Global lookups exist (<code>Get All Actors Of Class</code> ≈ <code>FindObjectsOfType</code>) and carry the same warning label: fine on BeginPlay, criminal in Tick.</p>`,
cmp:[["other as PlayerScript + null check","Cast To BP_Player node|failed pin = null branch"],["C# interface check (is IDamageable)","Blueprint Interface message call|works without knowing the class"],["event Action / UnityEvent","Event Dispatcher"],["FindObjectsOfType<T>()","Get All Actors Of Class|same perf warning"],["Singleton.Instance","Get Game Instance / GameMode / subsystems"]],
task:"Make a trigger-box Actor with an Event Dispatcher 'OnActivated'. In the Level Blueprint, bind to it and print a message. Sender knows nothing about the listener — decoupled, like a C# event.",
quiz:[
{q:"Cast To BP_Enemy is most like C#'s…",o:["typeof()","'as' cast with a null-check branch","reflection","boxing"],a:1,x:"Succeeds → typed reference; fails → take the Cast Failed pin."},
{q:"Why avoid casting to specific Blueprint classes everywhere?",o:["Casts crash in packaged builds","Each cast creates a hard asset dependency chain at load time","Casts don't work on Pawns","They're not replicated"],a:1,x:"Referencing a BP class pulls it (and its references) into memory; interfaces break the chain."},
{q:"The Blueprint equivalent of a C# event is…",o:["Custom Event","Event Dispatcher","Macro","Timeline"],a:1,x:"Dispatchers are multicast: many listeners bind, sender broadcasts."}]},
{id:"ue3c", t:"Enhanced Input", min:7,
body:`<p>Forget the old <code>Input.GetAxis("Horizontal")</code> stringly-typed world — Unreal's <strong>Enhanced Input</strong> is the moral twin of Unity's <em>new</em> Input System package, and it's the default since UE5.1. Three asset types: an <strong>Input Action</strong> (IA_Jump, IA_Move — an action with a value type: bool, 1D, 2D axis), an <strong>Input Mapping Context</strong> (IMC — binds physical keys to actions; equivalent of an Action Map), and bindings in your Pawn/Controller.</p>
<p>Its two superpowers over raw input: <strong>Triggers</strong> (Pressed, Hold, Tap, Pulse — "hold to charge" is configuration, not code) and <strong>Modifiers</strong> (deadzone, negate, swizzle — WASD→2D-vector conversion happens in the asset). Mapping Contexts stack with priorities at runtime: add IMC_Driving when entering a car, remove IMC_OnFoot — no if-state spaghetti.</p>
<p>Binding: get the Enhanced Input subsystem from the PlayerController, add the context, then bind events per action.</p>`,
cmp:[["Input System package InputAction","Input Action asset|typed value: bool / Axis1D / Axis2D"],["Action Map","Input Mapping Context (IMC)"],["Interactions (hold, tap)","Triggers"],["Processors (deadzone, invert)","Modifiers"],["SwitchCurrentActionMap()","Add/Remove Mapping Context|stackable with priority"]],
task:"Add IA_Sprint (bool) to the template's IMC bound to Left Shift, then in the Character BP set Max Walk Speed on Started and reset it on Completed.",
quiz:[
{q:"The Input Mapping Context corresponds to Unity's…",o:["Input Manager axes","Action Map","PlayerInput component","Control scheme"],a:1,x:"A set of key→action bindings you can swap at runtime."},
{q:"'Hold button 0.5s to interact' is implemented with…",o:["A timer in Tick","A Hold Trigger on the Input Action","A Modifier","Level Blueprint"],a:1,x:"Triggers move press-semantics into data."},
{q:"Turning WASD keys into one 2D movement vector is done by…",o:["Code in the Pawn","Swizzle/negate Modifiers in the IMC","The GameMode","A macro"],a:1,x:"Modifiers massage raw input into the action's value type."}]}
]},
{id:"ue4", t:"Visuals: Materials, Animation, Niagara", skills:["Author materials & instances","Read an Animation Blueprint","Build a state machine","Create a Niagara effect"], lessons:[
{id:"ue4a", t:"Materials vs shaders", min:7,
body:`<p>In Unity you pick or write a shader, then create Materials exposing its properties. Unreal fuses these: a <strong>Material asset</strong> <em>is</em> the shader — a node graph (think Shader Graph, but the native and only workflow) feeding a physically-based output node (Base Color, Metallic, Roughness, Normal, Emissive). Roughness is the big rename: it's the inverse of Unity's Smoothness.</p>
<p>The role of "Unity material" is played by the <strong>Material Instance</strong>: a cheap child of a Material that overrides exposed parameters <em>without recompiling the shader</em>. Workflow law: build few master Materials with parameters, then instance them everywhere. Editing an instance updates live; editing the master recompiles.</p>
<p>For runtime changes (<code>material.SetColor</code>), create a <strong>Dynamic Material Instance</strong> on the mesh and set scalar/vector parameters by name. And where Unity requires care about material instancing at runtime, Unreal makes the same distinction explicit in the type system.</p>`,
cmp:[["Shader / Shader Graph","Material|node graph, is the shader"],["Material asset","Material Instance|parameter overrides, no recompile"],["Smoothness","Roughness (inverted)"],["renderer.material.SetColor","Create Dynamic Material Instance → Set Vector Parameter"],["Standard/URP Lit shader","Default lit shading model + PBR pins"]],
task:"Make a master material with a Vector Parameter 'Tint' and a Scalar 'Roughness'; create two instances with different values and apply them to meshes.",
quiz:[
{q:"Unreal's Material asset is closest to Unity's…",o:["Material","Shader Graph shader","Texture","Render pipeline asset"],a:1,x:"The Material graph compiles into the shader itself."},
{q:"You need 50 colour variants of one surface. You create…",o:["50 Materials","1 Material + 50 Material Instances","50 shaders","Dynamic instances only"],a:1,x:"Instances share the compiled shader; only parameters differ."},
{q:"Unity Smoothness 0.9 ≈ Unreal Roughness…",o:["0.9","0.1","1.0","0.5"],a:1,x:"Roughness is inverted smoothness."}]},
{id:"ue4b", t:"Animation Blueprints", min:8,
body:`<p>Unity's Animator Controller is a state machine with parameters; logic to feed those parameters lives in a script calling <code>animator.SetFloat("Speed", …)</code>. Unreal's <strong>Animation Blueprint</strong> merges both halves into one asset with two graphs: the <strong>Event Graph</strong> gathers data every frame (read the owning Pawn's velocity, falling state) into variables, and the <strong>AnimGraph</strong> consumes them in <strong>State Machines</strong> and blend nodes to produce the final pose.</p>
<p>Mappings: Animator Controller → AnimBP; Blend Tree → <strong>Blend Space</strong> (a separate asset — e.g. speed × direction → locomotion pose); transitions with conditions exist identically; Avatar → <strong>Skeleton asset</strong> (animations are bound to a Skeleton, and retargeting between skeletons is via IK Rig/IK Retargeter in UE5). Layered avatar masks → <strong>Layered blend per bone</strong> ("upper body aims, legs run"). Animation events on clips → <strong>Anim Notifies</strong>.</p>
<p>Cultural difference: the AnimBP <em>pulls</em> data from the Pawn, rather than gameplay code <em>pushing</em> parameters in. Keep the pull cheap — cache the Pawn once, read a few floats.</p>`,
cmp:[["Animator Controller","Animation Blueprint (AnimGraph + Event Graph)"],["Blend Tree","Blend Space asset"],["animator.SetFloat from a script","AnimBP Event Graph reads the Pawn|pull, not push"],["Avatar / retargeting","Skeleton asset + IK Retargeter"],["Animation Events","Anim Notifies"],["Avatar mask layers","Layered blend per bone"]],
task:"Open the template's ABP_Manny: find where the Event Graph reads velocity, then find the state machine transition rule Idle→Run. Change the run threshold and feel it in PIE.",
quiz:[
{q:"The AnimBP's Event Graph replaces which Unity habit?",o:["Animation clips","Scripts calling animator.SetFloat/SetBool","State machines","Root motion"],a:1,x:"Parameter-feeding logic lives inside the AnimBP, pulling from the Pawn."},
{q:"A 2D locomotion Blend Tree (speed × direction) becomes a…",o:["State machine","Blend Space asset","Montage","Notify"],a:1,x:"Blend Spaces map N-D inputs to blended poses."},
{q:"Hit events at frame 12 of an attack clip are done with…",o:["Timelines","Anim Notifies","Tick polling","Delegates"],a:1,x:"Notifies fire events at points in an animation — Unity's Animation Events."}]},
{id:"ue4c", t:"Niagara VFX", min:6,
body:`<p><strong>Niagara</strong> is Unreal's particle system — conceptually closest to Unity's <em>VFX Graph</em> rather than Shuriken: fully programmable, simulation on CPU or GPU, driven by user parameters. (The legacy system, Cascade, is dead; ignore it.)</p>
<p>Structure: a Niagara <strong>System</strong> contains <strong>Emitters</strong>; each emitter runs stacks of <strong>Modules</strong> in stages — Spawn, Initialize Particle, Update, Render. Modules are the analog of Shuriken's modules (Shape, Velocity over Lifetime…) but each is itself an editable graph. You expose <strong>User Parameters</strong> on the System and set them from gameplay (<code>Set Niagara Variable</code>) — the equivalent of tweaking a ParticleSystem's modules from script, but cleanly data-driven.</p>
<p>Spawning: <code>Spawn System at Location</code> ≈ <code>Instantiate(particlePrefab)</code>, or add a NiagaraComponent to an Actor for looping effects.</p>`,
cmp:[["Shuriken ParticleSystem","Niagara System|via emitters + module stacks"],["VFX Graph","Niagara|closest conceptual match"],["Modules (Shape, Noise…)","Niagara Modules|each an editable graph"],["Exposed VFX Graph properties","User Parameters + Set Niagara Variable"],["Instantiate(effectPrefab, pos, rot)","Spawn System at Location"]],
task:"Create a Niagara System from the Fountain template, expose a User Parameter for spawn rate, and set it from a Blueprint on BeginPlay.",
quiz:[
{q:"Niagara's closest Unity relative is…",o:["Shuriken","VFX Graph","Line Renderer","Trail Renderer"],a:1,x:"Both are programmable, parameter-driven, GPU-capable graph systems."},
{q:"A Niagara System is composed of…",o:["Materials","Emitters running module stacks","Levels","Montages"],a:1,x:"System → Emitters → Modules per stage."},
{q:"Gameplay changes an effect's intensity via…",o:["Editing the asset at runtime","User Parameters (Set Niagara Variable)","Recompiling","Console commands"],a:1,x:"Expose a parameter, drive it from BP/C++."}]}
]},
{id:"ue5", t:"Architecture & Data", skills:["Choose Data Asset vs DataTable","Use Gameplay Tags","Design with BP interfaces","Explain World Partition"], lessons:[
{id:"ue5a", t:"Data Assets & DataTables", min:6,
body:`<p>Your ScriptableObject instincts transfer almost 1:1. A <strong>Primary Data Asset</strong> (subclass <code>UPrimaryDataAsset</code>, or a Blueprint of it) is a typed data container asset: WeaponDefinition, EnemyArchetype — exactly a ScriptableObject. Reference it from Actors instead of duplicating numbers on prefabs.</p>
<p>For spreadsheet-shaped data, Unreal adds <strong>DataTables</strong>: rows of one struct type, importable from CSV/JSON — the thing Unity teams usually hand-roll. Look up rows by <strong>row name</strong> (an <code>FName</code>).</p>
<p>Two Unreal-specific upgrades: <strong>soft references</strong> (<code>TSoftObjectPtr</code> / Soft Object Reference) point to an asset <em>without loading it</em> — the built-in answer to Unity's Addressables problem of hard reference chains; and the <strong>Asset Manager</strong> can scan, bundle and async-load Primary Data Assets by type and tag.</p>`,
cmp:[["ScriptableObject","Primary Data Asset"],["Hand-rolled CSV importer","DataTable|struct rows, CSV/JSON import"],["Addressables (load-on-demand refs)","Soft Object References + Asset Manager"],["Direct asset reference in prefab","Hard reference|loads with the referencer, same pitfalls"],["Resources.Load","LoadObject / async load via soft refs|Resources-style folder loading discouraged in both"]],
task:"Create a WeaponData Primary Data Asset BP with Damage and FireRate, make two weapon assets, and print their values from a test Actor.",
quiz:[
{q:"The Unreal ScriptableObject is…",o:["DataTable","Primary Data Asset","GameInstance","SaveGame"],a:1,x:"Typed, referenced, designer-editable data asset."},
{q:"200 item definitions maintained in a spreadsheet belong in…",o:["200 Data Assets","A DataTable imported from CSV","Config INI","The Level Blueprint"],a:1,x:"DataTables are made for row-based bulk data."},
{q:"A soft reference differs from a hard one because…",o:["It's read-only","It doesn't load the asset until you ask","It's faster to dereference","It can't be saved"],a:1,x:"Soft refs store a path; you async-load on demand — Addressables energy, built in."}]},
{id:"ue5b", t:"Gameplay Tags", min:5,
body:`<p>Unity tags: one string per GameObject, flat, typo-prone. <strong>Gameplay Tags</strong> are the opposite: a project-wide <em>hierarchical</em> registry (<code>Status.Debuff.Burning</code>, <code>Weapon.Ranged.Bow</code>), attachable in <em>containers</em> (many tags per thing), queried with hierarchy awareness — asking "has <code>Status.Debuff</code>?" matches any child tag.</p>
<p>Use them wherever you'd reach for enums-that-keep-growing or string constants: damage types, ability states, AI states, item categories. They serialize, replicate, and edit with autocomplete. Combined with tag <em>queries</em> ("ANY of (A,B) AND NOT C") they replace towers of boolean flags. They're also the backbone of the Gameplay Ability System, so learning them pays forward.</p>`,
cmp:[["GameObject.tag (single string)","Gameplay Tag Container|many hierarchical tags"],["CompareTag('Enemy')","Has Tag / Has Any / matching with hierarchy"],["Ever-growing enum EDamageType","Tag family Damage.*|extend without recompiling users"],["Layers for logic grouping","Tags + tag queries|layers in UE stay for collision/rendering channels"]],
task:"Add tags Status.Burning and Status.Frozen in Project Settings → Gameplay Tags, give an Actor a tag container, and branch on 'Has Tag Status.Burning'.",
quiz:[
{q:"The key structural upgrade over Unity tags is…",o:["They're faster","Hierarchy + multiple tags per object","They're colours","They're per-level"],a:1,x:"Hierarchical namespaces with container semantics and partial matching."},
{q:"'Has tag Status.Debuff' on an object tagged Status.Debuff.Burning returns…",o:["False","True — parent matches children","Error","Only in C++"],a:1,x:"Hierarchical matching is the point."},
{q:"Gameplay Tags best replace…",o:["Materials","Sprawling enums and magic strings for states/categories","Levels","Collision channels"],a:1,x:"Data-driven, extensible categorisation."}]},
{id:"ue5c", t:"Interfaces & decoupling", min:5,
body:`<p>You know interfaces from C#; Unreal has them in both worlds. A <strong>Blueprint Interface</strong> asset declares functions with no implementation; any Blueprint can implement it, and — the twist — you can <em>message</em> any Actor through an interface call without casting: if it implements the function it runs, otherwise the call is silently skipped. That's duck-typed messaging Unity never had natively (closest was the reviled <code>SendMessage</code>, minus type safety).</p>
<p>Canonical use: <code>IInteractable</code> with <code>Interact(Instigator)</code>. Your player traces, sends the Interact message to whatever it hit — doors, chests, NPCs — zero knowledge of their classes, zero hard references. Prefer this over Cast-chains whenever behaviour, not data, is what you need from a stranger.</p>`,
cmp:[["C# interface + 'is IInteractable' check","Blueprint Interface + message call|no cast needed"],["SendMessage('Interact')","Interface message|typed, safe, fails silently by design"],["Abstract base class for contracts","Interface or base class|UE has both; interfaces avoid the dependency chain"]],
task:"Create BPI_Interactable with an Interact function; implement it on a door (opens) and a lamp (toggles light); make the player line-trace and send the message to anything hit.",
quiz:[
{q:"Calling an interface message on an Actor that doesn't implement it…",o:["Crashes","Does nothing, by design","Casts automatically","Logs an error"],a:1,x:"Safe no-op — that's what makes it great for 'try to interact with anything'."},
{q:"Interfaces beat casting chains primarily because…",o:["They're faster","They remove hard class dependencies","They replicate","They're prettier"],a:1,x:"The caller depends only on the interface asset."},
{q:"Unity's nearest (unsafe) analog to interface messages was…",o:["Invoke","SendMessage","Coroutines","Tags"],a:1,x:"Same 'call by name if present' spirit, now with types."}]},
{id:"ue5d", t:"World Partition & big worlds", min:6,
body:`<p>How do you stream a huge world in Unity? You cut the map into additive scenes and write a streaming manager. Unreal 5's <strong>World Partition</strong> deletes that job: one big persistent level, automatically split into a <strong>grid of cells</strong>, streamed in/out around streaming sources (usually the player). Actors opt in via their <em>Is Spatially Loaded</em> flag.</p>
<p>Supporting cast: <strong>One File Per Actor (OFPA)</strong> stores each actor as its own file so a team can edit one map without merge wars (the answer to Unity's scene-merge nightmare); <strong>Data Layers</strong> group actors for conditional loading (quest states, day/night variants) — think scene-within-scene toggles; <strong>HLODs</strong> auto-generate merged low-poly proxies for unloaded cells, so distant cities still render.</p>
<p>For small/medium levels, classic Level Streaming (Chapter 1) remains fine — World Partition shines at open-world scale.</p>`,
cmp:[["Hand-rolled additive-scene streaming","World Partition|automatic grid streaming"],["Scene merge conflicts in teams","One File Per Actor"],["Enabling/disabling content sets per state","Data Layers"],["LOD Groups + manual impostors","HLOD|auto-built proxy meshes per cell"]],
task:"Create a new Open World template map, enable the World Partition editor minimap, and watch cells load/unload as you PIE-run across the terrain.",
quiz:[
{q:"World Partition replaces which Unity chore?",o:["Lightmapping","Hand-built additive-scene streaming systems","Prefabs","NavMesh"],a:1,x:"Automatic cell-based streaming of one big level."},
{q:"One File Per Actor exists to solve…",o:["Load times","Team collaboration / merge conflicts on maps","GPU memory","Shader compilation"],a:1,x:"Each actor is a separate file on disk; two people can edit the same map."},
{q:"Data Layers are best described as…",o:["Rendering layers","Named actor groups you can load/activate conditionally","Physics channels","Save files"],a:1,x:"Quest variants, seasonal content, alternate set-dressing."}]}
]},
{id:"ue6", t:"Shipping: Save, Package, Optimize", skills:["Implement SaveGame","Package a build","Profile with stat & Insights","Use scalability settings"], lessons:[
{id:"ue6a", t:"The Save System", min:6,
body:`<p>Unity gives you <code>PlayerPrefs</code> and a shrug; real saves mean JSON + files. Unreal ships a real system: subclass <strong>USaveGame</strong> (in BP or C++), add the variables to persist, then <code>Create Save Game Object → set fields → Save Game to Slot("Slot1", 0)</code> and <code>Load Game from Slot</code> back. Serialization of the object's properties is automatic (in C++, anything marked <code>UPROPERTY(SaveGame)</code> with the right serializer).</p>
<p>Architecture stays your job: a SaveGame object is a <em>snapshot struct</em>, not live state — on save you gather (player transform, inventory rows, quest tags), on load you re-apply. GameInstance is the natural owner of save/load orchestration since it survives level changes. Async variants exist for large saves.</p>`,
cmp:[["PlayerPrefs","Save Game to Slot|but structured objects, not key-value strings"],["JsonUtility + File.WriteAllText","USaveGame subclass|auto property serialization"],["Custom save manager singleton","GameInstance orchestrating SaveGame objects"]],
task:"Create BP_MySave (SaveGame) with PlayerLocation; save on key P, load and teleport on key L. Congratulations: persistent state with zero file I/O code.",
quiz:[
{q:"USaveGame is best thought of as…",o:["Live game state","A snapshot object you fill on save and read on load","A database","A config INI"],a:1,x:"Gather → save; load → re-apply."},
{q:"Which class should typically own save/load flow?",o:["The Pawn","GameInstance","Level Blueprint","PlayerCameraManager"],a:1,x:"It persists across levels — ideal orchestrator."},
{q:"In C++, a property persists in a SaveGame when marked…",o:["Transient","UPROPERTY(SaveGame)","EditAnywhere","Config"],a:1,x:"The SaveGame specifier opts the field into save serialization."}]},
{id:"ue6b", t:"Packaging & builds", min:6,
body:`<p>Unity's Build Settings dialog becomes <strong>Platforms → [Platform] → Package Project</strong>. Under the hood, packaging <strong>cooks</strong> content (converts editor-format assets to platform-optimized binary — Unity does this invisibly), <strong>stages</strong> it into <code>.pak</code> archives, and compiles a <strong>Shipping</strong> build of the code. Build configurations matter: <em>Development</em> keeps debugging and console; <em>Shipping</em> strips them — the Release analog.</p>
<p>Which maps ship? Project Settings → Packaging → List of maps (≈ Scenes In Build). Set the Default/Game Default Map — the startup scene. Common gotchas for Unity refugees: assets only referenced by string paths don't get cooked (same spirit as Resources folder surprises) — force-include via "Additional Asset Directories to Cook"; and Shipping disables <code>Print String</code>-style debugging, so wean off early.</p>`,
cmp:[["Build Settings → Build","Platforms → Package Project"],["Scenes In Build list","Packaging: List of Maps + Default Maps"],["Development Build checkbox","Development vs Shipping configuration"],["Invisible asset import pipeline","Cooking|explicit, per-platform"],["StreamingAssets/","Additional directories to cook / .pak staging"]],
task:"Package a Windows (or your platform's) Development build of your project and run the executable outside the editor.",
quiz:[
{q:"'Cooking' is…",o:["Compiling C++","Converting assets to platform-optimized runtime formats","Lightmap baking","Shader warmup"],a:1,x:"Editor assets → runtime binary content, per platform."},
{q:"The Shipping configuration ≈ Unity's…",o:["Debug build","Release build without dev tooling","Editor play mode","IL2CPP only"],a:1,x:"Optimized, stripped of debug features and console."},
{q:"An asset loaded only by a runtime string path will…",o:["Always package fine","Possibly be excluded from cooking — force-include it","Crash the cook","Become a soft reference"],a:1,x:"The cooker follows references; pathless loads need explicit inclusion."}]},
{id:"ue6c", t:"Performance & profiling", min:7,
body:`<p>Your Unity profiler instincts port over; the tools are renamed. Quick on-screen numbers: console commands <code>stat fps</code>, <code>stat unit</code> (the crucial one — shows whether Game thread, Draw/RHI thread or GPU is the bottleneck ≈ CPU vs GPU bound in Unity's profiler), <code>stat gpu</code>, <code>stat scenerendering</code> (draw calls). Deep dives: <strong>Unreal Insights</strong> is the Profiler window/Timeline, and the <strong>GPU Visualizer</strong> (Ctrl+Shift+,) breaks down a frame's GPU cost.</p>
<p>The usual suspects differ slightly from Unity: <strong>Tick abuse</strong> (disable tick on everything that can be event-driven — Actors tick by default in C++ unless you say otherwise!), Blueprint-heavy per-frame logic, too many <strong>dynamic lights with shadows</strong>, overdraw from translucent materials, and uncontrolled draw calls (Instanced Static Meshes ≈ GPU instancing). <strong>Scalability</strong> settings (Low→Epic presets driven by console variables) are Unity's Quality Settings, and they're your first lever on weaker hardware. UE5-specific: Nanite virtualizes mesh detail (rethinks LODs entirely) and Lumen replaces baked GI — both trade base GPU cost for scalability.</p>`,
cmp:[["Profiler window / Timeline","Unreal Insights"],["Stats overlay (Game view)","stat fps / stat unit / stat gpu"],["Quality Settings presets","Scalability settings (sg.* console variables)"],["GPU instancing / SRP batcher","Instanced Static Mesh components"],["Baked GI + lightmaps","Lumen (dynamic) or baked lightmass"],["LOD Groups","Nanite (or classic LODs for non-Nanite)"]],
task:"In PIE, run stat unit and identify your bottleneck thread; then run stat scenerendering and note your draw call count.",
quiz:[
{q:"Which command tells you Game-thread vs GPU bound at a glance?",o:["stat fps","stat unit","stat memory","showflag"],a:1,x:"stat unit shows frame, game, draw and GPU times side by side."},
{q:"A dangerous C++ default Unity devs miss:",o:["Actors don't render","Actors tick every frame unless disabled","Materials recompile per frame","GC runs per tick"],a:1,x:"Set PrimaryActorTick.bCanEverTick=false (or disable in BP) for everything event-driven."},
{q:"Unity's Quality Settings map to…",o:["World Settings","Scalability settings","Device profiles only","stat commands"],a:1,x:"Scalability groups (sg.*) drive preset quality tiers."}]}
]},
{id:"ue7", t:"UMG — UI That Ships", skills:["Build a HUD widget with proper anchoring","Wire button clicks and update text event-driven","Push data into UI via delegates instead of bindings","Drive a Widget Blueprint from a C++ base class"], lessons:[

{id:"ue7a", t:"Widget Blueprints & layout", min:8,
body:`<p>Unreal's UI framework is <strong>UMG</strong> (Unreal Motion Graphics). Where Unity gives you a Canvas GameObject in the scene, UMG gives you a <strong>Widget Blueprint</strong> asset — a self-contained UI class with a <em>Designer</em> tab (visual layout) and a <em>Graph</em> tab (logic, a normal Blueprint event graph). Nothing appears on screen until someone creates the widget and calls <code>Add to Viewport</code> — think of every widget as a prefab that must be instantiated, never a scene object.</p>
<p>Layout will feel familiar and then suddenly not. A <strong>Canvas Panel</strong> works like RectTransform-land: children get anchors, offsets, and absolute positioning. But idiomatic UMG leans on <strong>layout panels</strong> — Horizontal Box, Vertical Box, Grid, Overlay — which auto-arrange children like Unity's Layout Groups, except they're the default culture rather than an add-on. The big mental shift: a child's layout properties (padding, alignment, fill) don't live on the child. They live on the <strong>Slot</strong> — the connection object between parent and child. Same button behaves differently in a Vertical Box slot vs a Canvas slot.</p>
<div class="note">💡 Rule of thumb from UI-heavy teams: Canvas Panel for the outermost HUD frame and free-floating elements; boxes and overlays for everything inside. Deep Canvas nesting is both slower and harder to make resolution-proof.</div>`,
cmp:[["Canvas (scene object)|always visible in scene","Widget Blueprint|asset; instantiate + Add to Viewport"],["RectTransform anchors","Canvas Panel slot anchors"],["Layout Groups (add-on)","Horizontal/Vertical Box (the default)"],["Layout props on the child","Layout props on the Slot"],["Text / Image / Button (UGUI)","Text Block / Image / Button widgets"],["Canvas Scaler","DPI Scaling (Project Settings → UI)"]],
task:"Create a Widget Blueprint WBP_HUD: Canvas Panel root, a Vertical Box anchored top-left with two Text Blocks (Health, Ammo). In the Level Blueprint or your Character, Create Widget → Add to Viewport on BeginPlay.",
quiz:[
{q:"A Widget Blueprint appears on screen…",o:["automatically, like a Unity Canvas","when placed in the level","after Create Widget + Add to Viewport","when its level loads"],a:2,x:"Widgets are classes, not scene objects — someone must instantiate and add them to the viewport."},
{q:"Padding and alignment of a widget inside a Vertical Box live on…",o:["the child widget itself","the Vertical Box","the Slot connecting them","Project Settings"],a:2,x:"Slot objects hold per-child layout data — the property panel changes depending on the parent panel type."},
{q:"Closest spiritual match to RectTransform anchoring:",o:["Overlay","Canvas Panel slots","Grid Panel","Size Box"],a:1,x:"Canvas Panel gives free-form anchored positioning; boxes auto-arrange instead."}]},

{id:"ue7b", t:"Data flow: events over bindings", min:8,
body:`<p>UMG offers <strong>property bindings</strong> — bind a Text Block to a function and it re-evaluates <em>every frame</em>. It's the first thing tutorials show and the first thing production teams ban: it's a hidden Update() per bound property. The idiomatic pattern is <strong>event-driven UI</strong>, and you already own every piece of it: your gameplay code exposes a delegate (<code>OnHealthChanged</code> from the C++ path!), the widget binds to it once, and updates only fire when the value actually changes — exactly how you'd wire a C# event to a UI refresh method in Unity.</p>
<p>Getting data <em>in</em>: after <code>Create Widget</code> you hold a typed reference, so make a custom event or function on the widget (<code>UpdateHealth(float)</code>) and call it. Getting input <em>out</em>: Button widgets expose <code>OnClicked</code> as an event in the Details panel — no EventSystem, no raycaster config, it just works. Two more survival tools: <strong>Visibility</strong> (Collapsed reclaims layout space, Hidden keeps it — Unity's SetActive vs alpha 0 distinction, made explicit) and <strong>Input Modes</strong> on the PlayerController: <code>Set Input Mode Game Only / UI Only / Game and UI</code> plus <code>bShowMouseCursor</code> decide whether your pause menu eats input or your character keeps running while you click buttons.</p>`,
cmp:[["C# event → UI refresh method","Delegate/Dispatcher → widget custom event"],["Update() polling a value","Property binding (avoid it the same way)"],["Button.onClick","Button → OnClicked event"],["SetActive(false)","Visibility: Collapsed"],["alpha 0 / CanvasGroup","Visibility: Hidden"],["EventSystem + Input Module config","Set Input Mode + Show Mouse Cursor"]],
task:"Give your Character an OnHealthChanged Event Dispatcher. In WBP_HUD, bind to it after Create Widget and update the health Text Block from the event. Press play, damage yourself, watch it update — with zero Tick cost.",
quiz:[
{q:"Why do production teams avoid UMG property bindings?",o:["They break packaging","They re-evaluate every frame like a hidden Update()","They only work in C++","They can't display floats"],a:1,x:"Bound functions run per frame per binding. Event-driven updates cost nothing until data changes."},
{q:"Collapsed vs Hidden visibility:",o:["identical","Collapsed reclaims layout space; Hidden keeps it","Hidden destroys the widget","Collapsed only works on buttons"],a:1,x:"Collapsed = SetActive(false)-ish for layout; Hidden = invisible but still occupying its slot."},
{q:"Your pause menu buttons won't click. First suspect:",o:["Missing EventSystem","Input Mode still Game Only / cursor hidden","Widget not compiled","Wrong anchor"],a:1,x:"Set Input Mode UI Only (or Game and UI) and bShowMouseCursor on the PlayerController when opening menus."}]},

{id:"ue7c", t:"C++ + UMG: the widget base class", min:9,
body:`<p>The golden C++/Blueprint pattern applies to UI unchanged: <strong>C++ base class for logic, Widget Blueprint child for looks</strong>. Derive from <code>UUserWidget</code>, reparent your WBP to it (File → Reparent Blueprint), and the two halves connect through one magic specifier: <code>meta = (BindWidget)</code>. Declare a pointer whose <em>name exactly matches</em> a widget in the Designer, and the engine wires it up at construct time — the compiler even fails if the named widget is missing, turning broken UI references into build errors instead of silent nulls (GetComponent-style string lookups, eliminated).</p>
<p>Lifecycle mapping: <code>NativeConstruct()</code> is your widget's BeginPlay (call <code>Super::NativeConstruct()</code> — you knew that), <code>NativeDestruct()</code> the teardown, and <code>NativeTick()</code> exists but you now know better than to live there. Bind button events in NativeConstruct via <code>MyButton-&gt;OnClicked.AddDynamic(this, &amp;UMyWidget::HandleClick)</code> — dynamic delegates need a <code>UFUNCTION()</code> on the handler. Expose polish points to designers with <code>BlueprintImplementableEvent</code> (\"OnHealthChanged happened — animate however you like\") and you get the full split: C++ owns data and flow, the WBP owns colors, fonts and juice.</p>`,
code:`<span class="cm">// MyHUDWidget.h — the C++ half</span>
<span class="mc">UCLASS</span>()
<span class="kw">class</span> UMyHUDWidget : <span class="kw">public</span> UUserWidget {
    <span class="mc">GENERATED_BODY</span>()
<span class="kw">protected</span>:
    <span class="cm">// name must match the Text Block in the Designer exactly</span>
    <span class="mc">UPROPERTY</span>(meta = (BindWidget))
    <span class="kw">class</span> UTextBlock* HealthText;

    <span class="mc">UPROPERTY</span>(meta = (BindWidget))
    <span class="kw">class</span> UButton* RespawnButton;

    <span class="kw">virtual void</span> NativeConstruct() <span class="kw">override</span>;

    <span class="mc">UFUNCTION</span>()  <span class="cm">// required for AddDynamic</span>
    <span class="kw">void</span> HandleRespawnClicked();

    <span class="mc">UFUNCTION</span>(BlueprintImplementableEvent)  <span class="cm">// designers animate this</span>
    <span class="kw">void</span> OnHealthChanged(<span class="kw">float</span> NewHealth);
};`,
cmp:[["MonoBehaviour on the Canvas","UUserWidget C++ base + WBP child"],["GetComponent / transform.Find('Txt')","UPROPERTY(meta=(BindWidget)) — checked at compile"],["Awake/OnEnable","NativeConstruct (Super:: first!)"],["button.onClick.AddListener","OnClicked.AddDynamic + UFUNCTION handler"],["UnityEvent for designer hooks","BlueprintImplementableEvent"]],
task:"Reparent WBP_HUD to a new UUserWidget C++ class. BindWidget your health Text Block, set its text from a BlueprintCallable UpdateHealth(float), and add a BlueprintImplementableEvent the WBP uses to flash the text red on damage.",
quiz:[
{q:"meta = (BindWidget) on a UTextBlock* means…",o:["the widget is created for you","a same-named Designer widget is wired in, verified at compile","the text auto-updates","it becomes a binding (per-frame)"],a:1,x:"Name-matched auto-wiring with compile-time verification — a null-proof GetComponent."},
{q:"The widget equivalent of BeginPlay in C++ is…",o:["Construct","NativeConstruct","OnInitialized only","NativeTick"],a:1,x:"NativeConstruct — and like everything in UE, call Super::NativeConstruct() first."},
{q:"AddDynamic on a button's OnClicked requires the handler to be…",o:["static","virtual","marked UFUNCTION()","public"],a:2,x:"Dynamic delegates bind by reflection, so the target function must be a UFUNCTION."}]}
]},
{id:"ue8", t:"Physics & Collision, Demystified", skills:["Configure collision presets, channels and responses without guessing","Choose between Overlap and Hit (Block) events correctly","Run traces and shape sweeps from C++ and BP","Apply forces and impulses to simulated bodies"], lessons:[

{id:"ue8a", t:"The collision matrix", min:8,
body:`<p>Unity's Layer Collision Matrix is a global grid in project settings. Unreal turns that inside out: every primitive component carries its own collision recipe — an <strong>Object Type</strong> (what am I?), and a <strong>response list</strong> (Ignore / Overlap / Block) against every <strong>channel</strong> (how do I react to each kind of thing?). Two objects interact using the <em>least</em> enthusiastic of their two opinions: Block+Block = physical hit, Block+Overlap = overlap only, anything+Ignore = nothing. That one sentence resolves 90% of "why doesn't my trigger fire" mysteries.</p>
<p>You rarely hand-author responses: <strong>Presets</strong> (BlockAll, OverlapAllDynamic, Pawn, NoCollision…) are named bundles, and custom presets live in Project Settings → Collision, where you can also add your own trace/object channels (Projectile, Interactable) — Unreal's answer to running out of Unity layers. Also split in two where Unity had one checkbox: <em>Collision Enabled</em> has modes — Query Only (traces/overlaps see it, physics doesn't), Physics Only, or both. UI-piercing bullets and walk-through-but-shootable ghosts are one dropdown, not a script.</p>`,
cmp:[["Layer + Layer Collision Matrix|global grid","Object Type + per-component responses|local recipe"],["isTrigger checkbox","Response set to Overlap (vs Block)"],["Running out of layers (32 max)","Custom channels in Project Settings"],["Collider enabled on/off","Collision Enabled: Query / Physics / Both"],["Physics Debug window","Collision view mode + 'show collision' console cmd"]],
task:"Make a projectile that Blocks WorldStatic but Overlaps Pawns: new Object Channel 'Projectile', a preset for it, applied to your capstone projectile. Verify with the Player Collision view mode.",
quiz:[
{q:"Object A Blocks Pawn; Pawn B Overlaps A's type. Result when they touch:",o:["Physical block","Overlap events only","Nothing","Both block and overlap"],a:1,x:"Interactions resolve to the LEAST enthusiastic response: Block + Overlap = Overlap."},
{q:"'Query Only' collision means…",o:["only C++ can query it","traces & overlaps see it, physics simulation ignores it","it blocks everything","it's editor-only"],a:1,x:"Query = traces/overlaps; Physics = simulation. Unreal splits what Unity's single 'enabled' merged."},
{q:"You need a 'grappling-point' category that only your hook trace can see. You create…",o:["a new Layer","a Gameplay Tag","a custom Trace Channel","a new preset only"],a:2,x:"Custom trace channels in Project Settings → Collision are exactly for special-purpose queries."}]},

{id:"ue8b", t:"Hits, overlaps & traces", min:8,
body:`<p>Unity's OnTriggerEnter/OnCollisionEnter become two delegate pairs you <em>bind</em> per component: <code>OnComponentBeginOverlap / EndOverlap</code> (trigger-style, from Overlap responses) and <code>OnComponentHit</code> (physical contact, from Block + something simulating or sweeping). The data is richer: <code>FHitResult</code> hands you impact point, normal, bone name, the component hit, distance, and both channels involved. Bind in C++ with <code>AddDynamic</code> (your handler is a UFUNCTION — you know this song) or click the + on the component's Events in BP.</p>
<p>Raycasts become <strong>traces</strong>: <code>LineTraceSingleByChannel</code>, plus shape sweeps (<code>SweepSingleByChannel</code> with a sphere/box/capsule — SphereCast's whole family) and multi variants that collect everything along the path. Two habits to import: pass an <code>FCollisionQueryParams</code> with <code>AddIgnoredActor(this)</code> so you stop shooting yourself, and debug-draw with <code>DrawDebugLine</code> — Unreal's Debug.DrawRay, but it actually shows up without a checkbox hunt.</p>`,
code:`<span class="cm">// Classic aim trace from a camera</span>
FHitResult Hit;
FVector Start = Camera->GetComponentLocation();
FVector End   = Start + Camera->GetForwardVector() * 5000.f;
FCollisionQueryParams Params;
Params.AddIgnoredActor(<span class="kw">this</span>);   <span class="cm">// don't shoot yourself</span>

<span class="kw">bool</span> bHit = GetWorld()->LineTraceSingleByChannel(
    Hit, Start, End, ECC_Visibility, Params);
<span class="kw">if</span> (bHit)
    <span class="mc">UE_LOG</span>(LogTemp, Log, <span class="st">"hit %s at %.0f units"</span>, *Hit.GetActor()->GetName(), Hit.Distance);`,
cmp:[["OnTriggerEnter(Collider other)","OnComponentBeginOverlap (bound delegate)"],["OnCollisionEnter(Collision c)","OnComponentHit (bound delegate)"],["Physics.Raycast(ray, out hit)","LineTraceSingleByChannel(Hit, …)"],["Physics.SphereCast","SweepSingleByChannel + FCollisionShape"],["RaycastAll","LineTraceMultiByChannel"],["Debug.DrawRay","DrawDebugLine / 'show collision'"]],
task:"Add the aim trace above to your capstone character on IA_Aim, DrawDebugLine the ray, and log what it hits. Then break it on purpose: set the target to Ignore Visibility and watch the trace pass through.",
quiz:[
{q:"OnComponentHit fires when…",o:["any two components touch","Block meets Block with physics/sweep involved","responses are Overlap","only in C++"],a:1,x:"Hit events come from blocking contact; overlap events from Overlap responses. Different pairs, different events."},
{q:"Your trace keeps hitting the shooter. Fix:",o:["raise the start point","FCollisionQueryParams::AddIgnoredActor(this)","use Overlap instead","trace on a different thread"],a:1,x:"Ignoring self via query params is the standard first line of every trace."},
{q:"SphereCast's equivalent is…",o:["SphereTraceByObject only","a sweep: SweepSingleByChannel with FCollisionShape::MakeSphere","MultiLineTrace","OverlapAnyTest"],a:1,x:"Sweeps move a shape along a path — same idea, channel rules included."}]},

{id:"ue8c", t:"Simulating bodies & forces", min:7,
body:`<p>Rigidbody dissolves into a checkbox: <strong>Simulate Physics</strong> on any primitive component (per-component, not per-actor — a door's handle can simulate while its frame doesn't). Mass comes from volume × density by default with an override; damping replaces drag. The force API maps almost verb-for-verb: <code>AddForce</code> (continuous, per-tick), <code>AddImpulse</code> (instant, ForceMode.Impulse), <code>AddTorque</code>, plus cinematic gifts Unity made you write — <code>AddRadialImpulse</code> for explosions. One serious cultural difference: <strong>characters are not physics objects</strong>. CharacterMovementComponent is a kinematic solver with physics <em>interactions</em>; pushing a Character with AddImpulse mostly does nothing. Launch pads use <code>LaunchCharacter</code>, ragdolls flip Simulate on the mesh and hand control to Chaos.</p>
<div class="note">⚙️ Chaos is the physics engine under everything (PhysX left in UE5). Same mental model as PhysX for daily work — where it shines is destruction: fracture meshes into Geometry Collections and let walls shatter without a single line of code.</div>`,
cmp:[["Rigidbody component","Simulate Physics checkbox (per primitive)"],["rb.AddForce(v)","AddForce (continuous)"],["AddForce(v, ForceMode.Impulse)","AddImpulse"],["rb.drag / angularDrag","Linear / Angular Damping"],["Explosion force loop you wrote","AddRadialImpulse"],["CharacterController + custom launcher","LaunchCharacter (characters aren't sim bodies)"]],
task:"Capstone juice: on enemy death, flip Simulate Physics on its mesh and AddRadialImpulse from the kill point. Congratulations, you have ragdoll comedy.",
quiz:[
{q:"Simulate Physics is set…",o:["per Actor","per primitive component","globally","in GameMode"],a:1,x:"Per-component — mixed simulated/kinematic hierarchies in one actor are normal."},
{q:"AddImpulse on your Character does nothing because…",o:["mass too high","CharacterMovement is a kinematic solver — use LaunchCharacter","impulses are server-only","you forgot Tick"],a:1,x:"Characters aren't free physics bodies; the movement component owns them. LaunchCharacter is the sanctioned shove."},
{q:"Unreal's built-in explosion push is…",o:["a Blueprint you download","AddRadialImpulse","looping AddForce over overlaps","Niagara"],a:1,x:"AddRadialImpulse(origin, radius, strength, falloff) — the loop Unity devs hand-rolled, shipped as an API."}]}
]},
{id:"ue9", t:"Multiplayer: The Built-In Superpower", skills:["Explain authority and the server-client model","Replicate variables with UPROPERTY(Replicated) and RepNotify","Choose the right RPC type and validate it","Place state correctly across GameMode/GameState/PlayerState in networked play"], lessons:[

{id:"ue9a", t:"Authority & replication", min:9,
body:`<p>Here's the thing Unity never gave you for free: Unreal is networked <em>at the core</em>. The Gameplay Framework you already learned was designed for multiplayer and merely tolerates single-player. The model is strict server-authority: the <strong>server</strong> owns the true game state; clients hold replicated copies and send requests. Every Actor knows which side it's on — <code>HasAuthority()</code> — and gameplay-mutating code should check it the way you check pointers for null.</p>
<p><strong>Replication</strong> is one-way, server→client, and opt-in per property: mark it <code>UPROPERTY(Replicated)</code>, register it in <code>GetLifetimeReplicatedProps</code>, and set <code>bReplicates = true</code> on the actor. When you need a client-side <em>reaction</em> to a change (update the HUD, play a sound), use <code>ReplicatedUsing = OnRep_Health</code> — a function that fires on clients when the value arrives. That's your networked OnValueChanged, free of charge. The mind-bender for Netcode/Mirror veterans: you don't sync transforms by hand — movement replication for Characters is already built, prediction included.</p>`,
cmp:[["NetworkBehaviour + NetworkIdentity","AActor with bReplicates = true"],["[SyncVar]","UPROPERTY(Replicated) + GetLifetimeReplicatedProps"],["[SyncVar(hook=…)]","ReplicatedUsing = OnRep_Func"],["isServer / isClient checks","HasAuthority() / GetLocalRole()"],["NetworkTransform component","Built-in movement replication (with prediction)"],["Mirror/Netcode (a package)","The engine itself"]],
task:"Set your capstone project to 2 players in PIE (Net Mode: Play as Listen Server). Replicate CurrentHealth with an OnRep updating the HUD. Damage on the server window; watch the client HUD follow.",
quiz:[
{q:"In Unreal's model, the truth lives…",o:["on whichever client acted","on the server","split evenly","in GameInstance"],a:1,x:"Server-authoritative: clients see replicated copies and send requests."},
{q:"A Replicated property needs all EXCEPT…",o:["UPROPERTY(Replicated)","registration in GetLifetimeReplicatedProps","bReplicates = true on the actor","a manual send call every change"],a:3,x:"There is no manual send — the engine detects changes and replicates. That's the point."},
{q:"Client should play a sound when Health changes. Use…",o:["Tick comparison","ReplicatedUsing = OnRep_Health","a Server RPC","GameMode"],a:1,x:"RepNotify functions fire on clients when the new value lands — the networked change-hook."}]},

{id:"ue9b", t:"RPCs: talking across the wire", min:8,
body:`<p>Replication moves <em>state</em> downstream; <strong>RPCs</strong> move <em>events</em> in any direction. Three UFUNCTION flavors: <code>Server</code> (client → server: "I want to fire" — callable only from the owning client), <code>Client</code> (server → one owner: "you specifically took damage"), and <code>NetMulticast</code> (server → everyone: "explosion here, all of you play the effect"). Add <code>Reliable</code> for must-arrive gameplay events; leave cosmetic spam unreliable. Naming convention you'll see everywhere: <code>ServerFire()</code>, <code>ClientNotifyKill()</code>, <code>MulticastPlayExplosion()</code>.</p>
<p>Two iron rules. One: <strong>never trust the client</strong> — Server RPCs take <code>WithValidation</code>, and your <code>_Validate</code> function returning false disconnects the cheater; validate ammo counts, cooldowns, ranges server-side even when the client already checked. Two: RPCs are for <em>events</em>, replication is for <em>state</em>. If you're multicasting a health value, you wanted a Replicated property; if late-joiners need to see it, it must be state — multicasts are fire-and-forget and new clients never hear old ones.</p>`,
cmp:[["[Command] (client→server)","UFUNCTION(Server, Reliable, WithValidation)"],["[ClientRpc] (server→owner)","UFUNCTION(Client, Reliable)"],["[ClientRpc] to all","UFUNCTION(NetMulticast, …)"],["Channel: reliable/unreliable","Reliable keyword (or not)"],["Server-side checks you hopefully wrote","_Validate — return false = kick"]],
task:"Make capstone firing server-authoritative: input calls ServerFire (Reliable, WithValidation — reject if cooldown active), the server spawns the projectile, and a Multicast plays muzzle flash on all clients.",
quiz:[
{q:"Client wants the server to spawn its projectile:",o:["Client RPC","Server RPC from the owning client","NetMulticast","Just SpawnActor locally"],a:1,x:"Requests flow client→server via Server RPCs; the server does the authoritative spawn."},
{q:"A late-joining player must see the door's open state. You use…",o:["NetMulticast when it opened","a Replicated property (state, not event)","Client RPC to newcomers","GameInstance"],a:1,x:"Multicasts are fire-and-forget events; persistent facts are replicated state."},
{q:"_Validate returning false…",o:["logs a warning","re-runs the RPC","disconnects the caller","rolls back state"],a:2,x:"Failed validation = presumed tampering = kicked. Validate the cheap invariants there."}]},

{id:"ue9c", t:"The framework, revisited online", min:8,
body:`<p>Now the Gameplay Framework's weird divisions finally justify themselves. <strong>GameMode exists only on the server</strong> — clients literally don't have one, which is why rules and spawning live there: unhackable by construction. <strong>GameState replicates to everyone</strong>: match timer, phase, team scores. <strong>PlayerState replicates per player</strong>: names, scores, ping — and survives Pawn death, which is why your kill-feed reads names from PlayerState, never from the Pawn that just exploded. PlayerController is private to its owning client (plus the server); Pawns replicate to all. That table from chapter 2? It was a network topology diagram all along.</p>
<p>Ownership ties it together: a client owns its PlayerController and possessed Pawn, and only owned actors may call Server RPCs — that's why input handling lives in PlayerController/Pawn. Practical spawning rule: gameplay actors spawn <strong>on the server</strong> (they replicate down automatically); spawn on a client and you've made a local ghost no one else can see. When you're ready to go deeper, the magic words are <em>Lyra</em>, <em>Iris</em> and the <em>Network Prediction</em> plugin — but everything above is enough to ship co-op.</p>`,
diagTitle:"Who exists where",
diag:["GameMode|server only — the referee","GameState|server + all clients","PlayerState|per player, replicated to all","PlayerController|owner + server only","Pawn|replicated to everyone"],
cmp:[["GameManager guarded by isServer","GameMode (server-only by construction)"],["Synced match vars","GameState replicated properties"],["Player dictionary you synced","PlayerState (auto, survives respawn)"],["Everyone's input scripts everywhere","Input only on owning client's Controller/Pawn"],["Spawn + NetworkServer.Spawn()","SpawnActor on server (replicates itself)"]],
task:"Move your capstone wave counter into GameState (Replicated) and score into PlayerState. Two-player PIE: verify both windows agree on the wave, and each shows both scores.",
quiz:[
{q:"Clients can't cheat GameMode rules because…",o:["it's encrypted","GameMode doesn't exist on clients","validation catches it","it's const"],a:1,x:"Server-only by design — there is nothing client-side to tamper with."},
{q:"The kill-feed shows the victim's name from…",o:["the destroyed Pawn","PlayerState","GameMode","the HUD widget"],a:1,x:"PlayerState replicates to everyone and outlives the Pawn — exactly for this."},
{q:"A client calls SpawnActor for a pickup. Result:",o:["replicates to all","exists only on that client","crashes","spawns on server instead"],a:1,x:"Client-spawned actors are local ghosts. Gameplay spawning happens on the server, which replicates down."}]}
]},
{id:"ue10", t:"AI: Behavior Trees & Perception", skills:["Structure AI as Behavior Tree + Blackboard","Write custom Tasks, Decorators and Services","Give AI senses with the Perception system","Move pawns with the NavMesh like a civilized person"], lessons:[

{id:"ue10a", t:"Behavior Trees & the Blackboard", min:9,
body:`<p>Your capstone enemy Ticks toward the player — fine for wave 1, unmaintainable by wave 5. Unreal's answer isn't "write a bigger state machine": it's a first-class visual AI system. Split the brain in two: the <strong>Blackboard</strong> is the AI's memory — typed key/value pairs (TargetActor, LastKnownLocation, bCanSeePlayer) — and the <strong>Behavior Tree</strong> is the decision logic reading and writing it. The <strong>AIController</strong> (Controller possession, paying off again) runs the tree with <code>RunBehaviorTree</code>.</p>
<p>Trees execute left-to-right, depth-first, re-evaluating from the root. Two composite nodes do most of the work: <strong>Selector</strong> tries children until one <em>succeeds</em> ("attack, else chase, else patrol" — priority order for free) and <strong>Sequence</strong> runs children until one <em>fails</em> ("move to target, then play attack, then cooldown"). If you've used Unity's Behavior Designer or NodeCanvas you know this model — the difference is it's native, networked-aware, and every studio uses the same one.</p>`,
diagTitle:"The AI stack",
diag:["Pawn|the body","AIController|the will — runs the tree","Behavior Tree|decisions","Blackboard|memory (typed keys)"],
cmp:[["Update() if/else AI","Behavior Tree asset"],["Fields on the AI script","Blackboard keys"],["Behavior Designer (paid asset)","Built-in BT editor"],["switch(state) machine","Selector = priorities, Sequence = steps"],["GetComponent<AIBrain>()","GetBlackboardComponent()"]],
task:"Create BB_Enemy (keys: TargetActor, HomeLocation) and BT_Enemy with a Selector: [Sequence: chase & attack when TargetActor set] else [patrol home]. AIController runs it on possess. Your capstone enemy just got a brain transplant.",
quiz:[
{q:"A Selector node…",o:["runs all children","runs children until one SUCCEEDS","runs children until one FAILS","picks randomly"],a:1,x:"Selector = 'try options in priority order'. Sequence is its dual: run steps until one fails."},
{q:"The AI's memory (target refs, flags) lives in…",o:["the Pawn","the Behavior Tree itself","the Blackboard","GameState"],a:2,x:"Blackboard keys are the shared memory; the tree reads/writes them. Separation keeps trees reusable across enemy types."},
{q:"Who actually runs the Behavior Tree?",o:["the Pawn's Tick","GameMode","the AIController","the Level Blueprint"],a:2,x:"RunBehaviorTree lives on AIController — the same possession model as players, which is why AI and players can swap bodies."}]},

{id:"ue10b", t:"Tasks, Decorators, Services", min:8,
body:`<p>Three node types you'll author: <strong>Tasks</strong> are leaves that <em>do</em> things — MoveTo and Wait ship built-in; custom ones subclass <code>BTTask_BlueprintBase</code> (or <code>UBTTaskNode</code> in C++) and must call <code>FinishExecute(success)</code> — forget it and the tree hangs forever on that node, the classic first BT bug. <strong>Decorators</strong> are conditions bolted onto nodes — "Blackboard key TargetActor is Set" gates the combat branch. Their <em>observer aborts</em> setting is the magic: "abort lower priority" means the instant the player is spotted, the patrol branch is interrupted mid-walk. That's the reactive behavior your Update() spaghetti faked poorly. <strong>Services</strong> tick on a schedule while their branch is active — "every 0.5s, update distance-to-target" — your controlled, honest replacement for per-frame polling.</p>
<p>Movement itself is the easy part: bake a <strong>NavMesh</strong> by dropping a NavMeshBoundsVolume (press P to see the green), and MoveTo tasks path across it. Same recast tech as Unity's NavMesh — agents, areas and links included.</p>`,
cmp:[["Custom action nodes","BTTask (FinishExecute or it hangs!)"],["if-guards around behavior","Decorators (+ observer aborts = interrupts)"],["Polling in Update()","Services (scheduled, scoped to a branch)"],["NavMesh bake button","NavMeshBoundsVolume (auto-bake, P to view)"],["agent.SetDestination(pos)","MoveTo task / AIController MoveToActor"]],
task:"Write BTTask_FindPatrolPoint (random reachable point near HomeLocation → writes a Blackboard key), and add a 'TargetActor Is Set' decorator with Observer Aborts: Lower Priority. Watch the patrol get interrupted the frame you're seen.",
quiz:[
{q:"Your custom Task runs once and the tree freezes on it. You forgot…",o:["a Blackboard key","FinishExecute","to bake NavMesh","Tick"],a:1,x:"Tasks are latent: the tree waits until you report success/failure via FinishExecute."},
{q:"'Observer Aborts: Lower Priority' on a decorator means…",o:["nothing below ever runs","when the condition changes, currently-running lower-priority branches are interrupted","the tree restarts","it disables the node"],a:1,x:"That setting is what makes BTs reactive — spotted-player instantly cancels patrol."},
{q:"Per-half-second target distance checks belong in a…",o:["Task","Decorator","Service","GameMode timer"],a:2,x:"Services tick on their own interval while the branch runs — scheduled polling, scoped and visible."}]},

{id:"ue10c", t:"AI Perception", min:7,
body:`<p>Stop checking distance-to-player in Tick: <strong>AIPerception</strong> gives AI actual senses. Add the component to the AIController, configure senses — Sight (radius, peripheral angle, lose-sight radius), Hearing, Damage — and bind <code>OnTargetPerceptionUpdated</code>. The event hands you the actor and an <code>FAIStimulus</code>: successfully sensed or lost, where, how strongly. Your handler writes TargetActor / LastKnownLocation to the Blackboard, and the tree's decorators do the rest — perception feeds memory, memory drives decisions. Clean pipeline, zero polling.</p>
<p>Targets need a <code>AIPerceptionStimuliSource</code> component registered for the senses that should detect them (players don't emit "visibility" automatically). Debug everything with the <strong>gameplay debugger</strong> — apostrophe key (') in PIE — live view of perception cones, blackboard values and the running tree branch. It will save you hours; learn the key now.</p>`,
cmp:[["Vector3.Distance checks in Update","AIPerception Sight sense (cone + radii)"],["Physics.OverlapSphere for hearing","Hearing sense + Report Noise Event"],["Custom 'can see player' raycast rig","Line-of-sight handled by the sense"],["Debug.DrawWireSphere debugging","Gameplay Debugger (apostrophe in PIE)"]],
task:"Give your capstone enemy Sight-based perception: on sensed → set TargetActor; on lost → write LastKnownLocation and clear TargetActor after a 3s 'search' Wait. Verify cones with the gameplay debugger.",
quiz:[
{q:"The AI never sees the player because…",o:["sight radius too big","the player lacks a PerceptionStimuliSource registered for Sight","perception is C++ only","NavMesh missing"],a:1,x:"Detection is two-sided: the sensor perceives, the target must register as a stimuli source."},
{q:"OnTargetPerceptionUpdated typically writes to…",o:["GameState","the Behavior Tree directly","Blackboard keys","PlayerState"],a:2,x:"Perception → Blackboard → decorators react. Each layer stays dumb and testable."},
{q:"Live-view an AI's senses and blackboard in PIE with…",o:["stat ai","the apostrophe-key Gameplay Debugger","Unreal Insights","show collision"],a:1,x:"The gameplay debugger overlays perception cones, BB values and the active tree branch — the single best AI debugging tool in the engine."}]}
]},
{id:"ue11", t:"Audio with MetaSounds", skills:["Play one-shots and attached sounds correctly","Build a MetaSound with runtime parameters","Mix with Sound Classes and Submixes","Add attenuation and occlusion to world sounds"], lessons:[

{id:"ue11a", t:"Playing sound, the Unreal way", min:7,
body:`<p>The AudioSource/AudioClip pair splits by intent: fire-and-forget one-shots via <code>UGameplayStatics::PlaySoundAtLocation</code> / <code>PlaySound2D</code> (UI), a following emitter via <code>SpawnSoundAttached</code> (returns an AudioComponent — your handle to stop/fade/retune), or a placed <strong>AmbientSound</strong> actor for loops living in the level. Spatialization ships in <strong>Sound Attenuation</strong> assets — distance curves, spread, and <em>occlusion</em> (muffled-behind-walls, a trace-based checkbox Unity made you build) — reusable across any number of sounds.</p>
<p>Variety without code: a <strong>Sound Cue</strong> (classic) or <strong>MetaSound</strong> wraps waves in a graph — Random node into Modulator (pitch ±10%) and your one footstep asset stops sounding like a metronome. The habit to import: gameplay code plays <em>assets that decide for themselves</em>; it never picks variations.</p>`,
cmp:[["AudioSource.PlayClipAtPoint","PlaySoundAtLocation"],["AudioSource on a moving object","SpawnSoundAttached → AudioComponent"],["2D UI sound hack (spatialBlend 0)","PlaySound2D"],["Rolloff curves per source","Sound Attenuation asset (shared)"],["Occlusion via your own raycasts","Attenuation → Enable Occlusion ✓"],["Randomizer script for clips","Sound Cue / MetaSound Random node"]],
task:"Capstone audio pass: fire = PlaySoundAtLocation with a Cue randomizing 3 variants ±pitch; enemy death = attached sound; one ambient hum actor with attenuation + occlusion. Walk behind a wall and listen.",
quiz:[
{q:"A sound that must follow a moving rocket:",o:["PlaySoundAtLocation each frame","SpawnSoundAttached","AmbientSound actor","PlaySound2D"],a:1,x:"Attached sounds ride the component and hand you an AudioComponent to stop or fade later."},
{q:"Muffling sounds behind geometry is…",o:["a DSP plugin you buy","Enable Occlusion on the Attenuation asset","impossible in real time","a Niagara feature"],a:1,x:"Trace-based occlusion is a checkbox on attenuation settings."},
{q:"Footstep variety belongs in…",o:["a C++ array + RandRange","the animation blueprint","a Sound Cue/MetaSound with a Random node","one longer wav"],a:2,x:"Assets own their variation; code just says 'play footstep'."}]},

{id:"ue11b", t:"MetaSounds & the mix", min:8,
body:`<p><strong>MetaSounds</strong> are UE5's procedural audio engine: a node graph that IS the DSP — oscillators, envelopes, filters, sample players — with typed <strong>inputs you set from gameplay</strong>. Build an engine hum whose pitch input is driven by speed: <code>AudioComponent->SetFloatParameter("Speed", Velocity)</code> and the graph reacts live. It's the audio sibling of the Material/Niagara graphs you already know, replacing the FMOD/Wwise middleware many Unity teams bolted on.</p>
<p>Mixing: every sound routes through a <strong>Sound Class</strong> hierarchy (Master → SFX/Music/UI — your mixer groups, and where the options-menu volume sliders hook in via Sound Mix overrides), and <strong>Submixes</strong> carry shared effect chains — reverb on everything world-side, a low-pass "you're hurt" filter on the SFX submix. Ducking dialogue over music is a passive Sound Mix, not a script.</p>`,
cmp:[["FMOD/Wwise parameter","MetaSound input + SetFloatParameter"],["AudioMixer groups","Sound Classes (hierarchy)"],["Mixer effect sends","Submixes with effect chains"],["Snapshot ducking","Sound Mix (push/pop, passive triggers)"],["Volume sliders → mixer.SetFloat","Sound Mix class adjusters"]],
task:"Build MS_EngineHum (saw osc → filter, float input 'Speed' → pitch), attach to your character, drive the parameter from velocity in Tick. Then add Master/SFX/Music Sound Classes and a working SFX volume slider.",
quiz:[
{q:"Gameplay changes a running MetaSound via…",o:["restarting it","SetFloatParameter on its AudioComponent","a Server RPC","editing the asset"],a:1,x:"Typed graph inputs are the contract; components set them live."},
{q:"Options-menu volume sliders map to…",o:["each AudioComponent","Sound Classes (via a Sound Mix)","Submixes only","the master wav"],a:1,x:"Class hierarchy = mixer groups; a Sound Mix adjusts a class's volume globally."},
{q:"Reverb on all world audio but not UI:",o:["per-sound reverb settings","route world sounds to a Submix with a reverb effect","a post-process volume","impossible"],a:1,x:"Submixes are the effect buses; UI class simply routes elsewhere."}]}
]},
{id:"ue12", t:"Working Like a Studio", skills:["Explain why Perforce dominates UE teams and use it or Git+LFS sanely","Never edit engine-Content, always migrate properly","Redirectors: what they are and when to fix them up","Structure a project team-scale from day one"], lessons:[

{id:"ue12a", t:"Version control for binary worlds", min:8,
body:`<p>Unity spoiled you: YAML scenes, text prefabs, Git mostly works. Unreal assets are <strong>binary</strong> — .uasset and .umap don't merge, ever. Two people editing one file = one person's day deleted. Hence studio reality: <strong>Perforce</strong> dominates, not from tradition but because <em>exclusive checkout</em> (locking) prevents the unmergeable conflict instead of detecting it after. The editor has source control built in — checkout, submit, file history, and lock states shown right on asset icons in the Content Browser.</p>
<p>Git works for solo/small teams with rules: <strong>Git LFS</strong> for all binaries (there's a standard UE .gitattributes), lock discipline via LFS file locking, commit <code>Content/ Config/ Source/ *.uproject</code> and ignore <code>Binaries/ Intermediate/ Saved/ DerivedDataCache/</code>. And the modern peace treaty for maps: <strong>One File Per Actor</strong> (chapter 5!) turns level edits into per-actor files, so two people finally CAN work in the same map.</p>`,
cmp:[["Git + YAML merges","Perforce + exclusive checkout (binary reality)"],["Library/ in .gitignore","Binaries/ Intermediate/ Saved/ DDC ignored"],["Smart Merge for scenes","No merge — locks + One File Per Actor"],["Plastic/Unity VCS","Perforce Helix (or Git LFS w/ locking)"],["Editor VCS plugin","Built-in: checkout/submit in Content Browser"]],
task:"Set your capstone up properly: git init with the standard UE .gitignore + LFS .gitattributes, enable OFPA on your map, first commit. Future-you sends regards.",
quiz:[
{q:"Perforce rules UE studios because…",o:["Epic owns it","exclusive checkout prevents unmergeable binary conflicts","it's free","Git can't store big files"],a:1,x:"You can't merge a .uasset; locking makes the conflict impossible rather than discovered."},
{q:"NOT in version control:",o:["Content/","Config/","Intermediate/ and Saved/","Source/"],a:2,x:"Binaries, Intermediate, Saved, DDC are all regenerated — committing them is pure pain."},
{q:"Two designers, one map, no tears:",o:["impossible","shifts","One File Per Actor","copy the map twice"],a:2,x:"OFPA externalizes each actor to its own file — per-actor locks instead of one giant .umap."}]},

{id:"ue12b", t:"Asset hygiene: migrate, redirect, structure", min:7,
body:`<p>Three habits separating pros from crime scenes. <strong>One:</strong> assets reference each other by path, so never move/rename in the OS file explorer — only inside the Content Browser, which maintains references and leaves <strong>redirectors</strong> (invisible forwarding addresses) at old locations. They're harmless until they're not (stale refs, packaging surprises); right-click folder → <em>Fix Up Redirectors</em> regularly. <strong>Two:</strong> moving content between projects is <em>Migrate</em> (right-click → Asset Actions), which brings the full dependency chain — copying files by hand brings broken references. <strong>Three:</strong> structure — top-level project folder (<code>/Game/NeonArena/…</code>) so marketplace imports don't interleave with your work; prefix discipline (BP_, WBP_, M_, MI_, NS_, SFX_, DT_) because search is how large projects navigate; and check the <em>Reference Viewer</em> (right-click any asset) before deleting anything — it's the dependency graph Unity never showed you.</p>`,
cmp:[["Move files in Explorer/Finder (fine-ish)","Content Browser ONLY — refs break otherwise"],["unitypackage export/import","Migrate (dependency-aware)"],["GUID-based refs (move-proof)","Path-based refs + redirectors (fix them up)"],["Find References (script refs)","Reference Viewer (full asset graph)"],["Loose naming, folders by type","Project root folder + strict prefixes"]],
task:"Hygiene pass on the capstone: everything under /Game/NeonArena, prefixes enforced, Fix Up Redirectors on the root, then open the Reference Viewer on your character and admire the dependency web.",
quiz:[
{q:"You renamed an asset in Windows Explorer. Now…",o:["nothing, refs are GUIDs","every reference to it is broken","the editor fixes it on start","only BPs break"],a:1,x:"UE references are path-based; the Content Browser maintains them, the OS doesn't."},
{q:"Redirectors are…",a:1,o:["corrupt assets","forwarding stubs left after moves — fix them up periodically","a networking feature","editor-only shortcuts"],x:"Tiny 'moved to X' notes keeping old paths alive. Fix Up Redirectors consolidates before they bite packaging."},
{q:"Reusing your health system in a new project:",o:["copy the uassets over","Migrate from the Content Browser","export FBX","rebuild it"],a:1,x:"Migrate walks the dependency graph and brings everything the asset needs."}]}
]}
]
