/* ---------- lesson / path lookups ---------- */
const ALL_LESSONS = [];
const L_INDEX = {};   // lessonId -> {path, chapter, lesson, ci, li, flat}
PATHS.forEach(p => p.chapters.forEach((c, ci) => c.lessons.forEach((l, li) => {
  const rec = { path: p, chapter: c, lesson: l, ci, li, flat: ALL_LESSONS.length };
  ALL_LESSONS.push(rec); L_INDEX[l.id] = rec;
})));
const pathLessons = p => p.chapters.flatMap(c => c.lessons);
const pathDone   = p => pathLessons(p).filter(l => S.done[l.id]).length;
const pathPct    = p => Math.round(100 * pathDone(p) / pathLessons(p).length);
const chapterDone = c => c.lessons.every(l => S.done[l.id]);
const chapterMastered = c => (S.boss[c.id] || 0) >= 80;
const chapterUnlocked = (p, ci) => ci === 0 || chapterDone(p.chapters[ci-1]);
const lessonUnlocked = id => {
  const r = L_INDEX[id];
  if (!chapterUnlocked(r.path, r.ci)) return false;
  return r.li === 0 || !!S.done[r.chapter.lessons[r.li-1].id];
};
const totalDone = () => Object.keys(S.done).length;

/* ---------- levels & XP ---------- */
function levelInfo(xp){
  let lv = 1;
  for (let i = 0; i < LEVELS.length; i++) if (xp >= LEVELS[i].xp) lv = i + 1;
  const cur = LEVELS[lv-1];
  const next = LEVELS[lv] || null;
  const extra = !next ? { xp: cur.xp + 1000, r: "Bridge Master" } : null; // soft-cap continuation
  const nxt = next || extra;
  return { lv, rank: cur.r, cur: cur.xp, next: nxt.xp, pct: Math.min(100, Math.round(100*(xp-cur.xp)/(nxt.xp-cur.xp))) };
}

function logDay(xp, acts){
  const k = new Date().toISOString().slice(0, 10);
  const e = S.log[k] || (S.log[k] = { xp: 0, acts: 0 });
  e.xp += xp; e.acts += acts;
}
function addXP(n, label){
  if (n <= 0) return;
  logDay(n, 1);
  const before = levelInfo(S.xp).lv;
  S.xp += n;
  toast("xp", "⚡", "+" + n + " XP", label || "");
  const after = levelInfo(S.xp);
  if (after.lv > before){
    S.seenLevel = after.lv;
    showLevelUp(after.lv, after.rank);
    grant("lvl5", after.lv >= 5);
  }
  renderChrome(); persist();
}

/* ---------- achievements ---------- */
function grant(id, cond = true){
  if (!cond || S.ach[id]) return;
  const a = ACHIEVEMENTS.find(x => x.id === id);
  if (!a) return;
  S.ach[id] = true;
  sfx("ach");
  toast("ach", a.ico, "Achievement unlocked", a.t + " · +" + a.xp + " XP");
  S.xp += a.xp;   // silent add (toast already shows it)
  const li = levelInfo(S.xp);
  if (li.lv > S.seenLevel){ S.seenLevel = li.lv; showLevelUp(li.lv, li.rank); }
  renderChrome(); persist();
}
function checkGlobalAchievements(){
  grant("first", totalDone() >= 1);
  const t = Object.keys(S.tasks).length;
  grant("tasks5", t >= 5); grant("tasks15", t >= 15);
  grant("half", totalDone() >= Math.ceil(ALL_LESSONS.length/2));
  PATHS.forEach(p => grant("path"+p.id, pathDone(p) === pathLessons(p).length));
  grant("all", totalDone() === ALL_LESSONS.length);
  const labAll = LAB.flatMap(c => c.items).filter(e => !e.scratch);
  const labN = labAll.filter(e => S.lab[e.id]).length;
  grant("labrat", labN >= 1);
  grant("labmaster", labN === labAll.length);
  const fixAll = LAB.flatMap(c => c.items).filter(e => e.id.startsWith("fix-"));
  grant("fixit", fixAll.length > 0 && fixAll.every(e => S.lab[e.id]));
  grant("scribe", Object.values(S.notes).filter(n => n && n.trim().length >= 10).length >= 5);
  grant("streak3", S.streak >= 3); grant("streak7", S.streak >= 7);
}

/* ---------- streak ---------- */
function touchStreak(){
  const today = new Date(); today.setHours(0,0,0,0);
  const t = today.getTime();
  if (S.lastActive === t) return;
  const yesterday = t - 86400000;
  logDay(0, 1);
  S.streak = (S.lastActive === yesterday) ? S.streak + 1 : 1;
  S.lastActive = t;
  grant("streak3", S.streak >= 3); grant("streak7", S.streak >= 7);
  persist();
}



/* ----- sound effects (tiny synth, optional) ----- */
let audioCtx = null;
function sfx(kind){
  if (!S.sound) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    const tone = (freq, start, dur, vol, type) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || "sine"; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t + start);
      g.gain.linearRampToValueAtTime(vol, t + start + .012);
      g.gain.exponentialRampToValueAtTime(.0001, t + start + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + start); o.stop(t + start + dur + .05);
    };
    if (kind === "right") tone(880, 0, .14, .16);
    else if (kind === "wrong") tone(196, 0, .2, .14, "square");
    else if (kind === "level"){ tone(523, 0, .12, .15); tone(659, .1, .12, .15); tone(784, .2, .2, .16); }
    else if (kind === "ach"){ tone(659, 0, .1, .13); tone(988, .09, .18, .14); }
  } catch(e){}
}

/* ----- confetti ----- */
function confetti(){
  const colors = ["#4FA8FF","#9DC549","#F3B84B","#45D07E","#D89BF5","#EF6A6A"];
  for (let i = 0; i < 70; i++){
    const c = document.createElement("div");
    c.className = "cf";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (1.6 + Math.random() * 1.6) + "s";
    c.style.animationDelay = Math.random() * .4 + "s";
    c.style.transform = "rotate(" + Math.random() * 360 + "deg)";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3600);
  }
}

/* ---------- toasts & level-up ---------- */
function toast(kind, ico, title, msg){
  const el = document.createElement("div");
  el.className = "toast" + (kind === "xp" ? " xp" : "");
  el.innerHTML = `<div class="tico">${ico}</div><div><h5>${esc(title)}</h5><p>${esc(msg)}</p></div>`;
  $("#toasts").appendChild(el);
  setTimeout(() => { el.classList.add("out"); setTimeout(() => el.remove(), 380); }, kind === "xp" ? 2400 : 4200);
}
function showLevelUp(lv, rank){
  confetti(); sfx("level");
  const o = document.createElement("div");
  o.className = "lvlup";
  o.innerHTML = `<div class="box"><div style="font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase">Level up</div>
    <div class="big">${lv}</div><div class="rk">${esc(rank)}</div>
    <p style="color:var(--muted);font-size:13px;margin:6px 0 18px">Keep crossing the bridge.</p>
    <button class="btn">Continue</button></div>`;
  o.querySelector(".btn").onclick = () => o.remove();
  o.addEventListener("click", e => { if (e.target === o) o.remove(); });
  document.body.appendChild(o);
}


/* ----- first-launch tour ----- */
function runTour(){
  const steps = [
    ["👋 Welcome to Bridge", "You already know how to make games — this academy only teaches what's DIFFERENT in Unreal. Three paths on the left: the Engine, C++, and gluing them together. Chapters unlock in order; quizzes gate lessons."],
    ["🥋 Practice wing", "The C++ Lab compiles real code (with an AI reviewer), the Dojo drills typing, code-reading and Blueprint-reading, Daily Review resurfaces what you got wrong, and the Capstone walks you through building an actual game."],
    ["⇄ Reference wing", "The Translator maps every Unity concept to its Unreal name (printable!), the Glossary links to official Epic docs. Both searchable — but the fastest way anywhere is Ctrl+K, from any screen."],
    ["⚡ The meta-game", "XP, levels, streaks, 30 achievements, per-chapter mastery. The streak feeds on ANY daily activity — one review or dojo round keeps it alive. Stats tracks everything from today onward."],
    ["🚀 One suggestion", "Don't binge lessons. The loop that works: 2-3 lessons → the matching Lab exercises → next day, Daily Review → boss quiz when a chapter's done. Now go — the Editor chapter is 8 minutes."]
  ];
  let i = 0;
  const ov = document.createElement("div");
  ov.className = "lvlup";
  const draw = () => {
    ov.innerHTML = `<div class="box" style="max-width:460px;text-align:left">
      <div style="font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase">Tour ${i + 1} / ${steps.length}</div>
      <h2 style="font-family:var(--disp);font-size:20px;margin:8px 0 10px">${steps[i][0]}</h2>
      <p style="color:#CBD4E4;font-size:13.5px;line-height:1.65;margin-bottom:18px">${steps[i][1]}</p>
      <div style="display:flex;gap:10px">
        <button class="btn" id="tour-next">${i < steps.length - 1 ? "Next →" : "Let's go 🚀"}</button>
        ${i < steps.length - 1 ? '<button class="btn ghost" id="tour-skip">Skip</button>' : ""}
      </div></div>`;
    ov.querySelector("#tour-next").onclick = () => { i++; if (i >= steps.length){ done(); } else draw(); };
    const sk = ov.querySelector("#tour-skip"); if (sk) sk.onclick = done;
  };
  const done = () => { ov.remove(); S.toured = true; persist(); };
  document.body.appendChild(ov);
  draw();
}

/* ---------- shared render helpers ---------- */
function xlateHTML(cmp){
  const cell = s => { const [a, b] = s.split("|"); return esc(a) + (b ? `<small>${esc(b)}</small>` : ""); };
  return `<div class="xlate"><div class="xh"><div class="hu">In Unity</div><div></div><div class="he">In Unreal</div></div>` +
    cmp.map(r => `<div class="xrow"><div class="xu">${cell(r[0])}</div><div class="xa">→</div><div class="xe">${cell(r[1])}</div></div>`).join("") + `</div>`;
}
function pipeHTML(title, diag){
  const box = s => { const [a, b] = s.split("|"); return `<div class="pbox">${esc(a)}${b ? `<small>${esc(b)}</small>` : ""}</div>`; };
  return (title ? `<div class="diag-title">${esc(title)}</div>` : "") +
    `<div class="pipe">` + diag.map(box).join(`<div class="parr">→</div>`) + `</div>`;
}
function pathIcon(p){ return { ue: "🏰", cpp: "⟬⟭", int: "⚙️" }[p.id] || "📗"; }

/* ---------- views ---------- */
let view = "dash";
function nav(v){
  if (view === "review" && v !== "review") revDeck = null;
  if (view.startsWith("boss:") && v !== view){ bossDeck = null; bossCh = null; }
  view = v;
  document.querySelectorAll(".navbtn").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("on");
  render();
  window.scrollTo({ top: 0 });
  content.focus({ preventScroll: true });
}

function render(){
  if (view === "dash") return renderDash();
  if (view.startsWith("path:")) return renderPath(view.slice(5));
  if (view.startsWith("lesson:")) return renderLesson(view.slice(7));
  if (view === "lab") return renderLab();
  if (view === "review") return renderReview();
  if (view === "capstone") return renderCapstone();
  if (view.startsWith("boss:")) return renderBoss(view.slice(5));
  if (view === "dojo") return renderDojo();
  if (view === "stats") return renderStats();
  if (view === "translator") return renderTranslator();
  if (view === "glossary") return renderGlossary();
  if (view === "achievements") return renderAch();
}

  if (openChapter[pid] === undefined){
    let idx = p.chapters.findIndex((c, ci) => chapterUnlocked(p, ci) && !chapterDone(c));
    openChapter[pid] = idx === -1 ? p.chapters.length - 1 : idx;
  }
  content.innerHTML = `
  <div class="crumb"><a data-go="dash">Dashboard</a> / ${esc(p.title)}</div>
  <h1 class="page">${pathIcon(p)} ${esc(p.title)}</h1>

  </div>
  ${p.chapters.map((c, ci) => {
    const unlocked = chapterUnlocked(p, ci);

      <div class="chap-head" role="button" tabindex="0" aria-expanded="${open}">
        <span class="num">CH ${String(ci+1).padStart(2,"0")}</span>

        ${chapterMastered(c) ? `<span class="tag gold">★ mastered</span>` : ""}
        <span class="tag${cdone===c.lessons.length ? " ok" : ""}">${unlocked ? cdone + "/" + c.lessons.length : "🔒"}</span>

        ${!unlocked ? `<div class="chap-lock">🔒 Finish <strong>${esc(p.chapters[ci-1].t)}</strong> (all lessons + quizzes) to unlock this chapter.</div>` : ""}
        ${c.lessons.map(l => {
          const done = !!S.done[l.id], unl = unlocked && lessonUnlocked(l.id);

          </div>`;
        }).join("")}
        ${(() => {
          const all = cdone === c.lessons.length;
          const best = S.boss[c.id];
          return `<div class="lesson-row${chapterMastered(c) ? " done" : ""}${all ? "" : " locked"}" style="border-top:1px dashed var(--line2);margin-top:6px;padding-top:12px">
            <div class="dot" style="${chapterMastered(c) ? "" : "border-color:var(--gold);color:var(--gold)"}">${chapterMastered(c) ? "★" : "⚔"}</div>
            <div class="lt" ${all ? `data-go="boss:${c.id}" role="button" tabindex="0"` : ""} style="font-family:var(--disp)">Boss Quiz — mixed exam${best !== undefined ? ` <span class="tag ${chapterMastered(c) ? "gold" : ""}" style="margin-left:6px">best ${best}%</span>` : ""}</div>

        <div class="skillcheck"><h4>Skill checklist — you can now…</h4>

      renderPath(pid);

    h.addEventListener("click", toggle);
    h.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); } });
  });

/* ----- lesson view ----- */
function renderLesson(id){
  const r = L_INDEX[id];
  if (!r || !lessonUnlocked(id)) return nav("path:" + (r ? r.path.id : "ue"));
  const { path: p, chapter: c, lesson: l } = r;
  const done = !!S.done[id];
  const prev = r.flat > 0 ? ALL_LESSONS[r.flat-1] : null;
  const nxt = r.flat < ALL_LESSONS.length-1 ? ALL_LESSONS[r.flat+1] : null;
  const prevSame = prev && prev.path === p ? prev : null;

  content.innerHTML = `
  <div class="crumb"><a data-go="dash">Dashboard</a> / <a data-go="path:${p.id}">${esc(p.title)}</a> / Chapter ${r.ci+1}</div>
  <div class="lesson-hd">
    <span class="tag ue">${esc(c.t)}</span> ${done ? `<span class="tag ok">✓ Completed</span>` : ""}
    <h1>${esc(l.t)}</h1>
    <div class="lesson-meta"><span>⏱ ~${l.min} min</span><span>Lesson ${r.li+1} of ${c.lessons.length}</span></div>
  </div>

  ${l.code ? `<div class="codeblock">${l.code}</div>` : ""}
  ${LESSON_DOCS[id] ? `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:16px">
    <span style="font-size:12px;color:var(--dim)">📚 Official docs:</span>
    ${LESSON_DOCS[id].map(([t, slug]) => `<a class="gl-link" style="margin-left:0" href="${docURLFor(t, slug)}" target="_blank" rel="noopener">${esc(t)} ↗</a>`).join("")}
  </div>` : ""}
  <div class="quiz card" style="margin-top:26px">
    <h2>🧠 Checkpoint quiz <span class="tag">${l.quiz.length} questions · +15 XP each</span></h2>
    ${l.quiz.map((q, qi) => `<div class="qq" data-q="${qi}">
      <div class="qt">${qi+1}. ${esc(q.q)}</div>
      ${q.o.map((o, oi) => `<label class="opt"><input type="radio" name="q${qi}" value="${oi}"><span>${esc(o)}</span></label>`).join("")}
      <div class="qx">${esc(q.x)}</div>
    </div>`).join("")}
    <div class="quiz-result" id="qres"></div>
    <button class="btn" id="grade">${done ? "Retake quiz (no XP)" : "Submit answers"}</button>
  </div>
  <div class="taskbox">
    <h2>⚒️ Mini-task <span class="tag gold">+20 XP</span></h2>
    <p>${esc(l.task)}</p>
    <label><input type="checkbox" id="taskck" ${S.tasks[id] ? "checked disabled" : ""}> I actually did this in the editor — no cheating your future self.</label>
  </div>
  <div style="margin-top:16px"><button class="btn ghost" id="tutor-btn">🤖 Explain this differently</button></div>
  <div id="tutor-panel"></div>
  <div class="notesbox">
    <h2>✍️ My notes</h2>
    <textarea id="lesson-notes" placeholder="Gotchas, aha-moments, things future-you will Google otherwise… Searchable from Ctrl+K.">${esc(S.notes[id] || "")}</textarea>
    <div class="saved" id="notes-saved"></div>
  </div>
  <div class="lesson-nav">
    <button class="btn ghost" id="nav-prev" ${prevSame ? "" : "disabled"}>← ${prevSame ? esc(prevSame.lesson.t) : "Previous"}</button>
    <button class="btn" id="nav-next" ${done ? "" : "disabled"} title="${done ? "" : "Pass the quiz to continue"}">${nxt ? (nxt.path === p ? "Next: " + esc(nxt.lesson.t) : "Next path: " + esc(nxt.path.title)) + " →" : "Finish 🎉"}</button>
  </div>`;

  content.querySelectorAll(".opt input").forEach(inp => inp.addEventListener("change", () => {
    const qq = inp.closest(".qq");
    qq.querySelectorAll(".opt").forEach(o => o.classList.remove("sel"));
    inp.closest(".opt").classList.add("sel");
  }));

  $("#grade").onclick = () => {
    const already = !!S.done[id];
    let correct = 0, answered = 0;
    l.quiz.forEach((q, qi) => {
      const qq = content.querySelector(`.qq[data-q="${qi}"]`);
      const sel = qq.querySelector("input:checked");
      if (!sel) return;
      answered++;
      qq.classList.add("graded");
      qq.querySelectorAll(".opt").forEach((o, oi) => {
        o.classList.remove("sel");
        if (oi === q.a) o.classList.add("right");
        else if (sel.value == oi) o.classList.add("wrong");
        o.querySelector("input").disabled = true;
      });
      const wasRight = +sel.value === q.a;
      if (wasRight) correct++;
      // track misses for Review mode (dedup; clear on later correct answer)
      const miss = S.missed[id] || [];
      const pos = miss.indexOf(qi);
      if (!wasRight && pos === -1) miss.push(qi);
      if (wasRight && pos !== -1) miss.splice(pos, 1);
      if (miss.length) S.missed[id] = miss; else delete S.missed[id];
    });
    if (answered < l.quiz.length){
      $("#qres").innerHTML = `<span style="color:var(--bad)">Answer all ${l.quiz.length} questions first (${answered}/${l.quiz.length}).</span>`;
      content.querySelectorAll(".qq input").forEach(i => i.disabled = false);
      content.querySelectorAll(".qq").forEach(q => { q.classList.remove("graded"); q.querySelectorAll(".opt").forEach(o => o.classList.remove("right","wrong")); });
      return;
    }
    const perfect = correct === l.quiz.length;
    sfx(perfect ? "level" : correct > 0 ? "right" : "wrong");
    $("#qres").innerHTML = `Score: <span style="color:${perfect ? "var(--ok)" : "var(--gold)"}">${correct}/${l.quiz.length}</span>${perfect ? " — perfect! 🎯" : ""}`;
    $("#grade").style.display = "none";
    if (!already){
      S.done[id] = true;
      S.quiz[id] = correct;
      touchStreak();
      addXP(40 + correct * 15 + (perfect ? 25 : 0), "Lesson complete: " + l.t);
      grant("perfect", perfect);
      grant("chapter", chapterDone(c));
      checkGlobalAchievements();
      persist();
      $("#nav-next").disabled = false;
      $("#nav-next").title = "";
    } else if (S.quiz[id] === undefined || correct > S.quiz[id]) {
      S.quiz[id] = correct; persist();
    }
  };

  $("#taskck").addEventListener("change", e => {
    if (!e.target.checked || S.tasks[id]) return;
    S.tasks[id] = true;
    e.target.disabled = true;
    touchStreak();
    addXP(20, "Mini-task: " + l.t);
    checkGlobalAchievements();
    persist();
  });

  $("#tutor-btn").addEventListener("click", () => {
    const panel = $("#tutor-panel");
    panel.className = "tutor";
    const bodyText = l.body.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").slice(0, 2200);
    askClaude("You are tutoring an experienced Unity/C# game developer learning Unreal Engine. They just read a lesson titled \"" + l.t + "\" covering: " + bodyText + "\n\nExplain the same core ideas DIFFERENTLY — a fresh angle, a concrete example or analogy from real game dev, no repetition of the lesson's own phrasing. Max 150 words, plain text, use `backticks` for code terms.", panel);
  });

  let notesTimer = null;
  $("#lesson-notes").addEventListener("input", e => {
    clearTimeout(notesTimer);
    $("#notes-saved").textContent = "…";
    notesTimer = setTimeout(() => {
      const v = e.target.value;
      if (v.trim()) S.notes[id] = v; else delete S.notes[id];
      persist(); checkGlobalAchievements();
      $("#notes-saved").textContent = "saved ✓";
      setTimeout(() => { const el = $("#notes-saved"); if (el) el.textContent = ""; }, 1600);
    }, 500);
  });

  $("#nav-prev").onclick = () => prevSame && nav("lesson:" + prevSame.lesson.id);
  $("#nav-next").onclick = () => {
    if (!S.done[id]) return;
    if (!nxt) return nav("achievements");
    nav(nxt.path === p ? "lesson:" + nxt.lesson.id : "path:" + nxt.path.id);
  };
  wireGo();
}




/* ----- compile-error translator ----- */
const ERR_PATTERNS = [
[/was not declared in this scope|use of undeclared identifier/i, "Undeclared identifier",
 "C++ reads top-down: at this line, the compiler has never heard of that name. Either it's a typo, a missing #include, or — the classic — the function is defined further down. Add a prototype above the first use (that's what headers are for in real projects)."],
[/expected ';' (after class|after struct|at end of declaration)|expected ';' before/i, "Missing semicolon (probably a class)",
 "Class and struct definitions end with `};` — C# never asked this of you. When an avalanche of nonsense errors points at perfectly fine code, look one line ABOVE the first error, usually at the previous class's closing brace."],
[/marked '?override'?,? but does not override|only virtual member functions can be marked/i, "override with nothing to override",
 "Unlike C#, polymorphism is opt-in at the BASE: the base class function must be declared `virtual`. Fix the base, not the child. And while you're there — base classes that get deleted through base pointers need a virtual destructor too."],
[/discards qualifiers|as 'this' argument discards|passing 'const/i, "const infection",
 "A const object can only call methods that promise not to modify it (`void Foo() const`), and can only be passed where const is accepted. Once a caller holds const, the whole call chain must honor it. Fix the promise (add const), don't remove the const."],
[/request for member .* which is of pointer type|member reference type .* is a pointer|use '->'|did you mean to use '->'\?/i, "Dot on a pointer",
 "C# uses `.` for everything; C++ splits it: `.` for objects, `->` for pointers. `Target.Health` on a `Unit*` needs to be `Target->Health` (or dereference first: `(*Target).Health`, which nobody writes)."],
[/no member named|has no member named/i, "No such member",
 "Typo, wrong type, or you're holding something other than what you think — e.g. calling `.Len()` on a raw `char*`, or forgetting the `*` when handing an FString to something expecting a C string."],
[/use of deleted function.*unique_ptr|call to (implicitly-)?deleted (copy )?constructor.*unique_ptr|unique_ptr.*deleted/i, "Tried to copy a move-only type",
 "unique_ptr forbids copies by design — one owner, ever. Hand it over with `std::move(Ptr)` to transfer ownership explicitly. Afterwards the original is empty; that's the feature, not a bug."],
[/no matching function for call|cannot convert '.*' to '.*'|invalid conversion from/i, "Argument type mismatch",
 "The call doesn't line up with any declaration. Usual C#-dev suspects: passing an object where a pointer is wanted (add `&`), a pointer where a reference is wanted (add `*`), or forgetting that `4.5` is a double while the parameter is a float."],
[/format '%\w+' expects (a matching )?argument of type|format specifies type/i, "Format string lies",
 "printf-style formats are unchecked promises: %d wants an int, %f a double, %s a C string (for FString that means `*MyString`). A mismatch compiles, then prints garbage — or in real UE, crashes. Match every specifier exactly."],
[/undefined reference to|linker command failed/i, "Declared but never defined",
 "The compiler was satisfied by a prototype, but the linker went looking for a body and found nothing. You declared the function and never wrote it — or wrote it with a slightly different signature (const mismatch counts)."],
[/does not name a type|unknown type name/i, "Unknown type",
 "The type isn't visible here: missing #include, missing forward declaration, or it's declared below this point in the file. In UE this is usually a missing include for a component/class you're using in a header."],
[/expected unqualified-id|expected declaration/i, "Structural confusion",
 "The parser lost the plot — almost always collateral damage from an earlier error: an unclosed brace, a missing `;` after a class, or a stray character. Fix the FIRST error and recompile; the rest usually evaporate."]
];

function explainErrors(errText){
  const hits = [];
  for (const [re, title, body] of ERR_PATTERNS){
    if (re.test(errText) && !hits.some(h => h.title === title)) hits.push({ title, body });
    if (hits.length >= 3) break;
  }
  if (!hits.length) return "";
  return `<div class="card" style="margin-top:12px;padding:14px 18px;border-left:3px solid var(--ue)">
    <h3 style="font-family:var(--disp);font-size:13.5px;margin-bottom:4px">🩺 What the compiler actually means</h3>
    ${hits.map(h => `<div style="padding:8px 0;border-bottom:1px solid var(--line)">
      <strong style="color:var(--ue);font-size:13px">${esc(h.title)}</strong>
      <p style="font-size:13px;color:var(--muted);margin-top:3px">${esc(h.body)}</p></div>`).join("")}
    <p style="font-size:11.5px;color:var(--dim);margin-top:8px">Golden rule: fix the first error, recompile, repeat. Later errors are often echoes of the first.</p>
  </div>`;
}

/* ----- lab autocomplete (mini IntelliSense) ----- */
const AC_KEYWORDS = "auto bool break case catch char class const constexpr continue default delete do double else enum explicit false float for friend if inline int long mutable namespace new nullptr operator override private protected public return short signed sizeof static struct switch template this throw true try typedef typename union unsigned using virtual void while".split(" ");
const AC_TYPES = "std::string std::vector std::unique_ptr std::make_unique std::move std::function size_t int32 printf".split(" ");
const AC_UE = "UE_LOG UPROPERTY UFUNCTION UCLASS USTRUCT GENERATED_BODY TEXT FString TArray TMap FVector Cast LogTemp EditAnywhere VisibleAnywhere BlueprintReadOnly BlueprintReadWrite BlueprintCallable Category BeginPlay Tick EndPlay Super DeltaTime DECLARE_DELEGATE DECLARE_MULTICAST_DELEGATE_OneParam".split(" ");
const AC_MEMBERS = "Add Num Remove Contains Find Len Broadcast AddLambda BindLambda Execute ExecuteIfBound IsBound Size X Y Z HP Health c_str push_back size get reset".split(" ");
const AC_NS = {
  FString: ["Printf"],
  std: ["string","vector","map","unique_ptr","make_unique","move","function","printf"],
  Super: ["BeginPlay()","Tick(DeltaTime)","EndPlay()"]
};
const AC_SNIPPETS = [
  {displayText:"for (int i…)  ⟶ index loop",      text:"for (int i = 0; i < Count; ++i) {\n    \n}", sel:"Count"},
  {displayText:"for (auto&…)  ⟶ range-for",       text:"for (const auto& Item : Container) {\n    \n}", sel:"Container"},
  {displayText:"UE_LOG(…)  ⟶ log line",           text:"UE_LOG(LogTemp, Log, \"%s\", *Value);", sel:"Value"},
  {displayText:"UPROPERTY(…)  ⟶ designer-tunable", text:"UPROPERTY(EditAnywhere, BlueprintReadOnly, Category = \"Gameplay\")", sel:"Gameplay"},
  {displayText:"UFUNCTION(…)  ⟶ BP-callable",     text:"UFUNCTION(BlueprintCallable)"},
  {displayText:"if (ptr)…  ⟶ null-checked branch", text:"if (Ptr != nullptr) {\n    \n}", sel:"Ptr"},
  {displayText:"class : AActorBase  ⟶ actor skeleton", text:"class AMyActor : public AActorBase {\npublic:\n    using Super = AActorBase;\n    void BeginPlay() override {\n        Super::BeginPlay();\n    }\n};", sel:"AMyActor"}
].map(sn => sn.sel ? Object.assign(sn, { hint: (cm, self, data) => {
  cm.replaceRange(data.text, self.from, self.to);
  const pre = data.text.slice(0, data.text.indexOf(data.sel));
  const preLines = pre.split("\n");
  const line = self.from.line + preLines.length - 1;
  const ch = (preLines.length === 1 ? self.from.ch : 0) + preLines[preLines.length - 1].length;
  cm.setSelection(CodeMirror.Pos(line, ch), CodeMirror.Pos(line, ch + data.sel.length));
}}) : sn);
function bridgeHint(cm){
  const cur = cm.getCursor(), line = cm.getLine(cur.line);
  let start = cur.ch;
  while (start > 0 && /\w/.test(line.charAt(start - 1))) start--;
  const word = line.slice(start, cur.ch);
  const before = line.slice(0, start);
  const lw = word.toLowerCase();
  let pool;

  const ns = before.match(/(\w+)::\s*$/);
  if (ns && AC_NS[ns[1]]) pool = AC_NS[ns[1]].map(t => ({ text: t }));
  else if (/(\.|->)\s*$/.test(before)) pool = AC_MEMBERS.map(t => ({ text: t }));
  else {
    if (word.length < 2) return null;                    // don't spam on single chars
    const docWords = new Set();
    cm.getValue().replace(/[A-Za-z_]\w{2,}/g, w => { docWords.add(w); return w; });
    pool = [...new Set([...AC_UE, ...AC_KEYWORDS, ...AC_TYPES, ...docWords])].map(t => ({ text: t }));
    pool = pool.concat(AC_SNIPPETS);
  }
  const list = pool.filter(c => {
    const t = (c.text || "").toLowerCase();
    if (t === lw) return false;
    return !lw || t.startsWith(lw) || (c.displayText || "").toLowerCase().startsWith(lw);
  }).sort((a, b) => (a.displayText ? 1 : 0) - (b.displayText ? 1 : 0) || (a.text < b.text ? -1 : 1)).slice(0, 50);
  if (!list.length) return null;
  return { list, from: CodeMirror.Pos(cur.line, start), to: CodeMirror.Pos(cur.line, cur.ch) };
}

let labCur = null;          // current exercise id
let labEditor = null;       // CodeMirror instance or null
const labDrafts = {};       // in-session code drafts per exercise

function labExercise(id){ for (const c of LAB) for (const e of c.items) if (e.id === id) return e; return null; }

function renderLab(){

          ${S.lab[ex.id] ? `<span class="tag ok" style="vertical-align:2px">✓ solved</span>` : ""}
        </h2>
        <p>${ex.p}</p>
      </div>
      <div class="cm-wrap">
        <div class="cmhead"><span class="fdot"></span><span class="fdot"></span><span class="fdot"></span>
          ${ex.id}.cpp ${ex.shim ? '· <span style="color:var(--ue)">UE shim prepended</span>' : "· plain C++"}
        </div>
        <div id="lab-editor-host"></div>
      </div>
      <div class="lab-actions">
        <button class="btn" id="lab-run">▶ Compile & run</button>
        <button class="btn ghost" id="lab-check">✓ Check my code</button>
        <button class="btn ghost" id="lab-review">🤖 AI review</button>
        <button class="btn ghost" id="lab-reset">Reset</button>
        <span class="lab-status" id="lab-status"></span>
      </div>
      <div class="console" id="lab-console"><span class="c-dim">// output appears here — Run compiles on a real compiler (needs internet), Check works offline</span></div>
      <div id="lab-explain"></div>
      <div id="lab-checks"></div>
      ${ex.hint ? `<details class="lab-hint"><summary>💡 Stuck? Show hint</summary><p>${esc(ex.hint)}</p></details>` : ""}
      ${ex.shim ? `<details class="lab-hint"><summary>📦 What the UE shim defines</summary><p style="font-family:var(--mono);font-size:12px">UCLASS / UPROPERTY / UFUNCTION / GENERATED_BODY (no-ops) · UE_LOG → printf · TEXT() · FString (with *Str and ::Printf) · TArray (Add/Num/Remove/Contains) · TMap (Add/Find) · FVector (+, *, Size) · Cast&lt;T&gt; → dynamic_cast · DECLARE_DELEGATE / DECLARE_MULTICAST_DELEGATE_OneParam</p></details>` : ""}
    </div>
  </div>`;

  // editor
  const host = $("#lab-editor-host");
  const code = labDrafts[ex.id] !== undefined ? labDrafts[ex.id] : ex.starter;
  if (window.CodeMirror){
    labEditor = CodeMirror(host, {
      value: code, mode: "text/x-c++src", lineNumbers: true,
      indentUnit: 4, tabSize: 4, indentWithTabs: false,
      viewportMargin: Infinity,
      extraKeys: {
        Tab: cm => cm.somethingSelected() ? cm.indentSelection("add") : cm.replaceSelection("    "),
        "Ctrl-Space": cm => cm.showHint({ hint: bridgeHint, completeSingle: false })
      }
    });
    labEditor.on("change", () => { labDrafts[ex.id] = labEditor.getValue(); });
    // IntelliSense-style: pop completions as you type
    labEditor.on("inputRead", (cm, change) => {
      if (cm.state.completionActive) return;
      const t = change.text && change.text[0];
      if (!t || !/[\w.:>]/.test(t)) return;
      const cur = cm.getCursor(), lineTo = cm.getLine(cur.line).slice(0, cur.ch);
      if (/(\.|->|::)\s*$/.test(lineTo) || /[A-Za-z_]\w{1,}$/.test(lineTo))
        cm.showHint({ hint: bridgeHint, completeSingle: false });
    });
  } else {
    labEditor = null;
    host.innerHTML = `<textarea class="lab-fallback" id="lab-ta" spellcheck="false"></textarea>`;
    const ta = $("#lab-ta"); ta.value = code;
    ta.addEventListener("input", () => { labDrafts[ex.id] = ta.value; });

  const getCode = () => labEditor ? labEditor.getValue() : $("#lab-ta").value;

  $("#lab-reset").onclick = () => { delete labDrafts[ex.id]; renderLab(); };

  const statusEl = $("#lab-status"), consoleEl = $("#lab-console"), checksEl = $("#lab-checks");

  function runChecks(src){
    if (!ex.checks.length) return { pass: true, html: "" };
    let okAll = true;
    const html = ex.checks.map(([re, msg]) => {
      const ok = re.test(src); okAll = okAll && ok;
      return `<div class="checkline ${ok ? "ok" : "no"}"><span class="ci">${ok ? "✓" : "○"}</span>${esc(msg)}</div>`;
    }).join("");
    return { pass: okAll, html: `<div class="card" style="margin-top:12px;padding:12px 16px">${html}</div>` };
  }

  function solve(){
    if (ex.scratch || S.lab[ex.id]) return;
    S.lab[ex.id] = true;
    touchStreak();
    addXP(ex.xp, "Lab solved: " + ex.t);
    checkGlobalAchievements();
    persist();
    // update in place so the success status/console stay visible
    const btn = content.querySelector(`.lab-ex[data-ex="${ex.id}"]`);
    if (btn){ btn.classList.add("solved"); btn.querySelector(".ldot").textContent = "✓"; }
    const h2 = content.querySelector(".lab-prompt h2");
    if (h2 && !h2.querySelector(".tag.ok")) h2.insertAdjacentHTML("beforeend", ' <span class="tag ok" style="vertical-align:2px">✓ solved</span>');
  }

  $("#lab-review").onclick = () => {
    let panel = $("#lab-tutor");
    if (!panel){ panel = document.createElement("div"); panel.id = "lab-tutor"; panel.className = "tutor"; $("#lab-explain").after(panel); }
    askClaude("You are reviewing C++ code from a Unity/C# developer learning Unreal. Exercise: \"" + ex.t + "\" — " + ex.p.replace(/<[^>]+>/g, "") + "\n\nTheir code:\n```cpp\n" + getCode().slice(0, 3000) + "\n```\n\nGive a brief, direct review: what's correct, what's un-idiomatic for UE-style C++, one concrete improvement. If they haven't attempted much yet, give a nudge not the answer. Max 130 words, plain text, `backticks` for code.", panel);
  };

  $("#lab-check").onclick = () => {
    const r = runChecks(getCode());
    checksEl.innerHTML = r.html;
    if (ex.scratch){ statusEl.className = "lab-status"; statusEl.textContent = "sandbox — nothing to check"; return; }
    statusEl.className = "lab-status " + (r.pass ? "pass" : "fail");
    statusEl.textContent = r.pass ? "All checks pass ✓" : "Not yet — see checklist";
    if (r.pass) solve();
  };

  $("#lab-run").onclick = async () => {
    const src = getCode();
    const full = (ex.shim ? UE_SHIM : "") + src;
    statusEl.className = "lab-status run"; statusEl.textContent = "compiling…";
    $("#lab-explain").innerHTML = "";
    consoleEl.innerHTML = `<span class="c-dim">// sending to compiler (gcc, C++17)…</span>`;
    $("#lab-run").disabled = true;
    try {
      const res = await fetch("https://wandbox.org/api/compile.json", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ compiler: "gcc-head", code: full, options: "warning,c++17" })
      });
      const d = await res.json();
      let out = "";
      if (d.compiler_error) out += `<span class="c-err">${esc(remapLines(d.compiler_error, ex))}</span>\n`;
      else if (d.compiler_message) out += `<span class="c-warn">${esc(remapLines(d.compiler_message, ex))}</span>\n`;
      if (d.program_output) out += esc(d.program_output);
      if (d.program_error) out += `<span class="c-err">${esc(d.program_error)}</span>`;
      const ok = d.status === "0" && !d.compiler_error;
      if (!out.trim()) out = ok ? '<span class="c-dim">// compiled, no output</span>' : '<span class="c-err">// compile failed</span>';
      consoleEl.innerHTML = out;
      const rawErr = (d.compiler_error || "") + (d.compiler_message || "");
      $("#lab-explain").innerHTML = rawErr ? explainErrors(rawErr) : "";

      if (ex.scratch){ statusEl.className = "lab-status " + (ok ? "pass" : "fail"); statusEl.textContent = ok ? "ran ✓" : "compile error"; return; }
      const r = runChecks(src);
      checksEl.innerHTML = r.html;
      const outputOk = ok && (!ex.expect || ex.expect.every(s => (d.program_output || "").includes(s)));
      if (outputOk && r.pass){
        statusEl.className = "lab-status pass"; statusEl.textContent = "Compiled, ran, output correct ✓";
        consoleEl.innerHTML += `\n<span class="c-ok">// ✓ expected output found</span>`;
        solve();
      } else if (ok){
        statusEl.className = "lab-status fail"; statusEl.textContent = r.pass ? "Runs, but output doesn't match yet" : "Runs, but checks incomplete";
        if (ex.expect) consoleEl.innerHTML += `\n<span class="c-warn">// expecting to see: ${ex.expect.map(esc).join('  ·  ')}</span>`;
      } else {
        statusEl.className = "lab-status fail"; statusEl.textContent = "Compile error — read it top-down, first error first";
      }
    } catch(e){
      consoleEl.innerHTML = `<span class="c-warn">// Couldn't reach the compiler — this environment blocks external network calls.
// "Check my code" works fully offline and still awards the solve.
// (Download the HTML file and open it locally for real compilation.)</span>`;
      statusEl.className = "lab-status"; statusEl.textContent = "offline mode";
      const r = runChecks(getCode());
      checksEl.innerHTML = r.html;
      if (!ex.scratch && r.pass){ statusEl.className = "lab-status pass"; statusEl.textContent = "All checks pass ✓ (offline)"; solve(); }
    } finally {
      const btn = $("#lab-run"); if (btn) btn.disabled = false;
    }
  };
}
/* shift compiler error line numbers back to user code (shim is prepended) */
function remapLines(msg, ex){
  if (!ex.shim) return msg;
  const off = UE_SHIM.split("\n").length - 1;
  return msg.replace(/prog\.cc:(\d+)/g, (m, n) => "your-code:" + Math.max(1, +n - off));
}


/* ----- review mode ----- */
let revDeck = null, revIdx = 0, revCorrect = 0, revAnswered = false;

function buildReviewDeck(){
  const deck = [];
  // 1) every missed question, oldest lessons first
  for (const [lid, qs] of Object.entries(S.missed)){
    const r = L_INDEX[lid];
    if (!r) continue;
    for (const qi of qs) deck.push({ lid, qi, q: r.lesson.quiz[qi], t: r.lesson.t, missed: true });
  }
  // 2) top up to 8 with random questions from completed lessons
  const doneIds = Object.keys(S.done).filter(lid => L_INDEX[lid]);
  const pool = [];
  for (const lid of doneIds){
    const l = L_INDEX[lid].lesson;
    l.quiz.forEach((q, qi) => {
      if (!deck.some(d => d.lid === lid && d.qi === qi)) pool.push({ lid, qi, q, t: l.t, missed: false });
    });
  }
  for (let i = pool.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  while (deck.length < 8 && pool.length) deck.push(pool.pop());
  // shuffle the final deck too
  for (let i = deck.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; }
  return deck.slice(0, 12); // hard cap so a big miss-pile stays digestible
}

function renderReview(){
  if (!totalDone()){
    content.innerHTML = `<h1 class="page">🔁 Daily Review</h1>
      <p class="sub">Nothing to review yet — complete a lesson or two first, then come back. Missed quiz questions land here automatically.</p>
      <button class="btn" data-go="path:ue">Start learning →</button>`;
    wireGo(); return;
  }
  if (!revDeck){ revDeck = buildReviewDeck(); revIdx = 0; revCorrect = 0; revAnswered = false; }
  if (revIdx >= revDeck.length) return renderReviewSummary();
  const item = revDeck[revIdx], q = item.q;
  content.innerHTML = `
  <h1 class="page">🔁 Daily Review</h1>
  <p class="sub">Question ${revIdx + 1} of ${revDeck.length} · from “${esc(item.t)}” ${item.missed ? '<span class="tag gold">rematch — you missed this one</span>' : ""}</p>
  <div class="pbar" style="max-width:420px;margin-bottom:20px"><div style="width:${Math.round(100 * revIdx / revDeck.length)}%"></div></div>
  <div class="card quiz">
    <div class="qq graded-pending" data-q="0">
      <div class="qt">${esc(q.q)}</div>
      ${q.o.map((o, oi) => `<label class="opt" data-oi="${oi}"><input type="radio" name="rq"><span>${esc(o)}</span></label>`).join("")}
      <div class="qx">${esc(q.x)}</div>
    </div>
    <div class="quiz-result" id="rev-res"></div>
    <button class="btn" id="rev-next" style="display:none"></button>
  </div>`;
  revAnswered = false;
  content.querySelectorAll(".opt").forEach(opt => opt.addEventListener("click", e => {
    if (revAnswered) return;
    revAnswered = true;
    const oi = +opt.dataset.oi;
    const right = oi === q.a;
    if (right) revCorrect++;
    sfx(right ? "right" : "wrong");
    const qq = content.querySelector(".qq");
    qq.classList.add("graded");
    content.querySelectorAll(".opt").forEach((o, i) => {
      o.querySelector("input").disabled = true;
      if (i === q.a) o.classList.add("right");
      else if (i === oi) o.classList.add("wrong");
    });
    // update the miss ledger
    const miss = S.missed[item.lid] || [];
    const pos = miss.indexOf(item.qi);
    if (right && pos !== -1) miss.splice(pos, 1);
    if (!right && pos === -1) miss.push(item.qi);
    if (miss.length) S.missed[item.lid] = miss; else delete S.missed[item.lid];
    persist(); renderChrome();
    $("#rev-res").innerHTML = right ? `<span style="color:var(--ok)">Correct ✓${item.missed ? " — miss cleared" : ""}</span>` : `<span style="color:var(--bad)">Not this time — it goes back in the pile</span>`;
    const btn = $("#rev-next");
    btn.style.display = "";
    btn.textContent = revIdx + 1 < revDeck.length ? "Next question →" : "Finish review 🏁";
    btn.onclick = () => { revIdx++; renderReview(); };
    btn.focus();
  }));
}

function renderReviewSummary(){
  const n = revDeck.length, score = revCorrect;
  const today = new Date(); today.setHours(0,0,0,0);
  const firstToday = S.lastReviewXP !== today.getTime();
  let xpLine = "Practice session — XP already earned today.";
  S.reviews++;
  touchStreak();
  if (firstToday){
    S.lastReviewXP = today.getTime();
    const xp = score * 5 + (score === n ? 15 : 0);
    addXP(xp, "Daily review " + score + "/" + n);
    xpLine = "+" + xp + " XP earned" + (score === n ? " (perfect bonus!)" : "") + ".";
  }
  grant("review5", S.reviews >= 5);
  grant("review20", S.reviews >= 20);
  checkGlobalAchievements();
  persist();

    <span class="tag${pct === 100 ? " gold" : " ue"}">${doneN}/${steps.length} steps</span>
  </div>
  ${CAPSTONE.phases.map((ph, pi) => {
    const phDone = ph.steps.every(st => S.capstone[st.id]);
    return `<div class="card cap-phase${phDone ? " done" : ""}">
      <div class="cp-head"><span class="cp-num">${phDone ? "✓ " : ""}PHASE ${pi + 1}</span>

      ${ph.steps.map(st => `<div class="cap-step${S.capstone[st.id] ? " done" : ""}">
        <input type="checkbox" data-step="${st.id}" data-phase="${ph.id}" ${S.capstone[st.id] ? "checked" : ""}>
        <div><div class="cs-txt">${esc(st.txt)}</div>
          <div class="cs-links">${st.lessons.map(lid => {
            const r = L_INDEX[lid];
            if (r) return `<span class="lesson-chip${lessonUnlocked(lid) ? "" : " locked"}" ${lessonUnlocked(lid) ? `data-go="lesson:${lid}"` : `title="Locked — finish earlier lessons first"`}>${esc(r.lesson.t)}</span>`;
            const ex = labExercise(lid);
            return ex ? `<span class="lesson-chip" data-lab="${lid}">⌨ ${esc(ex.t)}</span>` : "";
          }).join("")}</div>
        </div>
      </div>`).join("")}
    </div>`;
  }).join("")}
  <div class="note" style="margin-top:4px">🧭 Do the phases in order — each one produces a playable build. If a step feels foggy, its lesson chips are the exact prep material.</div>`;

  content.querySelectorAll('.cap-step input').forEach(ck => ck.addEventListener("change", e => {
    const stId = ck.dataset.step, phId = ck.dataset.phase;
    if (ck.checked) S.capstone[stId] = true; else delete S.capstone[stId];
    touchStreak();
    const ph = CAPSTONE.phases.find(p => p.id === phId);
    if (ck.checked && !S.capPhase[phId] && ph.steps.every(st => S.capstone[st.id])){
      S.capPhase[phId] = true;
      addXP(ph.xp, "Capstone phase: " + ph.t);
      grant("phase1");
    }
    grant("shipped", CAPSTONE.phases.flatMap(p => p.steps).every(st => S.capstone[st.id]));

  }));
  content.querySelectorAll('[data-lab]').forEach(el => el.addEventListener("click", () => { labCur = el.dataset.lab; nav("lab"); }));
  wireGo();
}


/* ----- boss quiz ----- */
let bossDeck = null, bossIdx = 0, bossCorrect = 0, bossCh = null;

function renderBoss(chId){
  let found = null;
  PATHS.forEach(p => p.chapters.forEach(c => { if (c.id === chId) found = { p, c }; }));
  if (!found || !chapterDone(found.c)) return nav("dash");
  const { p, c } = found;
  if (bossCh !== chId || !bossDeck){
    // sample up to 8 questions across the chapter's lessons, at least one per lesson
    const perLesson = c.lessons.map(l => l.quiz.map((q, qi) => ({ lid: l.id, qi, q, t: l.t })));
    const deck = perLesson.map(arr => arr[Math.floor(Math.random() * arr.length)]);
    const rest = perLesson.flat().filter(x => !deck.includes(x));
    for (let i = rest.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [rest[i], rest[j]] = [rest[j], rest[i]]; }
    while (deck.length < 8 && rest.length) deck.push(rest.pop());
    for (let i = deck.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; }
    bossDeck = deck; bossIdx = 0; bossCorrect = 0; bossCh = chId;
  }
  if (bossIdx >= bossDeck.length) return renderBossSummary(p, c);
  const item = bossDeck[bossIdx], q = item.q;
  content.innerHTML = `
  <div class="crumb"><a data-go="path:${p.id}">${esc(p.title)}</a> / Boss Quiz</div>
  <h1 class="page">⚔️ ${esc(c.t)} — Boss Quiz</h1>
  <p class="sub">Question ${bossIdx + 1} of ${bossDeck.length} · from “${esc(item.t)}” · pass at 80% to master the chapter</p>
  <div class="pbar" style="max-width:420px;margin-bottom:20px"><div style="width:${Math.round(100 * bossIdx / bossDeck.length)}%"></div></div>
  <div class="card quiz">
    <div class="qq" data-q="0">
      <div class="qt">${esc(q.q)}</div>
      ${q.o.map((o, oi) => `<label class="opt" data-oi="${oi}"><input type="radio" name="bq"><span>${esc(o)}</span></label>`).join("")}
      <div class="qx">${esc(q.x)}</div>
    </div>
    <div class="quiz-result" id="boss-res"></div>
    <button class="btn" id="boss-next" style="display:none"></button>
  </div>`;
  let answered = false;
  content.querySelectorAll(".opt").forEach(opt => opt.addEventListener("click", () => {
    if (answered) return;
    answered = true;
    const oi = +opt.dataset.oi, right = oi === q.a;
    if (right) bossCorrect++;
    sfx(right ? "right" : "wrong");
    content.querySelector(".qq").classList.add("graded");
    content.querySelectorAll(".opt").forEach((o, i) => {
      o.querySelector("input").disabled = true;
      if (i === q.a) o.classList.add("right");
      else if (i === oi) o.classList.add("wrong");
    });
    // wrong boss answers feed the review pile
    if (!right){
      const miss = S.missed[item.lid] || [];
      if (!miss.includes(item.qi)) miss.push(item.qi);
      S.missed[item.lid] = miss;
      persist(); renderChrome();
    }
    $("#boss-res").innerHTML = right ? `<span style="color:var(--ok)">Correct ✓</span>` : `<span style="color:var(--bad)">Missed — queued for Daily Review</span>`;
    const btn = $("#boss-next");
    btn.style.display = "";
    btn.textContent = bossIdx + 1 < bossDeck.length ? "Next →" : "Face the verdict";
    btn.onclick = () => { bossIdx++; renderBoss(chId); };
    btn.focus();
  }));
  wireGo();
}

function renderBossSummary(p, c){
  const n = bossDeck.length, pct = Math.round(100 * bossCorrect / n);
  const passed = pct >= 80, firstMaster = passed && !chapterMastered(c);
  const prevBest = S.boss[c.id];
  if (prevBest === undefined || pct > prevBest) S.boss[c.id] = pct;
  touchStreak();
  if (firstMaster){
    confetti();
    addXP(50 + (pct === 100 ? 25 : 0), "Chapter mastered: " + c.t);
    grant("bossfirst");
    const allCh = PATHS.flatMap(pp => pp.chapters);
    grant("bossall", allCh.every(ch => chapterMastered(ch)));
  }
  checkGlobalAchievements();
  persist(); renderChrome();
  content.innerHTML = `
  <h1 class="page">${passed ? "🏆 Chapter mastered" : "⚔️ Not this time"}</h1>
  <div class="card" style="max-width:520px">
    <div style="font-family:var(--disp);font-size:42px;font-weight:700;color:${passed ? "var(--gold)" : "var(--bad)"}">${bossCorrect}/${n} · ${pct}%</div>
    <p style="color:var(--muted);font-size:13.5px;margin:8px 0 4px">${
      firstMaster ? "First mastery — +" + (50 + (pct === 100 ? 25 : 0)) + " XP." + (pct === 100 ? " Flawless." : "")
      : passed ? "Already mastered — this was for pride. Best: " + S.boss[c.id] + "%."
      : "Need 80%. Your misses just landed in Daily Review — clear them and come back."}</p>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn" id="boss-again">${passed ? "Run it back" : "Rematch"}</button>
      ${!passed ? `<button class="btn ghost" data-go="review">Daily Review →</button>` : ""}
      <button class="btn ghost" data-go="path:${p.id}">Back to path</button>
    </div>
  </div>`;
  $("#boss-again").onclick = () => { bossDeck = null; renderBoss(c.id); };
  wireGo();
  bossDeck = null; bossCh = null;
}



/* ----- AI tutor (works when running inside claude.ai) ----- */
async function askClaude(prompt, panel){
  panel.innerHTML = '<h3>🤖 AI Tutor</h3><p class="thinking">thinking…</p>';
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
    });
    const data = await res.json();
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
    if (!text) throw new Error("empty");
    panel.innerHTML = '<h3>🤖 AI Tutor</h3>' + text.split(/\n{2,}/).map(p => `<p>${esc(p).replace(/`([^`]+)`/g, "<code>$1</code>")}</p>`).join("");
  } catch(e){
    panel.innerHTML = '<h3>🤖 AI Tutor</h3><p style="color:var(--muted)">Couldn\'t reach the tutor — this feature works when the app runs inside claude.ai as an artifact. Everything else works offline.</p>';
  }
}

function shuffled(arr){ const a = arr.slice(); for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
const normCode = t => t.replace(/\s+/g, " ").replace(/\s*([(){};,<>*&:=+\-\.])\s*/g, "$1").trim();

function dojoType(){
  const body = $("#dojo-body");
  if (!dj) dj = { deck: shuffled(DOJO_TYPE).slice(0, 8), i: 0, times: [], t0: 0 };
  if (dj.i >= dj.deck.length){
    const avg = dj.times.reduce((a, b) => a + b, 0) / dj.times.length;
    const best = S.dojoBest === null || avg < S.dojoBest;
    if (best) S.dojoBest = +avg.toFixed(1);
    const today = new Date(); today.setHours(0,0,0,0);
    const firstToday = S.lastDojoXP !== today.getTime();
    touchStreak();
    if (firstToday){ S.lastDojoXP = today.getTime(); addXP(35, "Dojo session"); }
    grant("dojo"); grant("wpm", avg < 6);
    persist(); renderChrome();
    body.innerHTML = `<div class="card" style="max-width:520px">
      <div style="font-family:var(--disp);font-size:38px;font-weight:700;color:var(--ue)">${avg.toFixed(1)}s <span style="font-size:15px;color:var(--muted)">avg / drill</span></div>
      <p style="color:var(--muted);font-size:13.5px;margin:8px 0">${best ? "🏅 New personal best!" : "Personal best: " + S.dojoBest + "s."} ${firstToday ? "+35 XP." : "Practice run — XP already earned today."} ${avg < 6 ? "Fast hands. ⚡" : ""}</p>
      <button class="btn" id="dj-again">Another round</button></div>`;
    $("#dj-again").onclick = () => { dj = null; dojoType(); };
    return;
  }
  const d = dj.deck[dj.i];
  body.innerHTML = `
  <p style="font-size:12.5px;color:var(--dim);margin-bottom:8px">Drill ${dj.i + 1}/${dj.deck.length} · <span class="type-timer" id="dj-timer">0.0s</span></p>
  <div class="type-prompt">${esc(d.p)}</div>
  <input class="type-input" id="dj-in" placeholder="type the Unreal idiom, exact syntax… Enter to check" autocomplete="off" spellcheck="false">
  <p style="font-size:11.5px;color:var(--dim);margin-top:8px">Whitespace is forgiven; spelling isn't. <a id="dj-skip" style="color:var(--gold);cursor:pointer">Reveal & skip</a></p>`;
  const inp = $("#dj-in");
  dj.t0 = performance.now();
  const timer = setInterval(() => { const el = $("#dj-timer"); if (!el){ clearInterval(timer); return; } el.textContent = ((performance.now() - dj.t0) / 1000).toFixed(1) + "s"; }, 100);
  const myDj = dj;
  const next = () => { clearInterval(timer); if (dojoMode !== "type" || dj !== myDj) return; dj.i++; dojoType(); };
  inp.addEventListener("input", () => {
    inp.classList.remove("bad");
    if (normCode(inp.value) === normCode(d.a)){
      inp.classList.add("good"); inp.disabled = true;
      dj.times.push((performance.now() - dj.t0) / 1000);
      setTimeout(next, 450);
    }
  });
  inp.addEventListener("keydown", e => {
    if (e.key === "Enter" && normCode(inp.value) !== normCode(d.a)) inp.classList.add("bad");
  });
  $("#dj-skip").addEventListener("click", () => {
    inp.value = d.a; inp.classList.add("good"); inp.disabled = true;
    dj.times.push(12);   // skips cost you the average
    setTimeout(next, 900);
  });
  inp.focus();
}

/* tiny fake-Blueprint SVG renderer */
function bpSVG(nodes){
  const W = 190, H = 64, GAP = 46, colors = { e: "#8B1E1E", f: "#1E4E8B", p: "#1E6B44", b: "#3A3F4D" };
  const total = nodes.length * W + (nodes.length - 1) * GAP;
  let x = 0, out = "";
  nodes.forEach(([type, title, sub], i) => {
    out += `<g transform="translate(${x},20)">
      <rect width="${W}" height="${H}" rx="8" fill="#1B2130" stroke="#39415A"/>
      <rect width="${W}" height="22" rx="8" fill="${colors[type]}"/>
      <rect y="14" width="${W}" height="8" fill="${colors[type]}"/>
      <text x="10" y="15.5" fill="#fff" font-size="10.5" font-family="Chakra Petch,sans-serif" font-weight="600">${esc(title)}</text>
      <text x="10" y="42" fill="#8C96AC" font-size="9.5" font-family="IBM Plex Sans,sans-serif">${esc(sub)}</text>
      ${type !== "e" ? `<polygon points="6,50 14,54 6,58" fill="#CBD4E4"/>` : ""}
      ${i < nodes.length - 1 ? `<polygon points="${W - 14},50 ${W - 6},54 ${W - 14},58" fill="#CBD4E4"/>` : ""}
    </g>`;
    if (i < nodes.length - 1) out += `<path d="M ${x + W - 6} 74 C ${x + W + GAP / 2} 74, ${x + W + GAP / 2} 74, ${x + W + GAP + 6} 74" stroke="#E9EEF7" stroke-width="2.2" fill="none"/>`;
    x += W + GAP;
  });
  return `<svg viewBox="0 0 ${total} 104" width="${total}" height="104" xmlns="http://www.w3.org/2000/svg">${out}</svg>`;
}

    right => { if (right){ dj.right++; S.bp[item.id] = true; } dj.i++; persist(); dojoBP(); });
}


/* ----- stats ----- */
function renderStats(){
  const days = Object.keys(S.log).sort();
  // cumulative XP polyline
  let chart = '<p style="color:var(--dim);font-size:13px">No activity logged yet — it starts counting from today.</p>';
  if (days.length){
    let cum = 0;
    const pts = days.map(d => (cum += S.log[d].xp, { d, cum }));
    const max = Math.max(cum, 1), W = 600, H = 140;
    const step = pts.length > 1 ? W / (pts.length - 1) : 0;
    const poly = pts.map((p, i) => (i * step).toFixed(1) + "," + (H - 8 - (p.cum / max) * (H - 24)).toFixed(1)).join(" ");
    chart = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
      <polyline points="0,${H - 8} ${poly}" fill="none" stroke="#4FA8FF" stroke-width="2.5"/>
      <polygon points="0,${H - 8} ${poly} ${W},${H - 8}" fill="rgba(79,168,255,.10)"/>
    </svg><p style="font-size:11.5px;color:var(--dim)">${days[0]} → ${days[days.length - 1]} · ${cum} XP logged since tracking began</p>`;
  }
  // activity calendar: last 84 days
  const cal = [];
  for (let i = 83; i >= 0; i--){
    const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
    const acts = (S.log[d] || {}).acts || 0;
    cal.push(`<div class="cd ${acts >= 8 ? "a3" : acts >= 3 ? "a2" : acts >= 1 ? "a1" : ""}" title="${d}: ${acts} actions"></div>`);
  }
  // accuracy per path
  const acc = PATHS.map(p => {
    const ls = pathLessons(p).filter(l => S.quiz[l.id] !== undefined);
    if (!ls.length) return null;
    const got = ls.reduce((a, l) => a + S.quiz[l.id], 0), tot = ls.reduce((a, l) => a + l.quiz.length, 0);
    const pct = Math.round(100 * got / tot);
    return `<div class="accbar"><span style="width:120px">${pathIcon(p)} ${esc(p.title)}</span>
      <div class="ab"><div style="width:${pct}%;background:${pct >= 90 ? "var(--ok)" : pct >= 70 ? "var(--gold)" : "var(--bad)"}"></div></div><b>${pct}%</b></div>`;
  }).filter(Boolean).join("") || '<p style="color:var(--dim);font-size:13px">Complete some lessons for accuracy data.</p>';
  const masters = PATHS.flatMap(p => p.chapters).filter(c => chapterMastered(c)).length;
  content.innerHTML = `
  <h1 class="page">📊 Stats</h1>
  <p class="sub">The numbers behind the grind.</p>
  <div class="statrow">
    <div class="stat"><b>${totalDone()}</b><span>Lessons</span></div>
    <div class="stat gold"><b>${S.xp}</b><span>Total XP</span></div>
    <div class="stat"><b>${masters}/${PATHS.flatMap(p => p.chapters).length}</b><span>Chapters mastered</span></div>
    <div class="stat ok"><b>${S.reviews}</b><span>Reviews</span></div>
    <div class="stat"><b>${S.dojoBest ? S.dojoBest + "s" : "—"}</b><span>Dojo best</span></div>
  </div>
  <div class="stat-chart"><h3>Cumulative XP</h3>${chart}</div>
  <div class="stat-chart"><h3>Activity — last 12 weeks</h3><div class="cal">${cal.join("")}</div></div>
  <div class="stat-chart"><h3>Quiz accuracy by path</h3>${acc}</div>`;
}

/* ----- command palette ----- */
let palIndex = null, palOpen = false, pendingGlossaryQ = null, pendingTranslatorQ = null;

function buildPalIndex(){
  const ix = [];
  ALL_LESSONS.forEach(r => ix.push({ ico: pathIcon(r.path), t: r.lesson.t, sub: r.path.title + " · CH" + (r.ci + 1), k: (r.lesson.t + " " + r.chapter.t).toLowerCase(), go: () => lessonUnlocked(r.lesson.id) ? nav("lesson:" + r.lesson.id) : nav("path:" + r.path.id), lock: () => !lessonUnlocked(r.lesson.id) }));
  GLOSSARY.forEach(g => ix.push({ ico: "📖", t: g[0], sub: "Glossary · Unity: " + g[1], k: (g[0] + " " + g[1]).toLowerCase(), go: () => { pendingGlossaryQ = g[0]; nav("glossary"); } }));
  TRANSLATOR.forEach(([cat, rows]) => rows.forEach(r => ix.push({ ico: "⇄", t: r[0] + " → " + r[1], sub: "Translator · " + cat, k: (r[0] + " " + r[1]).toLowerCase(), go: () => { pendingTranslatorQ = r[0]; nav("translator"); } })));
  LAB.forEach(c => c.items.forEach(e => ix.push({ ico: "⌨", t: e.t, sub: "C++ Lab · " + c.cat, k: (e.t + " " + c.cat + " lab").toLowerCase(), go: () => { labCur = e.id; nav("lab"); } })));
  [["◈","Dashboard","dash"],["🔁","Daily Review","review"],["🚢","Capstone: " + CAPSTONE.title,"capstone"],["🏆","Achievements","achievements"]]
    .forEach(([ico, t, v]) => ix.push({ ico, t, sub: "View", k: t.toLowerCase(), go: () => nav(v) }));
  return ix;
}

function openPalette(){
  if (palOpen) return;
  palOpen = true;
  if (!palIndex) palIndex = buildPalIndex();
  const ov = document.createElement("div");
  ov.className = "palette";
  ov.innerHTML = `<div class="pal-box">
    <input class="pal-input" placeholder="Search lessons, terms, translations, lab exercises, notes…" autocomplete="off">
    <div class="pal-list"></div></div>`;
  document.body.appendChild(ov);
  const inp = ov.querySelector(".pal-input"), list = ov.querySelector(".pal-list");
  let results = [], active = 0;
  const close = () => { ov.remove(); palOpen = false; };

  function draw(q){
    q = q.trim().toLowerCase();
    // notes are dynamic, search them live
    const noteHits = q.length >= 2 ? Object.entries(S.notes)
      .filter(([lid, n]) => n && n.toLowerCase().includes(q) && L_INDEX[lid])
      .map(([lid]) => ({ ico: "✍️", t: "Your note on “" + L_INDEX[lid].lesson.t + "”", sub: "Notes", go: () => nav("lesson:" + lid), lock: () => !lessonUnlocked(lid) })) : [];
    const base = !q ? palIndex.slice(0, 9) : palIndex
      .filter(it => it.k.includes(q))
      .sort((a, b) => (b.k.startsWith(q) ? 1 : 0) - (a.k.startsWith(q) ? 1 : 0))
      .slice(0, 12);
    results = noteHits.concat(base);
    active = 0;
    list.innerHTML = results.length ? results.map((it, i) =>
      `<div class="pal-item${i === 0 ? " active" : ""}" data-i="${i}">
        <span class="pi">${it.ico}</span><span>${esc(it.t)}${it.lock && it.lock() ? " 🔒" : ""}</span><small>${esc(it.sub)}</small>
      </div>`).join("") : `<div class="pal-empty">Nothing matches “${esc(q)}”.</div>`;
    list.querySelectorAll(".pal-item").forEach(el => {
      el.addEventListener("mouseenter", () => { active = +el.dataset.i; paint(); });
      el.addEventListener("click", () => pick(+el.dataset.i));
    });
  }
  function paint(){ list.querySelectorAll(".pal-item").forEach((el, i) => el.classList.toggle("active", i === active)); }
  function pick(i){
    const it = results[i]; if (!it) return;
    close(); it.go(); grant("palette");
  }
  inp.addEventListener("input", () => draw(inp.value));
  inp.addEventListener("keydown", e => {
    if (e.key === "ArrowDown"){ e.preventDefault(); active = Math.min(active + 1, results.length - 1); paint(); list.querySelector(".pal-item.active")?.scrollIntoView({ block: "nearest" }); }
    else if (e.key === "ArrowUp"){ e.preventDefault(); active = Math.max(active - 1, 0); paint(); list.querySelector(".pal-item.active")?.scrollIntoView({ block: "nearest" }); }
    else if (e.key === "Enter") pick(active);
    else if (e.key === "Escape") close();
  });
  ov.addEventListener("click", e => { if (e.target === ov) close(); });
  draw("");
  inp.focus();
}

/* ----- translator ----- */
function renderTranslator(){
  grant("rosetta");
  content.innerHTML = `
  <h1 class="page">⇄ Unity → Unreal map</h1>
  <p class="sub">Muscle-memory dictionary. Type the Unity thing you know; find its Unreal name.</p>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:4px">
    <input class="search" id="trs" style="flex:1;margin-bottom:0" placeholder="Search… e.g. Instantiate, coroutine, prefab, raycast" autocomplete="off">
    <button class="btn ghost" id="cheat-btn" title="Printable cheat sheet">🖨 Cheat sheet</button>
  </div>
  <div id="trbody"></div>`;
  const body = $("#trbody");
  const draw = q => {
    q = q.trim().toLowerCase();
    body.innerHTML = TRANSLATOR.map(([cat, rows]) => {
      const hit = rows.filter(r => !q || r[0].toLowerCase().includes(q) || r[1].toLowerCase().includes(q));
      if (!hit.length) return "";
      return `<div class="tr-cat">${esc(cat)}</div><div class="xlate">
        <div class="xh"><div class="hu">Unity</div><div></div><div class="he">Unreal</div></div>
        ${hit.map(r => `<div class="xrow"><div class="xu">${esc(r[0])}</div><div class="xa">→</div><div class="xe">${esc(r[1])}</div></div>`).join("")}
      </div>`;
    }).join("") || `<p style="color:var(--muted)">No matches for “${esc(q)}”.</p>`;
  };
  const q0 = pendingTranslatorQ || ""; pendingTranslatorQ = null;
  $("#trs").value = q0;
  draw(q0);
  $("#trs").addEventListener("input", e => draw(e.target.value));
  $("#cheat-btn").addEventListener("click", () => {
    const win = window.open("", "_blank");
    if (!win) return toast("ach", "⚠️", "Popup blocked", "Allow popups to print the cheat sheet.");
    const rows = TRANSLATOR.map(([cat, rs]) =>
      `<tr><th colspan="2">${cat}</th></tr>` + rs.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("")).join("");
    win.document.write(`<!DOCTYPE html><html><head><title>Unity → Unreal Cheat Sheet</title><style>
      body{font-family:Segoe UI,Arial,sans-serif;font-size:11px;margin:24px;color:#111}
      h1{font-size:18px;margin:0 0 2px}p{color:#666;margin:0 0 14px;font-size:11px}
      table{width:100%;border-collapse:collapse;column-span:all}
      th{background:#eef;text-align:left;padding:5px 8px;font-size:11px;border:1px solid #ccd}
      td{padding:3px 8px;border:1px solid #ddd;width:50%}
      td:first-child{color:#567d1e}td:last-child{color:#1a5fa8;font-weight:600}
      @media print{body{margin:8mm}}</style></head><body>
      <h1>Unity → Unreal Cheat Sheet</h1><p>Bridge Academy · ${TRANSLATOR.reduce((a, c) => a + c[1].length, 0)} mappings · print me, tape me to the monitor</p>
      <table>${rows}</table>
      <scr${""}ipt>window.print();</scr${""}ipt></body></html>`);
    win.document.close();
  });
  $("#trs").focus();
}

/* ----- glossary ----- */
function renderGlossary(){
  content.innerHTML = `
  <h1 class="page">📖 Unreal glossary</h1>
  <p class="sub">${GLOSSARY.length} terms, each with its closest Unity equivalent and a link to the official Epic docs.</p>
  <input class="search" id="gls" placeholder="Search terms… e.g. CDO, Pawn, Niagara" autocomplete="off">
  <div class="card" style="padding:6px 20px" id="glbody"></div>`;
  const body = $("#glbody");
  const draw = q => {
    q = q.trim().toLowerCase();
    if (q.length >= 2) grant("lexicon");
    const hit = GLOSSARY.filter(g => !q || g[0].toLowerCase().includes(q) || g[1].toLowerCase().includes(q) || g[2].toLowerCase().includes(q));
    const docURL = g => g[3]
      ? "https://dev.epicgames.com/documentation/en-us/unreal-engine/" + g[3]
      : "https://dev.epicgames.com/community/search?query=" + encodeURIComponent(g[0].replace(/\s*\(.*\)$/, ""));
    body.innerHTML = hit.map(g => `<div class="gl-item">
      <h3>${esc(g[0])}<a class="gl-link" href="${docURL(g)}" target="_blank" rel="noopener" title="Official Unreal Engine documentation">${g[3] ? "docs" : "docs 🔎"} ↗</a></h3>
      <div class="gl-eq">Unity: ${esc(g[1])}</div>
      <div class="gl-def">${g[2]}</div>
    </div>`).join("") || `<p style="color:var(--muted);padding:14px 0">No matches.</p>`;
  };
  const q0 = pendingGlossaryQ || ""; pendingGlossaryQ = null;
  $("#gls").value = q0;
  draw(q0);
  $("#gls").addEventListener("input", e => draw(e.target.value));
  $("#gls").focus();
}

/* ---------- generic [data-go] wiring ---------- */
function wireGo(){
  content.querySelectorAll("[data-go]").forEach(el => {
    if (el.__wired) return; el.__wired = true;
    const go = e => { e.stopPropagation(); nav(el.dataset.go); };
    el.addEventListener("click", go);
    if (el.getAttribute("role") === "button")
      el.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(e); } });
  });
}

/* ---------- boot ---------- */
document.querySelectorAll(".navbtn").forEach(b => b.addEventListener("click", () => nav(b.dataset.view)));
$("#hamb").addEventListener("click", () => { $("#sidebar").classList.add("open"); $("#scrim").classList.add("on"); });
$("#pal-btn").addEventListener("click", openPalette);
$("#snd-btn").addEventListener("click", () => {
  S.sound = !S.sound; persist();
  $("#snd-btn").textContent = S.sound ? "🔊" : "🔇";
  if (S.sound) sfx("right");
});
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k"){ e.preventDefault(); openPalette(); }
  // quiz keys: 1-4 answer, only when not typing in an input
  const tag = (e.target.tagName || "").toLowerCase();
  if (tag === "input" || tag === "textarea" || e.target.isContentEditable || palOpen) return;
  if (/^[1-4]$/.test(e.key)){
    const oi = +e.key - 1;
    // single-question flows (review / boss / dojo decks)
    const single = content.querySelector(`.opt[data-oi="${oi}"]`);
    if (single && !single.querySelector("input").disabled){ single.click(); return; }
    // lesson quiz: apply to first unanswered question
    const qq = [...content.querySelectorAll(".qq")].find(q => q.querySelector("input") && !q.querySelector("input:checked") && !q.querySelector("input").disabled);
    if (qq){ const inp = qq.querySelectorAll(".opt input")[oi]; if (inp){ inp.checked = true; inp.dispatchEvent(new Event("change", { bubbles: true })); } }
  }
  if (e.key === "Enter"){
    const btn = $("#rev-next") || $("#boss-next") || $("#dq-next");
    if (btn && btn.style.display !== "none"){ btn.click(); return; }
    const grade = $("#grade");
    if (grade && grade.style.display !== "none" && content.querySelectorAll(".qq input:checked").length === content.querySelectorAll(".qq").length / 1 && grade.offsetParent) grade.click();
  }
});
$("#scrim").addEventListener("click", () => { $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("on"); });

(async () => {
  const saved = await Store.load();
  if (saved) S = Object.assign(S, saved);
  // streak decay check: if last active more than 1 day ago, streak shows 0 until next activity
  if (S.lastActive){
    const today = new Date(); today.setHours(0,0,0,0);
    if (today.getTime() - S.lastActive > 86400000) S.streak = 0;
  }
  renderChrome();
  $("#snd-btn").textContent = S.sound ? "🔊" : "🔇";
  nav("dash");
  if (!S.toured) runTour();
})();
</script>
