const PATHS = [
{
id:"ue", icon:"🏰", title:"Unreal Engine", blurb:"The editor, Actors, the Gameplay Framework, Blueprints, and every engine system — mapped from Unity.",
chapters:[
{id:"ue1", t:"Orientation: Your New Editor", skills:["Navigate the UE editor","Explain Actor vs GameObject","Use components in Unreal","Work with Levels & the Level Blueprint"], lessons:[
{id:"ue1a", t:"Editor & project anatomy", min:6,
body:`<p>Unreal's editor is your Unity editor with the furniture rearranged and a few extra rooms. The <strong>Viewport</strong> is the Scene view, the <strong>Outliner</strong> is the Hierarchy, the <strong>Details panel</strong> is the Inspector, and the <strong>Content Browser</strong> is the Project window. Two habits change immediately: navigation is right-mouse + WASD by default (like Unity's flythrough, but it is the primary mode), and there is no persistent "Game view" tab — you press <strong>Play In Editor (PIE)</strong> and the viewport becomes the game.</p>
<p>On disk, a project is also familiar but stricter: <code>Content/</code> is your Assets folder, and every asset is a binary <code>.uasset</code> — no loose <code>.meta</code> files, but also no meaningful text diffs for assets. <code>Config/</code> holds INI files (roughly ProjectSettings), and <code>Source/</code> appears only once you add C++. <code>Saved/</code> and <code>Intermediate/</code> are disposable, like Unity's Library.</p>
<p>One conceptual shift: Unreal separates <strong>Editor preferences</strong> (per-user) from <strong>Project Settings</strong> (shipped with the game) very explicitly, and almost everything you'd find in Unity's Project Settings lives under <em>Edit → Project Settings</em>, backed by those INI files.</p>`,
cmp:[["Scene view / Game view","Viewport + PIE|Play In Editor takes over the viewport"],["Hierarchy","World Outliner"],["Inspector","Details panel"],["Project window","Content Browser"],["Assets/ + .meta files","Content/ with binary .uasset files"],["Library/","Intermediate/ + Saved/|safe to delete"]],
task:"Create a Third Person template project. Find the equivalents of Hierarchy, Inspector and Project window, then locate where Project Settings are stored on disk (Config/*.ini).",
quiz:[
{q:"The closest equivalent of Unity's Inspector is…",o:["The Outliner","The Details panel","The Content Drawer","World Settings"],a:1,x:"Details shows the properties of whatever is selected — exactly the Inspector's job."},
{q:"Where do your imported assets live on disk?",o:["Assets/ as source files","Content/ as binary .uasset files","Saved/","Intermediate/"],a:1,x:"Everything in the Content Browser is a .uasset under Content/. Diffing them as text doesn't work — plan source control accordingly."},
{q:"Which folders can you safely delete to 'reimport the Library'?",o:["Config + Source","Content + Config","Saved + Intermediate","Binaries + Content"],a:2,x:"Saved/ and Intermediate/ are regenerated, like Unity's Library folder."}]},
{id:"ue1b", t:"Actors vs GameObjects", min:7,
body:`<p>Here is the single most important mapping of the whole course: a Unity <strong>GameObject</strong> is an empty container that gains behaviour purely through components. An Unreal <strong>Actor</strong> is a real class with inheritance. In Unity you compose a player from GameObject + components; in Unreal you often <em>subclass</em>: <code>AActor → APawn → ACharacter</code>, each level adding built-in behaviour, and then add components on top.</p>
<p>So Unreal is <strong>inheritance-first, composition-second</strong>, while Unity is composition-only. An Actor without components isn't even visible — its transform actually comes from a <strong>Root Component</strong> (a <code>USceneComponent</code>). That's the second surprise: in Unity the Transform lives on the GameObject; in Unreal the transform lives on the root component, and other scene components attach <em>under it</em> in a tree inside a single Actor.</p>
<p>Practical consequence: where a Unity prefab is often a hierarchy of several GameObjects, an Unreal "thing" is usually <em>one Actor</em> containing a component tree. Reserve child Actors for genuinely independent objects.</p>`,
cmp:[["GameObject|empty container","AActor|a class you can subclass"],["Transform on the GameObject","Transform on the Root Component"],["Child GameObjects","Attached Scene Components|inside one Actor"],["gameObject.SetActive(false)","Actor hidden + collision/tick disabled|no single exact switch"],["Destroy(gameObject)","Actor->Destroy()"]],
diagTitle:"The common Actor hierarchy",diag:["AActor|anything placeable","APawn|possessable by a controller","ACharacter|humanoid movement built in"],
task:"In your template project, open BP_ThirdPersonCharacter and study its component tree: find the root (Capsule), the Mesh, the SpringArm and the Camera — one Actor, four components.",
quiz:[
{q:"The biggest philosophical difference between Actors and GameObjects is…",o:["Actors can't have components","Unreal favours inheritance; you subclass Actor types","Actors have no transform","GameObjects are faster"],a:1,x:"Unreal ships a deep, useful Actor hierarchy (Pawn, Character, etc.) and expects you to subclass it; components complement it."},
{q:"Where does an Actor's transform live?",o:["On the Actor itself","On its Root Component","In the Level","On the GameMode"],a:1,x:"The root USceneComponent carries the transform; the Actor delegates to it."},
{q:"A lamp made of a base mesh, a bulb mesh and a light should usually be…",o:["Three Actors parented together","One Actor with a component tree","A Level per lamp","A GameMode"],a:1,x:"One Actor, multiple attached components — the Unreal idiom for what would be a multi-GameObject prefab in Unity."}]},
{id:"ue1c", t:"Components, the Unreal way", min:6,
body:`<p>Unreal components come in two families. <strong>USceneComponent</strong> has a transform and can attach to other scene components (meshes, cameras, colliders, audio). <strong>UActorComponent</strong> is transform-less pure behaviour — the closest thing to a plain Unity <code>MonoBehaviour</code> doing logic (health, inventory).</p>
<p>The mental shift: in Unity, <em>everything</em> is a component and scripts are components too. In Unreal, gameplay logic usually goes <em>on the Actor class itself</em> (Blueprint graph or C++), and components are used for reusable capabilities. You won't write a "PlayerMovement component" — you'll subclass <code>ACharacter</code>, which already owns a <code>UCharacterMovementComponent</code>.</p>
<p>Getting components also feels familiar: <code>GetComponentByClass</code> ≈ <code>GetComponent&lt;T&gt;()</code>. But because logic lives on Actors, you'll reach for it far less than in Unity.</p>`,
cmp:[["MonoBehaviour with logic","Logic on the Actor itself|or a UActorComponent if reusable"],["Transform-affecting component","USceneComponent|attachable, has transform"],["GetComponent<T>()","FindComponentByClass<T>() / GetComponentByClass"],["AddComponent<T>()","AddComponentByClass|or CreateDefaultSubobject in C++ constructors"],["RequireComponent attribute","Constructor-created default subobjects"]],
task:"Add a RotatingMovement component to any placed Actor and watch it spin in PIE — no code, behaviour via component, exactly like Unity.",
quiz:[
{q:"UActorComponent vs USceneComponent — the difference is…",o:["Scene components can't tick","Scene components have a transform and can attach","Actor components render meshes","There is none"],a:1,x:"SceneComponent = transform + attachment. ActorComponent = pure behaviour."},
{q:"Where does typical gameplay logic live in Unreal?",o:["Always in components","On the Actor class (BP or C++)","In the Level Blueprint only","In GameInstance"],a:1,x:"Actors are real classes, so their logic lives on them; components are for reusable capabilities."},
{q:"The rough Unreal equivalent of GetComponent<T>() is…",o:["FindObjectOfType","FindComponentByClass<T>()","GetActorOfClass","LoadObject"],a:1,x:"Same idea: query the owner for a component of a class."}]},
{id:"ue1d", t:"Levels, Maps & the Level Blueprint", min:6,
body:`<p>A Unity Scene is an Unreal <strong>Level</strong> (asset type <code>.umap</code>). Loading works similarly (<code>Open Level</code> ≈ <code>SceneManager.LoadScene</code>), and additive loading exists as <strong>Level Streaming</strong> / streaming sublevels — Unreal has done "additive scenes" natively for decades.</p>
<p>Each Level owns a <strong>Level Blueprint</strong>: a script graph bound to that specific map. It's the sanctioned home for one-off scripted moments ("when the player enters this trigger, open that exact door"). Unity has no direct equivalent — you'd create a scene-specific manager GameObject. Keep reusable logic <em>out</em> of it; anything generic belongs in Actor Blueprints or C++.</p>
<p>Also note <strong>World Settings</strong>: a per-level panel that picks the GameMode and other rules — think of it as a scene-scoped slice of Unity's Project Settings. It matters as soon as we hit the Gameplay Framework in Chapter 2.</p>`,
cmp:[["Scene (.unity)","Level / Map (.umap)"],["SceneManager.LoadScene","Open Level (by name/reference)"],["Additive scene loading","Level Streaming / streaming sublevels"],["Scene-specific manager object","Level Blueprint"],["DontDestroyOnLoad singleton","GameInstance|persists across level loads"]],
task:"Open the Level Blueprint of your map and wire BeginPlay → Print String('Hello from this level'). Then find World Settings and see which GameMode the map uses.",
quiz:[
{q:"The Level Blueprint is best used for…",o:["All gameplay logic","One-off scripting tied to that specific map","Reusable enemy AI","Input handling"],a:1,x:"It's map-bound by design — great for set pieces, terrible for anything reusable."},
{q:"Unity's additive scene loading maps to…",o:["World Partition only","Level Streaming","Data Layers","Open Level"],a:1,x:"Streaming sublevels load additively into a persistent level."},
{q:"What survives a level load, like a DontDestroyOnLoad object?",o:["GameMode","GameInstance","PlayerController","Level Blueprint"],a:1,x:"GameInstance is created at game start and lives until shutdown — the canonical cross-level object."}]}
]},
{id:"ue2", t:"The Gameplay Framework", skills:["Choose Pawn vs Character","Use PlayerController correctly","Pick the right class: GameMode vs GameState vs PlayerState","Explain possession"], lessons:[
{id:"ue2a", t:"Pawns & Characters", min:7,
body:`<p>Unity has no opinion about what a "player" is — you build one from a GameObject, a CharacterController and your own script. Unreal ships the opinion: a <strong>Pawn</strong> is any Actor that can be <em>possessed</em> by a Controller (player or AI), and a <strong>Character</strong> is a Pawn specialised for humanoids: capsule collider, skeletal mesh and the mighty <code>UCharacterMovementComponent</code> with walking, falling, swimming, crouching and — crucially — <strong>network prediction</strong> built in.</p>
<p>Rule of thumb: humanoid on legs → subclass <code>ACharacter</code>. Vehicle, turret, drone, chess piece → subclass <code>APawn</code> and supply your own movement (e.g. <code>FloatingPawnMovement</code>). Rewriting CharacterMovement from scratch is the classic newcomer mistake — it's years of engineering, especially for multiplayer.</p>
<p><strong>Possession</strong> is the concept Unity lacks entirely: a Controller can possess and unpossess Pawns at runtime. Switching from human to vehicle isn't "disable one script, enable another" — the PlayerController simply possesses the car Pawn.</p>`,
cmp:[["Player GameObject + CharacterController + your script","ACharacter|capsule + mesh + CharacterMovementComponent"],["Custom vehicle rig","APawn + a movement component"],["Enabling/disabling player scripts to switch control","Controller possession|Possess() / UnPossess()"],["CharacterController.Move","CharacterMovement: AddMovementInput|handles physics states + net prediction"]],
task:"In PIE, press F8 to eject from your possessed pawn and fly freely, then repossess. You just experienced possession first-hand.",
quiz:[
{q:"When should you subclass APawn instead of ACharacter?",o:["Never","For non-humanoid controllables like vehicles or turrets","For NPCs only","When you need a camera"],a:1,x:"Character = humanoid locomotion package. Anything else controllable = Pawn."},
{q:"What does 'possession' mean?",o:["Spawning a Pawn","A Controller taking control of a Pawn","Attaching a camera","Loading a level"],a:1,x:"Controllers possess Pawns; swapping bodies at runtime is a one-node/one-call operation."},
{q:"The strongest reason to keep UCharacterMovementComponent is…",o:["It's required by the editor","Built-in movement modes plus network prediction","It renders the mesh","It's faster than physics"],a:1,x:"Replicated, predicted movement is enormously hard to write; the component gives it to you free."}]},
{id:"ue2b", t:"PlayerController: the brain outside the body", min:6,
body:`<p>In Unity, input and camera logic usually live on the player object itself. Unreal splits identity from body: the <strong>PlayerController</strong> is the persistent "will" of the player, and the Pawn is a disposable body. The Controller survives when the Pawn dies or changes — respawning means spawning a new Pawn and possessing it, without losing input bindings, camera management or UI references.</p>
<p>What belongs where: <em>Pawn/Character</em> → how the body moves and reacts. <em>PlayerController</em> → input routing (it owns the Enhanced Input subsystem), camera management (<code>PlayerCameraManager</code>), HUD/UI, mouse cursor, and anything that should outlive a body. AI has the same split — <code>AIController</code> possesses Pawns just like players do, so an enemy body can be driven by AI or by a player without changes.</p>`,
cmp:[["Input code on the player MonoBehaviour","Input bound on PlayerController (or Pawn)|Controller is the canonical home"],["Camera script on player","PlayerCameraManager via PlayerController"],["Respawn: re-instantiate prefab, rewire references","Spawn new Pawn → Possess()|Controller state persists"],["NavMeshAgent + AI script","AIController possessing the same Pawn class"]],
task:"Find your project's PlayerController class in World Settings → GameMode. Note that the ThirdPerson template binds input on the Character instead — a shortcut, not a law.",
quiz:[
{q:"Your player 'dies' and respawns. What persists naturally?",o:["The Pawn","The PlayerController","The mesh","Nothing"],a:1,x:"The Controller persists; bodies come and go via possession."},
{q:"Which class conceptually owns camera management?",o:["GameMode","PlayerController (PlayerCameraManager)","GameState","The Level"],a:1,x:"The controller decides what the player sees."},
{q:"Enemy AI drives its body through…",o:["A MonoBehaviour-style tick script","An AIController possessing a Pawn","GameMode","Level Blueprint"],a:1,x:"Same possession mechanism as players — bodies are interchangeable."}]},
{id:"ue2c", t:"GameMode, GameState, PlayerState", min:8,
body:`<p>In Unity you invent managers: GameManager, ScoreManager, MatchManager singletons. Unreal ships the manager architecture, split by <em>who needs to know</em> — a split designed for multiplayer but valuable everywhere:</p>
<p><strong>GameMode</strong> — the rules referee. Exists <em>only on the server</em>. Decides what to spawn for each player (default Pawn, Controller, HUD classes), when the match starts/ends, respawn logic. Set per-level in World Settings. <strong>GameState</strong> — replicated match facts everyone should see: time remaining, team scores, phase. <strong>PlayerState</strong> — replicated facts about one player: name, score, ping. Per-player data that must be public goes here, not on the Pawn (Pawns die; PlayerState persists). And from Chapter 1, <strong>GameInstance</strong> — one object for the whole app session, across levels: settings, save handles, meta-progression.</p>
<p>Even in a single-player game, using these buckets keeps you honest and makes a later co-op mode survivable.</p>`,
cmp:[["GameManager singleton (rules)","AGameModeBase|server-only referee, per level"],["Match/score manager visible to all","AGameState|replicated to everyone"],["Per-player score dictionary","APlayerState|replicated, outlives the Pawn"],["DontDestroyOnLoad app singleton","UGameInstance"],["Prefab wiring for 'what spawns for a player'","GameMode class defaults|DefaultPawnClass, PlayerControllerClass, HUDClass"]],
diagTitle:"Who spawns whom (game start)",diag:["GameMode|reads World Settings","PlayerController|one per player","Pawn/Character|possessed body","PlayerState|created alongside the Controller"],
task:"Create a Blueprint GameMode, set its Default Pawn Class to your character, assign it in World Settings, and confirm PIE still spawns you. You've replaced template wiring with your own.",
quiz:[
{q:"Which class exists only on the server in multiplayer?",o:["GameState","PlayerState","GameMode","GameInstance"],a:2,x:"GameMode is authoritative rules — clients never have it; they read GameState instead."},
{q:"A player's score that must survive death and be visible to others belongs in…",o:["The Pawn","PlayerState","GameMode","Level Blueprint"],a:1,x:"PlayerState persists across Pawn respawns and replicates."},
{q:"The closest thing to a cross-level DontDestroyOnLoad singleton is…",o:["GameMode","GameState","GameInstance","PlayerController"],a:2,x:"GameInstance spans the whole session including level loads."}]}
]},
{id:"ue3", t:"Blueprints & Input", skills:["Read & write Blueprint graphs","Communicate between Blueprints","Cast safely","Set up Enhanced Input"], lessons:[
{id:"ue3a", t:"Blueprint scripting essentials", min:8,
body:`<p><strong>Blueprints are not 'Unreal's visual scripting toy' — they are half the engine's API surface.</strong> A Blueprint class is a real class: it subclasses a C++ class (or another Blueprint), adds variables, functions and components, and compiles to bytecode. Think of a Blueprint as <em>prefab + script in one asset</em>: what took a prefab plus a MonoBehaviour in Unity is one BP asset in Unreal.</p>
<p>The graph vocabulary maps cleanly to C#: <strong>Event BeginPlay</strong> ≈ <code>Start()</code>, <strong>Event Tick</strong> ≈ <code>Update()</code> (with DeltaSeconds as a pin), white <em>exec</em> wires are statement order, coloured wires are data. Functions vs <strong>Macros</strong> vs <strong>Custom Events</strong>: functions return values and are callable; events are fire-and-forget and can be replicated; macros are inline graph snippets.</p>
<p>Performance reality check: Blueprint is roughly 10× slower than C++ per node-call, which matters in Tick and tight loops — and almost nowhere else. The professional pattern (Chapter theme of the Integration path) is C++ for systems, Blueprint for content and glue.</p>`,
cmp:[["Prefab + MonoBehaviour pair","One Blueprint class asset"],["Start() / Update()","Event BeginPlay / Event Tick"],["[SerializeField] private field","Variable, 'Instance Editable' ticked"],["public method","BlueprintCallable function"],["UnityEvent wired in Inspector","Event Dispatcher bound in graph"]],
task:"In your Character BP, add a float variable 'Health', make it Instance Editable, and on BeginPlay print it. Change the value on the placed instance (not the class) and see per-instance data — Blueprint's 'prefab override'.",
quiz:[
{q:"A Blueprint class is closest to…",o:["A Unity scene","A prefab and its script fused into one asset","A shader graph","An INI file"],a:1,x:"Components + data + logic in a single subclassable asset."},
{q:"Event Tick's DeltaSeconds pin corresponds to…",o:["Time.fixedTime","Time.deltaTime","Time.timeScale","frameCount"],a:1,x:"Same per-frame delta concept."},
{q:"Where does Blueprint's speed penalty actually bite?",o:["Everywhere, avoid BP","In per-frame Tick and tight loops","Only in shipping builds","In the editor only"],a:1,x:"Node overhead is per-call; event-driven BP logic is effectively free."}]},
{id:"ue3b", t:"Blueprint communication & casting", min:7,
body:`<p>"How do I make object A talk to object B?" — Unreal's most-asked question. The toolbox: <strong>direct reference</strong> (a variable of the target type, set via an exposed variable or spawn result), <strong>Casting</strong>, <strong>Interfaces</strong>, and <strong>Event Dispatchers</strong>.</p>
<p><strong>Cast To X</strong> is C#'s <code>as</code> operator with a built-in null-check branch: overlap gives you an <code>Actor</code>, you cast to <code>BP_Player</code>, and take the failed pin gracefully. But heavy casting to specific Blueprint classes creates hard load-time dependencies (casting to a BP loads that BP and everything it references) — the Unreal version of Unity's "everything references everything" prefab hell. The cure is the same instinct you have from C#: prefer <strong>interfaces</strong> ("does it implement Damageable?") over concrete casts, and use <strong>Event Dispatchers</strong> (≈ C# events/UnityEvents) so the sender never knows the listener.</p>
<p>Global lookups exist (<code>Get All Actors Of Class</code> ≈ <code>FindObjectsOfType</code>) and carry the same warning label: fine on BeginPlay, criminal in Tick.</p>`,
cmp:[["other as PlayerScript + null check","Cast To BP_Player node|failed pin = null branch"],["C# interface check (is IDamageable)","Blueprint Interface message call|works without knowing the class"],["event Action / UnityEvent","Event Dispatcher"],["FindObjectsOfType<T>()","Get All Actors Of Class|same perf warning"],["Singleton.Instance","Get Game Instance / GameMode / subsystems"]],
task:"Make a trigger-box Actor with an Event Dispatcher 'OnActivated'. In the Level Blueprint, bind to it and print a message. Sender knows nothing about the listener — decoupled, like a C# event.",
quiz:[
{q:"Cast To BP_Enemy is most like C#'s…",o:["typeof()","'as' cast with a null-check branch","reflection","boxing"],a:1,x:"Succeeds → typed reference; fails → take the Cast Failed pin."},
{q:"Why avoid casting to specific Blueprint classes everywhere?",o:["Casts crash in packaged builds","Each cast creates a hard asset dependency chain at load time","Casts don't work on Pawns","They're not replicated"],a:1,x:"Referencing a BP class pulls it (and its references) into memory; interfaces break the chain."},
{q:"The Blueprint equivalent of a C# event is…",o:["Custom Event","Event Dispatcher","Macro","Timeline"],a:1,x:"Dispatchers are multicast: many listeners bind, sender broadcasts."}]},
{id:"ue3c", t:"Enhanced Input", min:7,
body:`<p>Forget the old <code>Input.GetAxis("Horizontal")</code> stringly-typed world — Unreal's <strong>Enhanced Input</strong> is the moral twin of Unity's <em>new</em> Input System package, and it's the default since UE5.1. Three asset types: an <strong>Input Action</strong> (IA_Jump, IA_Move — an action with a value type: bool, 1D, 2D axis), an <strong>Input Mapping Context</strong> (IMC — binds physical keys to actions; equivalent of an Action Map), and bindings in your Pawn/Controller.</p>
<p>Its two superpowers over raw input: <strong>Triggers</strong> (Pressed, Hold, Tap, Pulse — "hold to charge" is configuration, not code) and <strong>Modifiers</strong> (deadzone, negate, swizzle — WASD→2D-vector conversion happens in the asset). Mapping Contexts stack with priorities at runtime: add IMC_Driving when entering a car, remove IMC_OnFoot — no if-state spaghetti.</p>
<p>Binding: get the Enhanced Input subsystem from the PlayerController, add the context, then bind events per action.</p>`,
cmp:[["Input System package InputAction","Input Action asset|typed value: bool / Axis1D / Axis2D"],["Action Map","Input Mapping Context (IMC)"],["Interactions (hold, tap)","Triggers"],["Processors (deadzone, invert)","Modifiers"],["SwitchCurrentActionMap()","Add/Remove Mapping Context|stackable with priority"]],
task:"Add IA_Sprint (bool) to the template's IMC bound to Left Shift, then in the Character BP set Max Walk Speed on Started and reset it on Completed.",
quiz:[
{q:"The Input Mapping Context corresponds to Unity's…",o:["Input Manager axes","Action Map","PlayerInput component","Control scheme"],a:1,x:"A set of key→action bindings you can swap at runtime."},
{q:"'Hold button 0.5s to interact' is implemented with…",o:["A timer in Tick","A Hold Trigger on the Input Action","A Modifier","Level Blueprint"],a:1,x:"Triggers move press-semantics into data."},
{q:"Turning WASD keys into one 2D movement vector is done by…",o:["Code in the Pawn","Swizzle/negate Modifiers in the IMC","The GameMode","A macro"],a:1,x:"Modifiers massage raw input into the action's value type."}]}
]},
{id:"ue4", t:"Visuals: Materials, Animation, Niagara", skills:["Author materials & instances","Read an Animation Blueprint","Build a state machine","Create a Niagara effect"], lessons:[
{id:"ue4a", t:"Materials vs shaders", min:7,
body:`<p>In Unity you pick or write a shader, then create Materials exposing its properties. Unreal fuses these: a <strong>Material asset</strong> <em>is</em> the shader — a node graph (think Shader Graph, but the native and only workflow) feeding a physically-based output node (Base Color, Metallic, Roughness, Normal, Emissive). Roughness is the big rename: it's the inverse of Unity's Smoothness.</p>
<p>The role of "Unity material" is played by the <strong>Material Instance</strong>: a cheap child of a Material that overrides exposed parameters <em>without recompiling the shader</em>. Workflow law: build few master Materials with parameters, then instance them everywhere. Editing an instance updates live; editing the master recompiles.</p>
<p>For runtime changes (<code>material.SetColor</code>), create a <strong>Dynamic Material Instance</strong> on the mesh and set scalar/vector parameters by name. And where Unity requires care about material instancing at runtime, Unreal makes the same distinction explicit in the type system.</p>`,
cmp:[["Shader / Shader Graph","Material|node graph, is the shader"],["Material asset","Material Instance|parameter overrides, no recompile"],["Smoothness","Roughness (inverted)"],["renderer.material.SetColor","Create Dynamic Material Instance → Set Vector Parameter"],["Standard/URP Lit shader","Default lit shading model + PBR pins"]],
task:"Make a master material with a Vector Parameter 'Tint' and a Scalar 'Roughness'; create two instances with different values and apply them to meshes.",
quiz:[
{q:"Unreal's Material asset is closest to Unity's…",o:["Material","Shader Graph shader","Texture","Render pipeline asset"],a:1,x:"The Material graph compiles into the shader itself."},
{q:"You need 50 colour variants of one surface. You create…",o:["50 Materials","1 Material + 50 Material Instances","50 shaders","Dynamic instances only"],a:1,x:"Instances share the compiled shader; only parameters differ."},
{q:"Unity Smoothness 0.9 ≈ Unreal Roughness…",o:["0.9","0.1","1.0","0.5"],a:1,x:"Roughness is inverted smoothness."}]},
{id:"ue4b", t:"Animation Blueprints", min:8,
body:`<p>Unity's Animator Controller is a state machine with parameters; logic to feed those parameters lives in a script calling <code>animator.SetFloat("Speed", …)</code>. Unreal's <strong>Animation Blueprint</strong> merges both halves into one asset with two graphs: the <strong>Event Graph</strong> gathers data every frame (read the owning Pawn's velocity, falling state) into variables, and the <strong>AnimGraph</strong> consumes them in <strong>State Machines</strong> and blend nodes to produce the final pose.</p>
<p>Mappings: Animator Controller → AnimBP; Blend Tree → <strong>Blend Space</strong> (a separate asset — e.g. speed × direction → locomotion pose); transitions with conditions exist identically; Avatar → <strong>Skeleton asset</strong> (animations are bound to a Skeleton, and retargeting between skeletons is via IK Rig/IK Retargeter in UE5). Layered avatar masks → <strong>Layered blend per bone</strong> ("upper body aims, legs run"). Animation events on clips → <strong>Anim Notifies</strong>.</p>
<p>Cultural difference: the AnimBP <em>pulls</em> data from the Pawn, rather than gameplay code <em>pushing</em> parameters in. Keep the pull cheap — cache the Pawn once, read a few floats.</p>`,
cmp:[["Animator Controller","Animation Blueprint (AnimGraph + Event Graph)"],["Blend Tree","Blend Space asset"],["animator.SetFloat from a script","AnimBP Event Graph reads the Pawn|pull, not push"],["Avatar / retargeting","Skeleton asset + IK Retargeter"],["Animation Events","Anim Notifies"],["Avatar mask layers","Layered blend per bone"]],
task:"Open the template's ABP_Manny: find where the Event Graph reads velocity, then find the state machine transition rule Idle→Run. Change the run threshold and feel it in PIE.",
quiz:[
{q:"The AnimBP's Event Graph replaces which Unity habit?",o:["Animation clips","Scripts calling animator.SetFloat/SetBool","State machines","Root motion"],a:1,x:"Parameter-feeding logic lives inside the AnimBP, pulling from the Pawn."},
{q:"A 2D locomotion Blend Tree (speed × direction) becomes a…",o:["State machine","Blend Space asset","Montage","Notify"],a:1,x:"Blend Spaces map N-D inputs to blended poses."},
{q:"Hit events at frame 12 of an attack clip are done with…",o:["Timelines","Anim Notifies","Tick polling","Delegates"],a:1,x:"Notifies fire events at points in an animation — Unity's Animation Events."}]},
{id:"ue4c", t:"Niagara VFX", min:6,
body:`<p><strong>Niagara</strong> is Unreal's particle system — conceptually closest to Unity's <em>VFX Graph</em> rather than Shuriken: fully programmable, simulation on CPU or GPU, driven by user parameters. (The legacy system, Cascade, is dead; ignore it.)</p>
<p>Structure: a Niagara <strong>System</strong> contains <strong>Emitters</strong>; each emitter runs stacks of <strong>Modules</strong> in stages — Spawn, Initialize Particle, Update, Render. Modules are the analog of Shuriken's modules (Shape, Velocity over Lifetime…) but each is itself an editable graph. You expose <strong>User Parameters</strong> on the System and set them from gameplay (<code>Set Niagara Variable</code>) — the equivalent of tweaking a ParticleSystem's modules from script, but cleanly data-driven.</p>
<p>Spawning: <code>Spawn System at Location</code> ≈ <code>Instantiate(particlePrefab)</code>, or add a NiagaraComponent to an Actor for looping effects.</p>`,
cmp:[["Shuriken ParticleSystem","Niagara System|via emitters + module stacks"],["VFX Graph","Niagara|closest conceptual match"],["Modules (Shape, Noise…)","Niagara Modules|each an editable graph"],["Exposed VFX Graph properties","User Parameters + Set Niagara Variable"],["Instantiate(effectPrefab, pos, rot)","Spawn System at Location"]],
task:"Create a Niagara System from the Fountain template, expose a User Parameter for spawn rate, and set it from a Blueprint on BeginPlay.",
quiz:[
{q:"Niagara's closest Unity relative is…",o:["Shuriken","VFX Graph","Line Renderer","Trail Renderer"],a:1,x:"Both are programmable, parameter-driven, GPU-capable graph systems."},
{q:"A Niagara System is composed of…",o:["Materials","Emitters running module stacks","Levels","Montages"],a:1,x:"System → Emitters → Modules per stage."},
{q:"Gameplay changes an effect's intensity via…",o:["Editing the asset at runtime","User Parameters (Set Niagara Variable)","Recompiling","Console commands"],a:1,x:"Expose a parameter, drive it from BP/C++."}]}
]},
{id:"ue5", t:"Architecture & Data", skills:["Choose Data Asset vs DataTable","Use Gameplay Tags","Design with BP interfaces","Explain World Partition"], lessons:[
{id:"ue5a", t:"Data Assets & DataTables", min:6,
body:`<p>Your ScriptableObject instincts transfer almost 1:1. A <strong>Primary Data Asset</strong> (subclass <code>UPrimaryDataAsset</code>, or a Blueprint of it) is a typed data container asset: WeaponDefinition, EnemyArchetype — exactly a ScriptableObject. Reference it from Actors instead of duplicating numbers on prefabs.</p>
<p>For spreadsheet-shaped data, Unreal adds <strong>DataTables</strong>: rows of one struct type, importable from CSV/JSON — the thing Unity teams usually hand-roll. Look up rows by <strong>row name</strong> (an <code>FName</code>).</p>
<p>Two Unreal-specific upgrades: <strong>soft references</strong> (<code>TSoftObjectPtr</code> / Soft Object Reference) point to an asset <em>without loading it</em> — the built-in answer to Unity's Addressables problem of hard reference chains; and the <strong>Asset Manager</strong> can scan, bundle and async-load Primary Data Assets by type and tag.</p>`,
cmp:[["ScriptableObject","Primary Data Asset"],["Hand-rolled CSV importer","DataTable|struct rows, CSV/JSON import"],["Addressables (load-on-demand refs)","Soft Object References + Asset Manager"],["Direct asset reference in prefab","Hard reference|loads with the referencer, same pitfalls"],["Resources.Load","LoadObject / async load via soft refs|Resources-style folder loading discouraged in both"]],
task:"Create a WeaponData Primary Data Asset BP with Damage and FireRate, make two weapon assets, and print their values from a test Actor.",
quiz:[
{q:"The Unreal ScriptableObject is…",o:["DataTable","Primary Data Asset","GameInstance","SaveGame"],a:1,x:"Typed, referenced, designer-editable data asset."},
{q:"200 item definitions maintained in a spreadsheet belong in…",o:["200 Data Assets","A DataTable imported from CSV","Config INI","The Level Blueprint"],a:1,x:"DataTables are made for row-based bulk data."},
{q:"A soft reference differs from a hard one because…",o:["It's read-only","It doesn't load the asset until you ask","It's faster to dereference","It can't be saved"],a:1,x:"Soft refs store a path; you async-load on demand — Addressables energy, built in."}]},
{id:"ue5b", t:"Gameplay Tags", min:5,
body:`<p>Unity tags: one string per GameObject, flat, typo-prone. <strong>Gameplay Tags</strong> are the opposite: a project-wide <em>hierarchical</em> registry (<code>Status.Debuff.Burning</code>, <code>Weapon.Ranged.Bow</code>), attachable in <em>containers</em> (many tags per thing), queried with hierarchy awareness — asking "has <code>Status.Debuff</code>?" matches any child tag.</p>
<p>Use them wherever you'd reach for enums-that-keep-growing or string constants: damage types, ability states, AI states, item categories. They serialize, replicate, and edit with autocomplete. Combined with tag <em>queries</em> ("ANY of (A,B) AND NOT C") they replace towers of boolean flags. They're also the backbone of the Gameplay Ability System, so learning them pays forward.</p>`,
cmp:[["GameObject.tag (single string)","Gameplay Tag Container|many hierarchical tags"],["CompareTag('Enemy')","Has Tag / Has Any / matching with hierarchy"],["Ever-growing enum EDamageType","Tag family Damage.*|extend without recompiling users"],["Layers for logic grouping","Tags + tag queries|layers in UE stay for collision/rendering channels"]],
task:"Add tags Status.Burning and Status.Frozen in Project Settings → Gameplay Tags, give an Actor a tag container, and branch on 'Has Tag Status.Burning'.",
quiz:[
{q:"The key structural upgrade over Unity tags is…",o:["They're faster","Hierarchy + multiple tags per object","They're colours","They're per-level"],a:1,x:"Hierarchical namespaces with container semantics and partial matching."},
{q:"'Has tag Status.Debuff' on an object tagged Status.Debuff.Burning returns…",o:["False","True — parent matches children","Error","Only in C++"],a:1,x:"Hierarchical matching is the point."},
{q:"Gameplay Tags best replace…",o:["Materials","Sprawling enums and magic strings for states/categories","Levels","Collision channels"],a:1,x:"Data-driven, extensible categorisation."}]},
{id:"ue5c", t:"Interfaces & decoupling", min:5,
body:`<p>You know interfaces from C#; Unreal has them in both worlds. A <strong>Blueprint Interface</strong> asset declares functions with no implementation; any Blueprint can implement it, and — the twist — you can <em>message</em> any Actor through an interface call without casting: if it implements the function it runs, otherwise the call is silently skipped. That's duck-typed messaging Unity never had natively (closest was the reviled <code>SendMessage</code>, minus type safety).</p>
<p>Canonical use: <code>IInteractable</code> with <code>Interact(Instigator)</code>. Your player traces, sends the Interact message to whatever it hit — doors, chests, NPCs — zero knowledge of their classes, zero hard references. Prefer this over Cast-chains whenever behaviour, not data, is what you need from a stranger.</p>`,
cmp:[["C# interface + 'is IInteractable' check","Blueprint Interface + message call|no cast needed"],["SendMessage('Interact')","Interface message|typed, safe, fails silently by design"],["Abstract base class for contracts","Interface or base class|UE has both; interfaces avoid the dependency chain"]],
task:"Create BPI_Interactable with an Interact function; implement it on a door (opens) and a lamp (toggles light); make the player line-trace and send the message to anything hit.",
quiz:[
{q:"Calling an interface message on an Actor that doesn't implement it…",o:["Crashes","Does nothing, by design","Casts automatically","Logs an error"],a:1,x:"Safe no-op — that's what makes it great for 'try to interact with anything'."},
{q:"Interfaces beat casting chains primarily because…",o:["They're faster","They remove hard class dependencies","They replicate","They're prettier"],a:1,x:"The caller depends only on the interface asset."},
{q:"Unity's nearest (unsafe) analog to interface messages was…",o:["Invoke","SendMessage","Coroutines","Tags"],a:1,x:"Same 'call by name if present' spirit, now with types."}]},
{id:"ue5d", t:"World Partition & big worlds", min:6,
body:`<p>How do you stream a huge world in Unity? You cut the map into additive scenes and write a streaming manager. Unreal 5's <strong>World Partition</strong> deletes that job: one big persistent level, automatically split into a <strong>grid of cells</strong>, streamed in/out around streaming sources (usually the player). Actors opt in via their <em>Is Spatially Loaded</em> flag.</p>
<p>Supporting cast: <strong>One File Per Actor (OFPA)</strong> stores each actor as its own file so a team can edit one map without merge wars (the answer to Unity's scene-merge nightmare); <strong>Data Layers</strong> group actors for conditional loading (quest states, day/night variants) — think scene-within-scene toggles; <strong>HLODs</strong> auto-generate merged low-poly proxies for unloaded cells, so distant cities still render.</p>
<p>For small/medium levels, classic Level Streaming (Chapter 1) remains fine — World Partition shines at open-world scale.</p>`,
cmp:[["Hand-rolled additive-scene streaming","World Partition|automatic grid streaming"],["Scene merge conflicts in teams","One File Per Actor"],["Enabling/disabling content sets per state","Data Layers"],["LOD Groups + manual impostors","HLOD|auto-built proxy meshes per cell"]],
task:"Create a new Open World template map, enable the World Partition editor minimap, and watch cells load/unload as you PIE-run across the terrain.",
quiz:[
{q:"World Partition replaces which Unity chore?",o:["Lightmapping","Hand-built additive-scene streaming systems","Prefabs","NavMesh"],a:1,x:"Automatic cell-based streaming of one big level."},
{q:"One File Per Actor exists to solve…",o:["Load times","Team collaboration / merge conflicts on maps","GPU memory","Shader compilation"],a:1,x:"Each actor is a separate file on disk; two people can edit the same map."},
{q:"Data Layers are best described as…",o:["Rendering layers","Named actor groups you can load/activate conditionally","Physics channels","Save files"],a:1,x:"Quest variants, seasonal content, alternate set-dressing."}]}
]},
{id:"ue6", t:"Shipping: Save, Package, Optimize", skills:["Implement SaveGame","Package a build","Profile with stat & Insights","Use scalability settings"], lessons:[
{id:"ue6a", t:"The Save System", min:6,
body:`<p>Unity gives you <code>PlayerPrefs</code> and a shrug; real saves mean JSON + files. Unreal ships a real system: subclass <strong>USaveGame</strong> (in BP or C++), add the variables to persist, then <code>Create Save Game Object → set fields → Save Game to Slot("Slot1", 0)</code> and <code>Load Game from Slot</code> back. Serialization of the object's properties is automatic (in C++, anything marked <code>UPROPERTY(SaveGame)</code> with the right serializer).</p>
<p>Architecture stays your job: a SaveGame object is a <em>snapshot struct</em>, not live state — on save you gather (player transform, inventory rows, quest tags), on load you re-apply. GameInstance is the natural owner of save/load orchestration since it survives level changes. Async variants exist for large saves.</p>`,
cmp:[["PlayerPrefs","Save Game to Slot|but structured objects, not key-value strings"],["JsonUtility + File.WriteAllText","USaveGame subclass|auto property serialization"],["Custom save manager singleton","GameInstance orchestrating SaveGame objects"]],
task:"Create BP_MySave (SaveGame) with PlayerLocation; save on key P, load and teleport on key L. Congratulations: persistent state with zero file I/O code.",
quiz:[
{q:"USaveGame is best thought of as…",o:["Live game state","A snapshot object you fill on save and read on load","A database","A config INI"],a:1,x:"Gather → save; load → re-apply."},
{q:"Which class should typically own save/load flow?",o:["The Pawn","GameInstance","Level Blueprint","PlayerCameraManager"],a:1,x:"It persists across levels — ideal orchestrator."},
{q:"In C++, a property persists in a SaveGame when marked…",o:["Transient","UPROPERTY(SaveGame)","EditAnywhere","Config"],a:1,x:"The SaveGame specifier opts the field into save serialization."}]},
{id:"ue6b", t:"Packaging & builds", min:6,
body:`<p>Unity's Build Settings dialog becomes <strong>Platforms → [Platform] → Package Project</strong>. Under the hood, packaging <strong>cooks</strong> content (converts editor-format assets to platform-optimized binary — Unity does this invisibly), <strong>stages</strong> it into <code>.pak</code> archives, and compiles a <strong>Shipping</strong> build of the code. Build configurations matter: <em>Development</em> keeps debugging and console; <em>Shipping</em> strips them — the Release analog.</p>
<p>Which maps ship? Project Settings → Packaging → List of maps (≈ Scenes In Build). Set the Default/Game Default Map — the startup scene. Common gotchas for Unity refugees: assets only referenced by string paths don't get cooked (same spirit as Resources folder surprises) — force-include via "Additional Asset Directories to Cook"; and Shipping disables <code>Print String</code>-style debugging, so wean off early.</p>`,
cmp:[["Build Settings → Build","Platforms → Package Project"],["Scenes In Build list","Packaging: List of Maps + Default Maps"],["Development Build checkbox","Development vs Shipping configuration"],["Invisible asset import pipeline","Cooking|explicit, per-platform"],["StreamingAssets/","Additional directories to cook / .pak staging"]],
task:"Package a Windows (or your platform's) Development build of your project and run the executable outside the editor.",
quiz:[
{q:"'Cooking' is…",o:["Compiling C++","Converting assets to platform-optimized runtime formats","Lightmap baking","Shader warmup"],a:1,x:"Editor assets → runtime binary content, per platform."},
{q:"The Shipping configuration ≈ Unity's…",o:["Debug build","Release build without dev tooling","Editor play mode","IL2CPP only"],a:1,x:"Optimized, stripped of debug features and console."},
{q:"An asset loaded only by a runtime string path will…",o:["Always package fine","Possibly be excluded from cooking — force-include it","Crash the cook","Become a soft reference"],a:1,x:"The cooker follows references; pathless loads need explicit inclusion."}]},
{id:"ue6c", t:"Performance & profiling", min:7,
body:`<p>Your Unity profiler instincts port over; the tools are renamed. Quick on-screen numbers: console commands <code>stat fps</code>, <code>stat unit</code> (the crucial one — shows whether Game thread, Draw/RHI thread or GPU is the bottleneck ≈ CPU vs GPU bound in Unity's profiler), <code>stat gpu</code>, <code>stat scenerendering</code> (draw calls). Deep dives: <strong>Unreal Insights</strong> is the Profiler window/Timeline, and the <strong>GPU Visualizer</strong> (Ctrl+Shift+,) breaks down a frame's GPU cost.</p>
<p>The usual suspects differ slightly from Unity: <strong>Tick abuse</strong> (disable tick on everything that can be event-driven — Actors tick by default in C++ unless you say otherwise!), Blueprint-heavy per-frame logic, too many <strong>dynamic lights with shadows</strong>, overdraw from translucent materials, and uncontrolled draw calls (Instanced Static Meshes ≈ GPU instancing). <strong>Scalability</strong> settings (Low→Epic presets driven by console variables) are Unity's Quality Settings, and they're your first lever on weaker hardware. UE5-specific: Nanite virtualizes mesh detail (rethinks LODs entirely) and Lumen replaces baked GI — both trade base GPU cost for scalability.</p>`,
cmp:[["Profiler window / Timeline","Unreal Insights"],["Stats overlay (Game view)","stat fps / stat unit / stat gpu"],["Quality Settings presets","Scalability settings (sg.* console variables)"],["GPU instancing / SRP batcher","Instanced Static Mesh components"],["Baked GI + lightmaps","Lumen (dynamic) or baked lightmass"],["LOD Groups","Nanite (or classic LODs for non-Nanite)"]],
task:"In PIE, run stat unit and identify your bottleneck thread; then run stat scenerendering and note your draw call count.",
quiz:[
{q:"Which command tells you Game-thread vs GPU bound at a glance?",o:["stat fps","stat unit","stat memory","showflag"],a:1,x:"stat unit shows frame, game, draw and GPU times side by side."},
{q:"A dangerous C++ default Unity devs miss:",o:["Actors don't render","Actors tick every frame unless disabled","Materials recompile per frame","GC runs per tick"],a:1,x:"Set PrimaryActorTick.bCanEverTick=false (or disable in BP) for everything event-driven."},
{q:"Unity's Quality Settings map to…",o:["World Settings","Scalability settings","Device profiles only","stat commands"],a:1,x:"Scalability groups (sg.*) drive preset quality tiers."}]}
]}
]},
{
id:"cpp", icon:"⟬⟭", title:"C++ for Unreal", blurb:"Modern C++ as Unreal actually uses it — headers, pointers, reflection macros, delegates and the build system, translated from C#.",
chapters:[
{id:"cpp1", t:"From C# to C++", skills:["Explain headers & the build model","Use pointers & references correctly","Reason about stack vs heap & ownership"], lessons:[
{id:"cpp1a", t:"Headers, cpp files & the build model", min:7,
body:`<p>C# compiles a project as one happy family: every class sees every other class, no declarations needed. C++ compiles each <code>.cpp</code> <em>in isolation</em> (a "translation unit"), so each file must be told what exists — via <strong>#include</strong> of <strong>header files</strong>. Hence the split you'll live with: <code>MyActor.h</code> declares the class (the promise), <code>MyActor.cpp</code> defines the bodies (the delivery).</p>
<p>Two survival rules. One: headers get included into many files, so keep them lean — in headers, prefer a <strong>forward declaration</strong> (<code>class UCameraComponent;</code>) when you only use pointers/references to a type, and #include the full header in the .cpp. This slashes compile times and breaks circular includes, the C++ version of assembly-definition cycles. Two: every Unreal header starts with <code>#pragma once</code> (include guard) and your class's generated include (<code>MyActor.generated.h</code>) must be the <em>last</em> include in the file.</p>`,
code:`<span class="cm">// MyActor.h — the promise</span>
<span class="kw">#pragma once</span>
<span class="kw">#include</span> <span class="st">"GameFramework/Actor.h"</span>
<span class="kw">#include</span> <span class="st">"MyActor.generated.h"</span>  <span class="cm">// always last</span>

<span class="kw">class</span> UCameraComponent;              <span class="cm">// forward declaration</span>

<span class="mc">UCLASS</span>()
<span class="kw">class</span> AMyActor : <span class="kw">public</span> AActor {
    <span class="mc">GENERATED_BODY</span>()
    <span class="kw">void</span> DoThing();                   <span class="cm">// declared here…</span>
};

<span class="cm">// MyActor.cpp — the delivery</span>
<span class="kw">#include</span> <span class="st">"MyActor.h"</span>
<span class="kw">#include</span> <span class="st">"Camera/CameraComponent.h"</span> <span class="cm">// full include only where used</span>
<span class="kw">void</span> AMyActor::DoThing() { <span class="cm">/* …defined here */</span> }`,
cmp:[["One .cs file per class, no declarations","Header (.h) declaration + source (.cpp) definition"],["using UnityEngine;","#include specific headers"],["Assembly definition cycles","Circular includes|solved by forward declarations"],["Roslyn compiles the project as a whole","Each .cpp compiles alone, then links"]],
task:"Create a C++ Actor from the editor (Tools → New C++ Class) and study the generated .h/.cpp pair; identify the generated.h include and the UCLASS macro.",
quiz:[
{q:"Why do headers exist at all?",o:["Tradition","Each .cpp compiles in isolation and must be told what types exist","They're faster than .cpp","They hold assets"],a:1,x:"Translation units see nothing by default; #include pastes declarations in."},
{q:"In a header you use UCameraComponent* as a member. You should…",o:["#include the camera header there","Forward-declare in the .h, include fully in the .cpp","Use void*","Avoid pointers"],a:1,x:"Pointers/references only need the name; keep headers lean."},
{q:"MyActor.generated.h must be…",o:["First include","Anywhere","The last include in the header","In the .cpp only"],a:2,x:"UHT-generated code depends on everything above it — always last."}]},
{id:"cpp1b", t:"Pointers & references", min:8,
body:`<p>In C#, every class variable is secretly a reference; you never think about it. C++ makes the choice explicit, and Unreal code uses three flavours constantly. A <strong>pointer</strong> <code>AActor* Target</code> holds an address, can be <code>nullptr</code>, can be reseated; access members with <code>-></code>. A <strong>reference</strong> <code>AActor& A</code> is an alias that can never be null and never reseated — think of it as C#'s guarantee, made explicit. A plain <strong>value</strong> <code>FVector V</code> is a full copy (C# struct semantics).</p>
<p>Parameter-passing idioms you'll write daily: pass big read-only things as <strong>const reference</strong> — <code>const FVector&amp; Location</code> ≈ "borrow, don't copy, don't modify" (C# <code>in</code>); pass outputs as non-const reference (C# <code>out/ref</code>); pass "maybe an object" as a pointer. <strong>const</strong> is a real compiler-enforced contract, sprinkled everywhere: <code>const</code> methods promise not to mutate the object.</p>
<p>Null discipline: Unreal's <code>IsValid(Ptr)</code> beats a raw <code>Ptr != nullptr</code> for UObjects because it also checks <em>pending-kill</em> — the engine's equivalent of Unity's destroyed-but-not-null fake objects, except here checking is opt-in, not overloaded <code>==</code> magic.</p>`,
code:`<span class="kw">void</span> Fire(<span class="kw">const</span> FVector& Origin,      <span class="cm">// borrow, read-only  (≈ in)</span>
          FHitResult& OutHit,           <span class="cm">// caller's variable   (≈ out)</span>
          AActor* OptionalIgnored)      <span class="cm">// may be nullptr</span>
{
    <span class="kw">if</span> (IsValid(OptionalIgnored)) { <span class="cm">/* safe UObject check */</span> }
}`,
cmp:[["Class variables (implicit references)","T* pointers|explicit, nullable, use ->"],["struct copies","Value types (FVector, FRotator…)|copied unless passed by ref"],["in parameter","const T&"],["out / ref parameter","T& (non-const reference)"],["if (obj == null) with Unity's fake-null","if (IsValid(Ptr))|checks null AND pending-kill"]],
task:"Write a free function taking const FVector& and an FString& out-parameter that fills in a formatted description of the vector; call it from BeginPlay.",
quiz:[
{q:"const FVector& Location as a parameter means…",o:["Copy the vector","Borrow it read-only without copying","It can be null","It's static"],a:1,x:"Reference avoids the copy; const forbids mutation — the default for non-trivial read-only params."},
{q:"A reference (T&) differs from a pointer because it…",o:["Is slower","Cannot be null and cannot be reseated","Uses -> syntax","Only works on structs"],a:1,x:"References are guaranteed-valid aliases."},
{q:"For UObject pointers, prefer IsValid(Ptr) because…",o:["It's shorter","It also detects pending-kill (destroyed) objects","nullptr checks crash","It garbage collects"],a:1,x:"Like Unity's destroyed-object problem, but you check explicitly."}]},
{id:"cpp1c", t:"Memory, stack & ownership", min:8,
body:`<p>The scary part of C++ is "manual memory management." Here's the relief: <strong>in Unreal gameplay code you almost never call new/delete.</strong> Three territories: (1) <strong>Stack</strong> — locals like <code>FVector V;</code> live in the function frame and vanish at scope end; free and instant; most math/struct types live here. (2) <strong>UObjects</strong> (Actors, components, anything UCLASS) — created via engine factories (<code>SpawnActor</code>, <code>NewObject</code>, <code>CreateDefaultSubobject</code>) and <em>garbage collected</em>, just like C#… with one condition: the GC only sees references stored in <code>UPROPERTY</code> fields or engine containers. A raw C++ pointer to a UObject is invisible to GC — the object under it can be collected. Mark it <code>UPROPERTY()</code> (or use <code>TWeakObjectPtr</code> for non-owning). (3) <strong>Non-UObject heap data</strong> — owned by smart pointers: <code>TUniquePtr</code> (single owner), <code>TSharedPtr</code> (ref-counted). RAII means destruction is deterministic — the origin of C#'s <code>using</code>, but pervasive.</p>
<p>So the C# habit "assign to a field and forget" survives — as long as the field is a UPROPERTY. That macro is not decoration; it's a lifetime contract.</p>`,
cmp:[["GC handles everything","GC handles UObjects — only via UPROPERTY-visible refs"],["new MyClass() for plain classes","TUniquePtr / TSharedPtr / MakeShared|RAII ownership"],["struct on the stack (kind of)","True stack locals|deterministic, free"],["using / IDisposable","RAII destructors|automatic at scope exit"],["WeakReference","TWeakObjectPtr|non-owning UObject pointer"]],
task:"In a test Actor, store a spawned Actor in (a) a raw member pointer and (b) a UPROPERTY() pointer; add a comment explaining which one the GC can see and why.",
quiz:[
{q:"Unreal UObjects are freed by…",o:["delete calls you write","Garbage collection, tracking UPROPERTY references","Reference counting always","The level"],a:1,x:"UObjects are GC'd; UPROPERTY is how the collector sees your reference."},
{q:"A raw (non-UPROPERTY) member pointer to a UObject risks…",o:["Compile errors","The object being GC'd underneath it","Memory leaks","Slow access"],a:1,x:"GC can't see it, so the target may be collected — the classic Unreal dangling pointer."},
{q:"For a plain C++ helper object with one owner, use…",o:["new/delete","TUniquePtr","UPROPERTY","static"],a:1,x:"Unique ownership, auto-destroyed — modern C++ default."}]}
]},
{id:"cpp2", t:"Unreal C++ Core: Reflection & Types", skills:["Use UCLASS/UPROPERTY/UFUNCTION","Explain the reflection system","Pick FString vs FName vs FText","Use TArray/TMap/TSet"], lessons:[
{id:"cpp2a", t:"UCLASS, UPROPERTY, UFUNCTION & reflection", min:8,
body:`<p>C# has reflection built into the runtime; C++ has none. Unreal builds its own: the <strong>Unreal Header Tool (UHT)</strong> scans your headers before compilation and generates metadata code for anything you mark with its macros. That metadata powers everything you took for granted in Unity: the Details panel, serialization, Blueprint exposure, networking, and GC.</p>
<p>The trinity: <strong>UCLASS()</strong> on the class (plus <code>GENERATED_BODY()</code> inside) registers the type. <strong>UPROPERTY(...)</strong> on fields — with specifiers replacing Unity attributes: <code>EditAnywhere</code> ≈ serialized-and-editable, <code>VisibleAnywhere</code> ≈ shown read-only, <code>BlueprintReadWrite</code> exposes to BP graphs, <code>Category="Combat"</code> groups the Details panel. <strong>UFUNCTION(...)</strong> on methods: <code>BlueprintCallable</code> makes it a BP node; <code>BlueprintPure</code> ≈ a no-exec getter node.</p>
<p>Mental model: <em>the macros are Unity's [SerializeField]/[Header]/public-method-magic — but explicit, and mandatory for engine visibility.</em> Unmarked members are invisible to editor, GC and Blueprint: private in the deepest sense.</p>`,
code:`<span class="mc">UCLASS</span>()
<span class="kw">class</span> AWeapon : <span class="kw">public</span> AActor {
    <span class="mc">GENERATED_BODY</span>()

    <span class="mc">UPROPERTY</span>(EditAnywhere, BlueprintReadWrite, Category=<span class="st">"Combat"</span>)
    <span class="kw">float</span> Damage = 25.f;              <span class="cm">// [SerializeField] + inspector edit</span>

    <span class="mc">UFUNCTION</span>(BlueprintCallable, Category=<span class="st">"Combat"</span>)
    <span class="kw">void</span> Fire();                      <span class="cm">// callable node in Blueprint</span>

    <span class="mc">UFUNCTION</span>(BlueprintPure)
    <span class="kw">float</span> GetDPS() <span class="kw">const</span>;             <span class="cm">// pure getter node</span>
};`,
cmp:[["[SerializeField] float dmg;","UPROPERTY(EditAnywhere) float Damage;"],["[Header('Combat')]","Category=\"Combat\""],["public method visible to UnityEvents","UFUNCTION(BlueprintCallable)"],["C# runtime reflection","UHT-generated reflection|build-time code generation"],["[HideInInspector] public","UPROPERTY() with no Edit/Visible specifier|GC-visible, editor-hidden"]],
task:"Add a UPROPERTY(EditAnywhere, Category=\"Stats\") float and a UFUNCTION(BlueprintCallable) to your C++ Actor; verify the field appears in Details and the function appears as a BP node.",
quiz:[
{q:"Who generates Unreal's reflection data?",o:["The C++ compiler","Unreal Header Tool, before compilation","The linker","Blueprint VM"],a:1,x:"UHT parses the macros and writes the .generated code."},
{q:"EditAnywhere most resembles…",o:["[HideInInspector]","[SerializeField] with inspector editing","const","[Range]"],a:1,x:"Serialized and editable in the Details panel."},
{q:"A UObject pointer field WITHOUT UPROPERTY is…",o:["Fine","Invisible to GC and editor — dangerous for ownership","Automatically replicated","A compile error"],a:1,x:"Reflection powers GC visibility; unmarked means unseen."}]},
{id:"cpp2b", t:"Strings & core types: FString, FName, FText", min:6,
body:`<p>C# has one <code>string</code>; Unreal deliberately has three. <strong>FString</strong> — mutable working string; concatenation, parsing, <code>FString::Printf(TEXT("HP: %f"), HP)</code> ≈ <code>$"HP: {hp}"</code>. <strong>FName</strong> — immutable, case-insensitive, <em>interned</em> identifier: comparisons are integer-fast; used for asset names, bones, sockets, tags, DataTable rows. Nearest Unity concept: the string IDs you hash with <code>Animator.StringToHash</code> — built into the type system. <strong>FText</strong> — display text for humans: localization-aware, the only correct type for UI. Rule: <em>identity → FName, computation → FString, screen → FText.</em></p>
<p>Also meet the primitive conventions: <code>int32/uint8</code> instead of int/byte (sizes guaranteed), <code>float</code> widely used, and the <code>TEXT("...")</code> macro wrapping every literal (wide-char correctness). Prefix decoder while reading engine code: <code>A</code>ctor classes, <code>U</code>Objects, <code>F</code> plain structs/classes, <code>E</code>nums, <code>I</code>nterfaces, <code>T</code>emplates, and <code>b</code>Boolean fields.</p>`,
cmp:[["string (all purposes)","FString / FName / FText|by purpose"],["$\"HP: {hp}\"","FString::Printf(TEXT(\"HP: %f\"), HP)"],["Animator.StringToHash IDs","FName|interned, int-fast comparison"],["Localization tables + string","FText|localization built into the type"],["int / byte","int32 / uint8|explicit sizes"]],
task:"Create one variable of each string type in a C++ Actor and log all three; use an FName for a socket/row-style identifier and FText for a UI-facing label.",
quiz:[
{q:"A DataTable row identifier should be…",o:["FString","FName","FText","int32"],a:1,x:"Identity strings are FNames — interned and fast to compare."},
{q:"Text shown to the player in UI must be…",o:["FString","FName","FText","char*"],a:2,x:"FText carries localization; the other two don't."},
{q:"The b prefix (bIsDead) marks…",o:["Blueprint variables","Boolean fields, by convention","Bound delegates","Bytes"],a:1,x:"Epic coding standard — you'll see it everywhere."}]},
{id:"cpp2c", t:"Containers: TArray, TMap, TSet", min:6,
body:`<p>Direct swaps for your daily C# collections, with UHT-friendly powers: <strong>TArray&lt;T&gt;</strong> ≈ <code>List&lt;T&gt;</code> (<code>Add, Num()</code> ≈ Count, <code>Contains</code>, range-for works); <strong>TMap&lt;K,V&gt;</strong> ≈ <code>Dictionary</code> — note <code>Find</code> returns a <em>pointer</em> (nullptr if missing) rather than TryGetValue's bool+out; <strong>TSet&lt;T&gt;</strong> ≈ <code>HashSet</code>. All three can be UPROPERTYs: editable in Details, serialized, GC-tracked element pointers — the thing Unity's Dictionary famously couldn't do (no inspector, no serialization).</p>
<p>Performance habits transfer: <code>Reserve(N)</code> ≈ Capacity to avoid re-allocations; <code>RemoveAtSwap</code> for order-irrelevant O(1) removal; iterate by <code>const T&</code> to avoid copies. For fixed sets of options, <code>UENUM(BlueprintType)</code> enums join the reflection party and appear as dropdowns.</p>`,
cmp:[["List<T>","TArray<T>|Num(), Add, Contains, range-for"],["Dictionary<K,V>","TMap<K,V>|Find returns pointer-or-null"],["HashSet<T>","TSet<T>"],["Dictionary not serializable in Inspector","UPROPERTY TMap edits in Details|finally"],["enum + [SerializeField]","UENUM(BlueprintType)|dropdown + BP support"]],
task:"Add a UPROPERTY TMap<FName, float> of item weights to an Actor, fill it in the Details panel, and log a lookup with Find (handling the miss case).",
quiz:[
{q:"TMap::Find returns…",o:["A bool","A pointer to the value, or nullptr","A copy always","An iterator only"],a:1,x:"Check the pointer before dereferencing — the TryGetValue idiom, C++-style."},
{q:"A big UPROPERTY advantage of TMap over Unity's Dictionary:",o:["It's faster","It serializes and edits in the Details panel","It's thread-safe","It replicates automatically"],a:1,x:"Reflection makes engine containers first-class editor citizens."},
{q:"Order doesn't matter and you remove mid-array often. Use…",o:["RemoveAt","RemoveAtSwap","Pop","A TSet instead"],a:1,x:"Swap-with-last removal avoids shifting — O(1)."}]}
]},
{id:"cpp3", t:"OOP the Unreal Way", skills:["Override virtuals with Super calls","Build UINTERFACEs","Declare & bind delegates"], lessons:[
{id:"cpp3a", t:"Inheritance & virtual functions", min:7,
body:`<p>C# made you write <code>virtual</code>/<code>override</code>; C++ is the language that invented the pattern, with two differences. First, methods are non-virtual by default and there's no <code>new</code>-style hiding safety net — Unreal code marks overrides with the <code>override</code> keyword (do it always; it turns typos into compile errors). Second, and critically: <strong>base calls are not automatic and not optional in spirit.</strong> When you override <code>BeginPlay</code>, <code>Tick</code>, or any engine virtual, call <code>Super::BeginPlay()</code> — Unreal's <code>base.Method()</code> — or the engine's own setup silently doesn't run. Forgotten Super calls are a top-3 newcomer bug.</p>
<p>C++ has multiple inheritance; Unreal restricts you to <em>one UCLASS base</em> plus any number of interfaces — exactly the C# rule, enforced by convention. Constructors differ from Unity too: a UObject constructor runs for the <strong>Class Default Object</strong> at startup, not per-spawn gameplay setup — treat it like serialized-field initialization, and keep gameplay logic in BeginPlay (full story in Chapter 4).</p>`,
code:`<span class="kw">void</span> AMyActor::BeginPlay()
{
    Super::BeginPlay();      <span class="cm">// ≈ base.BeginPlay() — NEVER forget</span>
    <span class="cm">// your setup here</span>
}`,
cmp:[["override keyword (mandatory)","override keyword (optional but always use it)"],["base.Method()","Super::Method()|forgetting it breaks engine behaviour"],["Single class + interfaces","Same rule for UCLASSes"],["Awake/constructor confusion","Constructor = CDO setup; BeginPlay = gameplay setup"]],
task:"Override Tick in your C++ Actor, deliberately remove the Super::Tick call, note nothing visibly breaks — then write a comment explaining why it's still wrong (parent tick logic, plugins, future-proofing).",
quiz:[
{q:"Overriding BeginPlay without calling Super::BeginPlay()…",o:["Won't compile","Compiles but skips engine/base setup — a classic bug","Is recommended","Only matters in Blueprints"],a:1,x:"The engine relies on its base implementations running."},
{q:"Unreal's equivalent of base.TakeDamage() is…",o:["parent::TakeDamage()","Super::TakeDamage()","this->TakeDamage()","Base()"],a:1,x:"Super is a typedef for the parent class."},
{q:"UObject constructors are best used for…",o:["Spawning actors","Default values & CreateDefaultSubobject — CDO setup","Input binding","Loading levels"],a:1,x:"They run for the Class Default Object; gameplay init belongs in BeginPlay."}]},
{id:"cpp3b", t:"Interfaces in C++ (UINTERFACE)", min:6,
body:`<p>A C# interface is one keyword. An Unreal C++ interface is a two-part ritual: a tiny <code>UINTERFACE</code> UObject stub (reflection bookkeeping — ignore it) and the real <code>IInteractable</code> class holding the functions. Implement by inheriting <code>public IInteractable</code> alongside your UCLASS base.</p>
<p>The payoff is the same duck-typed superpower you met in Blueprints: check with <code>Ptr->Implements&lt;UInteractable&gt;()</code>, and — for BlueprintNativeEvent interface functions — call through <code>IInteractable::Execute_Interact(TargetActor, Instigator)</code>, which works whether the implementer is C++ or a Blueprint. That Execute_ prefix looks odd but it's what makes one interface span both worlds.</p>
<p>Design guidance carries over from C#: interfaces for capabilities (Damageable, Interactable, Saveable), base classes for shared implementation.</p>`,
code:`<span class="mc">UINTERFACE</span>(MinimalAPI, Blueprintable)
<span class="kw">class</span> UInteractable : <span class="kw">public</span> UInterface { <span class="mc">GENERATED_BODY</span>() };

<span class="kw">class</span> IInteractable {                <span class="cm">// the real interface</span>
    <span class="mc">GENERATED_BODY</span>()
<span class="kw">public</span>:
    <span class="mc">UFUNCTION</span>(BlueprintNativeEvent)
    <span class="kw">void</span> Interact(AActor* Instigator);
};

<span class="cm">// usage</span>
<span class="kw">if</span> (Hit->Implements<UInteractable>())
    IInteractable::Execute_Interact(Hit, <span class="kw">this</span>);`,
cmp:[["interface IInteractable {}","UINTERFACE stub + IInteractable class pair"],["obj is IInteractable","Ptr->Implements<UInteractable>()"],["((IInteractable)obj).Interact()","IInteractable::Execute_Interact(Obj, ...)|works for BP implementers too"]],
task:"Convert your Blueprint interaction system (Ch.5 of the Unreal path) to a C++ UINTERFACE, keeping the door Blueprint as an implementer — prove Execute_ reaches BP.",
quiz:[
{q:"Why two classes per Unreal interface?",o:["Legacy typo","The U-stub is reflection bookkeeping; the I-class is the real interface","Multiple inheritance","One is for structs"],a:1,x:"UINTERFACE registers with reflection; you implement and call via the I-side."},
{q:"Calling interface functions via Execute_ matters because…",o:["It's faster","It dispatches correctly to Blueprint implementers as well","It avoids Super","It compiles headers"],a:1,x:"Direct virtual calls would miss BP implementations."},
{q:"C#'s 'obj is IDamageable' becomes…",o:["Cast<IDamageable>","Ptr->Implements<UDamageable>()","dynamic_cast only","IsA<FDamageable>"],a:1,x:"Reflection-aware capability check."}]},
{id:"cpp3c", t:"Delegates: events, evolved", min:7,
body:`<p>C# events are delegates; Unreal reimplements the idea as a small zoo, declared with macros. The two you'll use daily: <strong>DECLARE_DYNAMIC_MULTICAST_DELEGATE_*</strong> — serializable, Blueprint-assignable (this is what an Event Dispatcher is under the hood), bind with <code>AddDynamic(this, &AMyActor::OnThing)</code>; and plain <strong>DECLARE_MULTICAST_DELEGATE_*</strong> — faster, C++-only, binds lambdas and raw methods. "Multicast" = many listeners, broadcast with <code>.Broadcast(args)</code> — precisely <code>event Action&lt;T&gt;</code> + <code>Invoke</code>.</p>
<p>The engine speaks delegate fluently: <code>OnComponentBeginOverlap.AddDynamic(...)</code> replaces Unity's magic-named <code>OnTriggerEnter</code> — instead of the engine finding your method by name, <em>you subscribe explicitly</em>. Same for timers: <code>GetWorldTimerManager().SetTimer(Handle, this, &A::Fn, 2.f, true)</code> ≈ <code>InvokeRepeating</code>, with a handle you can cancel — and it's the standard replacement for simple time-based coroutines.</p>`,
code:`<span class="cm">// declare (usually above the class)</span>
<span class="mc">DECLARE_DYNAMIC_MULTICAST_DELEGATE_OneParam</span>(FOnHealthChanged, <span class="kw">float</span>, NewHealth);

<span class="mc">UPROPERTY</span>(BlueprintAssignable)      <span class="cm">// shows up as an Event Dispatcher</span>
FOnHealthChanged OnHealthChanged;

OnHealthChanged.Broadcast(Health);  <span class="cm">// ≈ OnHealthChanged?.Invoke(health)</span>

<span class="cm">// engine events: subscribe explicitly, no magic names</span>
Trigger->OnComponentBeginOverlap.AddDynamic(<span class="kw">this</span>, &AMyActor::OnOverlap);`,
cmp:[["event Action<float> OnHealthChanged","DECLARE_DYNAMIC_MULTICAST_DELEGATE_OneParam + UPROPERTY(BlueprintAssignable)"],["OnHealthChanged?.Invoke(h)",".Broadcast(h)"],["+= handler","AddDynamic / AddUObject / AddLambda"],["Magic OnTriggerEnter method","Explicit AddDynamic to OnComponentBeginOverlap"],["InvokeRepeating / simple wait-coroutines","TimerManager SetTimer with a handle"]],
task:"Add an OnHealthChanged dynamic multicast delegate to a C++ health component, broadcast it on damage, and bind a Blueprint event to it that updates a Print String 'health bar'.",
quiz:[
{q:"An Event Dispatcher in Blueprint is, in C++ terms,…",o:["A UFUNCTION","A dynamic multicast delegate marked BlueprintAssignable","A timer","An interface"],a:1,x:"Same mechanism, two faces."},
{q:"Unity finds OnTriggerEnter by method name. Unreal instead…",o:["Uses the same magic names","Has you explicitly AddDynamic to the component's overlap delegate","Polls in Tick","Uses SendMessage"],a:1,x:"Explicit subscription — nothing happens unless you bind."},
{q:"Dynamic vs non-dynamic delegates: dynamic ones…",o:["Are faster","Support Blueprint binding & serialization at some speed cost","Can't multicast","Are deprecated"],a:1,x:"Dynamic = reflection-based (BP-friendly); plain = faster C++-only."}]}
]},
{id:"cpp4", t:"Actors & Components in C++", skills:["Explain the Actor lifecycle","Create components in constructors","Replace coroutines with timers/Timelines"], lessons:[
{id:"cpp4a", t:"The Actor lifecycle", min:7,
body:`<p>Unity's ritual order — Awake → OnEnable → Start → Update → OnDestroy — maps to a subtly different pipeline, with one big trap. The pipeline: <strong>Constructor</strong> (runs once for the Class Default Object at engine startup, and per-instance <em>before</em> properties load) → <strong>PostInitializeComponents</strong> (components exist; ≈ late-Awake) → <strong>BeginPlay</strong> (world is live; ≈ Start) → <strong>Tick(DeltaTime)</strong> (≈ Update) → <strong>EndPlay(Reason)</strong> (≈ OnDestroy/OnDisable, with a reason enum: destroyed, level change, PIE ended).</p>
<p>The trap: <em>the constructor is not Awake.</em> Editor-set values aren't loaded yet, the world may not exist, and it also runs for the CDO. Constructor = create default subobjects and set defaults, nothing else. Gameplay setup, GetWorld() calls, spawning, timers → BeginPlay.</p>
<p>The second trap you met in the performance lesson: C++ Actors default to <code>PrimaryActorTick.bCanEverTick = true</code> in generated templates — turn it off unless you truly tick.</p>`,
cmp:[["Awake()","Constructor (CDO caveat) + PostInitializeComponents"],["Start()","BeginPlay()"],["Update()","Tick(float DeltaSeconds)"],["FixedUpdate()","Tick of physics via substepping / async physics tick|no direct twin"],["OnDestroy()","EndPlay(EEndPlayReason)|tells you WHY it's ending"]],
diagTitle:"Actor lifetime pipeline",diag:["Constructor|CDO + instance defaults","PostInitComponents|components ready","BeginPlay|world is live","Tick|per frame (opt-in!)","EndPlay|with a reason"],
task:"Log a message from Constructor, BeginPlay and EndPlay in a C++ Actor; run PIE and observe the constructor firing earlier (and more often) than you'd expect.",
quiz:[
{q:"Editor-edited property values are reliably available in…",o:["The constructor","BeginPlay (and PostInitializeComponents)","Static init","Never"],a:1,x:"The constructor runs before serialized properties are applied."},
{q:"EndPlay improves on OnDestroy by…",o:["Running earlier","Providing the reason (destroyed / level change / quit)","Being optional","Being static"],a:1,x:"Branch cleanup on why the actor is leaving the world."},
{q:"Why must constructors avoid gameplay logic?",o:["Too slow","They run for the CDO and before the world/properties exist","They can't call functions","They're deprecated"],a:1,x:"CDO + pre-load timing makes them defaults-only territory."}]},
{id:"cpp4b", t:"Building Actors: components in C++", min:6,
body:`<p>Assembling an Actor in C++ is what the Blueprint components panel does, in code — and it happens in the constructor with <strong>CreateDefaultSubobject</strong>. Create each component, attach scene components with <code>SetupAttachment</code>, pick a root. These become the inherited components every Blueprint child sees.</p>
<p>Runtime addition exists too (<code>NewObject</code> + <code>RegisterComponent</code>) but is the exception, mirroring how <code>AddComponent</code> at runtime is rarer than prefab-authored components in mature Unity code.</p>`,
code:`AWeapon::AWeapon()
{
    Root = CreateDefaultSubobject<USceneComponent>(TEXT(<span class="st">"Root"</span>));
    SetRootComponent(Root);

    Mesh = CreateDefaultSubobject<UStaticMeshComponent>(TEXT(<span class="st">"Mesh"</span>));
    Mesh->SetupAttachment(Root);          <span class="cm">// ≈ transform.SetParent</span>

    Muzzle = CreateDefaultSubobject<USceneComponent>(TEXT(<span class="st">"Muzzle"</span>));
    Muzzle->SetupAttachment(Mesh);
}`,
cmp:[["Authoring components on a prefab","CreateDefaultSubobject in the constructor"],["transform.SetParent(parent)","SetupAttachment(Parent)|constructor-time"],["AddComponent<T>() at runtime","NewObject<T>() + RegisterComponent()|rarer"],["Attach to bone via code","SetupAttachment(Mesh, TEXT(\"SocketName\"))|sockets ≈ named attach points"]],
task:"Create AWeapon in C++ with root + static mesh + muzzle scene component; make a Blueprint child, assign a mesh asset in the BP, and place it in the level.",
quiz:[
{q:"Default components are created in…",o:["BeginPlay","The constructor via CreateDefaultSubobject","Tick","The Level BP"],a:1,x:"Constructor-created subobjects become the class's default component set."},
{q:"SetupAttachment corresponds to…",o:["Destroy","Parenting a transform under another","Casting","Possession"],a:1,x:"Builds the scene component tree."},
{q:"A socket on a mesh is most like Unity's…",o:["Layer","Named empty child transform on a rig for attachments","Tag","Anchor preset"],a:1,x:"Author attach points on the mesh, attach components/actors to them by FName."}]},
{id:"cpp4c", t:"Coroutines → Timers & Timelines", min:6,
body:`<p>The question every Unity dev asks by day two: <em>where are my coroutines?</em> Standard answer: they don't exist, and most uses decompose into better-named tools. Delay then act → <strong>Timer</strong> (<code>SetTimer</code>, once or looping, cancellable via handle). Animate a value over time → <strong>Timeline</strong> component (Blueprint's curve-driven darling; in C++, an FTimeline or a small lerp in Tick). Wait for a condition → bind to the <strong>delegate</strong> that fires when the condition changes (the event-driven refactor your coroutine was avoiding). Sequenced cinematic logic → the <strong>Sequencer</strong>. Latent multi-frame flow in Blueprints exists natively (Delay nodes are 'coroutines' visually).</p>
<p>Modern escape hatch: UE5 coroutines exist via C++20 in some plugins, but idiomatic Unreal remains timers + events. The mental rewrite: a coroutine was a state machine in disguise; Unreal asks you to name the states.</p>`,
cmp:[["yield return new WaitForSeconds(2)","SetTimer(Handle, this, &A::Fn, 2.f)"],["Value-lerping coroutine","Timeline (curve → update event)"],["yield return null loops (poll)","Bind a delegate; act when the event fires"],["StopCoroutine","ClearTimer(Handle)"],["Cutscene coroutine chains","Sequencer"]],
