<style>
:root{
  --bg:#0A0D14; --panel:#121724; --panel2:#182033; --panel3:#1E2740;
  --line:#232D48; --line2:#2C3A5E;
  --text:#E9EEF7; --muted:#8C96AC; --dim:#5E6880;
  --ue:#4FA8FF; --ue-soft:rgba(79,168,255,.14); --ue-line:rgba(79,168,255,.45);
  --unity:#9DC549; --unity-soft:rgba(157,197,73,.12); --unity-line:rgba(157,197,73,.4);
  --gold:#F3B84B; --gold-soft:rgba(243,184,75,.14);
  --ok:#45D07E; --ok-soft:rgba(69,208,126,.12);
  --bad:#EF6A6A;
  --code-bg:#0C111D;
  --r:10px;
  --disp:'Chakra Petch',sans-serif;
  --body:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-color:#2C3A5E var(--bg)}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.6;min-height:100vh}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--ue);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001s!important;transition-duration:.001s!important}}

/* ===== layout ===== */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.sidebar{background:var(--panel);border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;z-index:40}
.main{min-width:0;display:flex;flex-direction:column}
.content{padding:26px clamp(16px,4vw,44px) 80px;max-width:1060px;width:100%;margin:0 auto}

/* ===== sidebar ===== */
.logo{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.5px;padding:4px 10px 18px;display:flex;align-items:center;gap:9px}
.logo .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--unity) 0%,var(--unity) 42%,var(--ue) 58%,var(--ue) 100%);display:grid;place-items:center;font-size:14px;color:#0A0D14;font-weight:700}
.logo small{display:block;font-family:var(--body);font-weight:400;font-size:10.5px;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase}
.navlabel{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);padding:14px 10px 6px}
.navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:9px 10px;border-radius:8px;font-size:14px;font-weight:500;transition:background .15s,color .15s;position:relative}
.navbtn:hover{background:var(--panel2);color:var(--text)}
.navbtn.active{background:var(--ue-soft);color:var(--ue)}
.navbtn.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--ue)}
.navbtn .ic{width:18px;text-align:center;font-size:15px}
.navbtn .pct{margin-left:auto;font-size:11px;font-family:var(--disp);color:var(--muted)}
.side-foot{margin-top:auto;padding:12px 10px 0;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
.side-foot b{color:var(--gold);font-family:var(--disp)}

/* ===== topbar ===== */
.topbar{display:flex;align-items:center;gap:16px;padding:14px clamp(16px,4vw,44px);border-bottom:1px solid var(--line);background:rgba(10,13,20,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30}
.hamb{display:none;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;width:38px;height:38px;font-size:17px}
.lvlbadge{display:flex;align-items:center;gap:10px}
.lvlnum{width:38px;height:38px;border-radius:9px;background:linear-gradient(160deg,var(--panel3),var(--panel2));border:1px solid var(--ue-line);display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:16px;color:var(--ue)}
.lvlmeta{line-height:1.25}
.lvlmeta .rank{font-family:var(--disp);font-weight:600;font-size:13.5px}
.lvlmeta .xptext{font-size:11px;color:var(--muted)}
.xpwrap{flex:1;max-width:340px}
.xpbar{height:8px;background:var(--panel3);border-radius:99px;overflow:hidden}
.xpbar>div{height:100%;background:linear-gradient(90deg,var(--ue),#8ED0FF);border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.streak{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);padding:7px 13px;border-radius:99px;font-family:var(--disp);font-weight:600;font-size:14px}
.streak.on{border-color:var(--gold);color:var(--gold);box-shadow:0 0 14px rgba(243,184,75,.15)}

/* ===== generic ===== */
h1.page{font-family:var(--disp);font-size:26px;font-weight:700;letter-spacing:.3px;margin-bottom:4px}
.sub{color:var(--muted);margin-bottom:24px;font-size:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.pbar{height:7px;background:var(--panel3);border-radius:99px;overflow:hidden}
.pbar>div{height:100%;background:var(--ue);border-radius:99px;transition:width .5s}
.pbar.gold>div{background:var(--gold)}
.tag{display:inline-block;font-size:10.5px;font-family:var(--disp);font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:99px;border:1px solid var(--line2);color:var(--muted)}
.tag.ue{color:var(--ue);border-color:var(--ue-line);background:var(--ue-soft)}
.tag.gold{color:var(--gold);border-color:rgba(243,184,75,.4);background:var(--gold-soft)}
.tag.ok{color:var(--ok);border-color:rgba(69,208,126,.4);background:var(--ok-soft)}
.btn{background:var(--ue);color:#06121F;border:none;border-radius:8px;padding:10px 18px;font-weight:600;font-size:14px;font-family:var(--disp);letter-spacing:.4px;transition:transform .12s,box-shadow .12s}
.btn:hover{box-shadow:0 4px 18px rgba(79,168,255,.35);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}
.btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line2)}
.btn.ghost:hover{box-shadow:none;border-color:var(--ue-line)}
.crumb{font-size:12.5px;color:var(--muted);margin-bottom:14px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.crumb a{color:var(--ue);text-decoration:none;cursor:pointer}
.crumb a:hover{text-decoration:underline}

/* ===== dashboard hero: the bridge ===== */
.hero{background:linear-gradient(120deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--line);border-radius:14px;padding:28px;position:relative;overflow:hidden;margin-bottom:22px}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 200px at 85% 0%,rgba(79,168,255,.12),transparent)}
.bridge{display:flex;align-items:center;gap:14px;font-family:var(--disp);font-weight:700;font-size:clamp(20px,3.4vw,30px);margin-bottom:8px;position:relative;z-index:1}
.bridge .u{color:var(--unity)}
.bridge .e{color:var(--ue)}
.bridge .arrow{flex:0 0 clamp(46px,7vw,84px);height:3px;background:linear-gradient(90deg,var(--unity),var(--ue));border-radius:99px;position:relative}
.bridge .arrow::after{content:"";position:absolute;right:-2px;top:50%;translate:0 -50%;border-left:9px solid var(--ue);border-top:6px solid transparent;border-bottom:6px solid transparent}
.bridge .arrow::before{content:"";position:absolute;top:-3px;left:0;width:26%;height:9px;border-radius:99px;background:rgba(255,255,255,.35);filter:blur(3px);animation:pulseArrow 2.6s ease-in-out infinite}
@keyframes pulseArrow{0%{left:0;opacity:0}15%{opacity:1}85%{opacity:1}100%{left:74%;opacity:0}}
.hero p{color:var(--muted);max-width:560px;position:relative;z-index:1}
.hero .cta{margin-top:18px;position:relative;z-index:1;display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* path cards */
.pathcard{display:flex;flex-direction:column;gap:12px;transition:border-color .2s,transform .2s;cursor:pointer}
.pathcard:hover{border-color:var(--ue-line);transform:translateY(-2px)}
.pathcard .ph{display:flex;align-items:center;gap:12px}
.pathcard .pico{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:20px;background:var(--ue-soft);border:1px solid var(--ue-line)}
.pathcard h3{font-family:var(--disp);font-size:16.5px}
.pathcard .pmeta{font-size:12px;color:var(--muted)}
.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:22px 0}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:center}
.stat b{display:block;font-family:var(--disp);font-size:24px;color:var(--ue)}
.stat.gold b{color:var(--gold)}.stat.ok b{color:var(--ok)}
.stat span{font-size:11.5px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}

/* ===== chapters / lessons list ===== */
.chapter{margin-bottom:18px}
.chap-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none}
.chap-head .num{font-family:var(--disp);font-weight:700;color:var(--ue);font-size:13px;letter-spacing:1px;min-width:74px}
.chap-head h3{font-family:var(--disp);font-size:16px;flex:1}
.chap-head .chev{transition:transform .25s;color:var(--muted)}
.chapter.open .chev{transform:rotate(90deg)}
.chap-body{display:none;border-top:1px solid var(--line);padding:10px 20px 18px}
.chapter.open .chap-body{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
.lesson-row{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:8px;transition:background .15s}
.lesson-row:hover{background:var(--panel2)}
.lesson-row .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line2);display:grid;place-items:center;font-size:11px;flex:none}
.lesson-row.done .dot{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
.lesson-row .lt{flex:1;font-weight:500;cursor:pointer}
.lesson-row .lt:hover{color:var(--ue)}
.lesson-row.locked{opacity:.45}
.lesson-row.locked .lt{cursor:not-allowed}
.lesson-row .min{font-size:11.5px;color:var(--muted);font-family:var(--disp)}
.chap-lock{font-size:12.5px;color:var(--muted);padding:10px 12px;background:var(--panel2);border-radius:8px;margin-top:8px}
.skillcheck{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px}
.skillcheck h4{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.skillcheck ul{list-style:none;display:flex;flex-wrap:wrap;gap:7px}
.skillcheck li{font-size:12px;padding:4px 11px;border-radius:99px;border:1px solid var(--line2);color:var(--muted)}
.skillcheck li.got{border-color:rgba(69,208,126,.5);color:var(--ok);background:var(--ok-soft)}

/* ===== lesson view ===== */
.lesson-hd{margin-bottom:20px}
.lesson-hd h1{font-family:var(--disp);font-size:24px;margin:6px 0 4px}
.lesson-meta{font-size:12.5px;color:var(--muted);display:flex;gap:14px}
.lesson-body p{margin-bottom:14px;color:#CBD4E4}
.lesson-body strong{color:var(--text)}
.lesson-body code, .gl-def code{font-family:var(--mono);font-size:12.8px;background:var(--code-bg);border:1px solid var(--line);padding:1.5px 6px;border-radius:5px;color:#9CC6FF}
.codeblock{background:var(--code-bg);border:1px solid var(--line);border-left:3px solid var(--ue);border-radius:8px;padding:15px 17px;font-family:var(--mono);font-size:12.8px;line-height:1.65;overflow-x:auto;margin:16px 0;white-space:pre;color:#C4D3EE}
.codeblock .cm{color:#5E7290}.codeblock .kw{color:#7CC4FF}.codeblock .mc{color:#F3B84B}.codeblock .st{color:#8FDB9E}

/* signature: translation strip */
.xlate{margin:18px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.xlate .xh{display:grid;grid-template-columns:1fr 42px 1fr;font-family:var(--disp);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;background:var(--panel2);border-bottom:1px solid var(--line)}
.xlate .xh div{padding:8px 14px}
.xlate .xh .hu{color:var(--unity)}
.xlate .xh .he{color:var(--ue);text-align:right}
.xrow{display:grid;grid-template-columns:1fr 42px 1fr;align-items:center;border-bottom:1px solid var(--line);background:var(--panel)}
.xrow:last-child{border-bottom:none}
.xrow .xu{padding:10px 14px;font-size:13.5px;border-left:3px solid var(--unity-line)}
.xrow .xe{padding:10px 14px;font-size:13.5px;text-align:right;border-right:3px solid var(--ue-line);color:#D7E6F8}
.xrow .xa{color:var(--muted);text-align:center;font-size:14px}
.xrow .xu small,.xrow .xe small{display:block;color:var(--muted);font-size:11.5px}

/* pipeline diagram */
.pipe{display:flex;flex-wrap:wrap;align-items:stretch;gap:0;margin:18px 0;font-family:var(--disp)}
.pipe .pbox{background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:10px 14px;font-size:12.5px;font-weight:600;text-align:center;display:flex;flex-direction:column;justify-content:center;min-width:90px}
.pipe .pbox small{font-family:var(--body);font-weight:400;color:var(--muted);font-size:11px}
.pipe .parr{align-self:center;color:var(--ue);padding:0 9px;font-size:16px}
.diag-title{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-top:16px}

.note{border:1px solid var(--line);border-left:3px solid var(--gold);background:var(--panel);border-radius:8px;padding:12px 16px;margin:16px 0;font-size:13.5px;color:#D8DFEC}
.note b{color:var(--gold)}

/* quiz */
.quiz{margin-top:26px}
.quiz h2,.taskbox h2{font-family:var(--disp);font-size:17px;margin-bottom:12px;display:flex;align-items:center;gap:9px}
.qq{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.qq .qt{font-weight:600;margin-bottom:10px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s;font-size:14px}
.opt:hover{border-color:var(--ue-line)}
.opt.sel{border-color:var(--ue);background:var(--ue-soft)}
.opt.right{border-color:var(--ok);background:var(--ok-soft)}
.opt.wrong{border-color:var(--bad);background:rgba(239,106,106,.1)}
.opt input{margin-top:4px;accent-color:var(--ue)}
.qx{font-size:13px;color:var(--muted);border-top:1px dashed var(--line);margin-top:10px;padding-top:9px;display:none}
.qq.graded .qx{display:block}
.quiz-result{font-family:var(--disp);font-size:15px;margin:14px 0}
.taskbox{margin-top:26px;border:1px solid var(--gold);border-radius:10px;background:linear-gradient(135deg,var(--panel),rgba(243,184,75,.05));padding:18px 20px}
.taskbox p{color:#D8DFEC;margin-bottom:12px}
.taskbox label{display:flex;gap:10px;align-items:center;font-size:14px;cursor:pointer}
.taskbox input{accent-color:var(--gold);width:16px;height:16px}
.lesson-nav{display:flex;justify-content:space-between;margin-top:30px;gap:12px}

/* glossary / translator */
.search{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:11px 15px;font-size:14px;font-family:var(--body);margin-bottom:18px}
.search:focus{outline:none;border-color:var(--ue)}
.gl-item{border-bottom:1px solid var(--line);padding:14px 4px}
.gl-item h3{font-family:var(--disp);font-size:15px;color:var(--ue)}
.gl-item .gl-eq{font-size:12px;color:var(--unity);margin:2px 0 6px}
.gl-def{font-size:13.5px;color:#C3CCDC}
.tr-cat{font-family:var(--disp);font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin:26px 0 10px}

/* achievements */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.ach{display:flex;gap:14px;align-items:center;opacity:.45;filter:grayscale(.8)}
.ach.got{opacity:1;filter:none;border-color:var(--gold)}
.ach .aico{width:46px;height:46px;border-radius:12px;background:var(--gold-soft);border:1px solid rgba(243,184,75,.4);display:grid;place-items:center;font-size:22px;flex:none}
.ach h4{font-family:var(--disp);font-size:14px}
.ach p{font-size:12px;color:var(--muted)}
.ach .axp{margin-left:auto;font-family:var(--disp);color:var(--gold);font-size:12.5px;flex:none}

/* toast */
.toasts{position:fixed;right:22px;bottom:22px;z-index:100;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;gap:13px;align-items:center;background:var(--panel2);border:1px solid var(--gold);border-radius:12px;padding:13px 18px;min-width:280px;box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 24px rgba(243,184,75,.12);animation:toastIn .45s cubic-bezier(.2,.9,.3,1.2)}
.toast.xp{border-color:var(--ue);box-shadow:0 10px 40px rgba(0,0,0,.5)}
.toast .tico{font-size:24px}
.toast h5{font-family:var(--disp);font-size:13px;color:var(--gold);letter-spacing:.8px;text-transform:uppercase}
.toast.xp h5{color:var(--ue)}
.toast p{font-size:13px;color:var(--text)}
.toast.out{animation:toastOut .35s forwards}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
@keyframes toastOut{to{transform:translateX(120%);opacity:0}}

/* level-up overlay */
.lvlup{position:fixed;inset:0;background:rgba(6,9,15,.8);backdrop-filter:blur(4px);display:grid;place-items:center;z-index:110;animation:fadeIn .3s}
.lvlup .box{text-align:center;background:var(--panel2);border:1px solid var(--ue);border-radius:16px;padding:44px 60px;box-shadow:0 0 80px rgba(79,168,255,.25);animation:popIn .5s cubic-bezier(.2,.9,.3,1.3)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.lvlup .big{font-family:var(--disp);font-size:52px;font-weight:700;color:var(--ue);line-height:1}
.lvlup .rk{font-family:var(--disp);font-size:19px;color:var(--gold);margin:8px 0 4px}

/* ===== C++ lab ===== */
.lab-layout{display:grid;grid-template-columns:250px 1fr;gap:16px;align-items:start}
.lab-list{position:sticky;top:82px;padding:10px}
.lab-cat{font-family:var(--disp);font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);padding:10px 8px 4px}
.lab-ex{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:8px 9px;border-radius:8px;font-size:13px;font-weight:500;font-family:var(--body);transition:background .15s,color .15s}
.lab-ex:hover{background:var(--panel2);color:var(--text)}
.lab-ex.active{background:var(--ue-soft);color:var(--ue)}
.lab-ex .ldot{width:16px;height:16px;border-radius:50%;border:2px solid var(--line2);display:grid;place-items:center;font-size:9px;flex:none}
.lab-ex.solved .ldot{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
.lab-prompt{margin-bottom:14px}
.lab-prompt p{color:#CBD4E4;font-size:14px;margin-bottom:8px}
.cm-wrap{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:14px 0}
.cm-wrap .cmhead{display:flex;align-items:center;gap:10px;background:var(--panel2);border-bottom:1px solid var(--line);padding:8px 14px;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.cm-wrap .cmhead .fdot{width:9px;height:9px;border-radius:50%;background:var(--line2)}
.CodeMirror{height:auto;min-height:300px;background:var(--code-bg)!important;color:#C4D3EE!important;font-family:var(--mono)!important;font-size:12.8px;line-height:1.65;padding:6px 0}
.CodeMirror-gutters{background:var(--code-bg)!important;border-right:1px solid var(--line)!important}
.CodeMirror-linenumber{color:#3A4665!important}
.CodeMirror-cursor{border-left:2px solid var(--ue)!important}
.CodeMirror-selected{background:rgba(79,168,255,.16)!important}
.CodeMirror-focused .CodeMirror-selected{background:rgba(79,168,255,.22)!important}
.cm-s-default .cm-keyword{color:#7CC4FF}.cm-s-default .cm-def{color:#E9EEF7}
.cm-s-default .cm-variable{color:#C4D3EE}.cm-s-default .cm-variable-2{color:#C4D3EE}
.cm-s-default .cm-type{color:#6FD3C7}.cm-s-default .cm-builtin{color:#6FD3C7}
.cm-s-default .cm-string{color:#8FDB9E}.cm-s-default .cm-number{color:#F3B84B}
.cm-s-default .cm-comment{color:#5E7290}.cm-s-default .cm-meta{color:#D89BF5}
.cm-s-default .cm-operator{color:#9AB0D8}.cm-s-default .cm-atom{color:#F3B84B}
.lab-fallback{width:100%;min-height:300px;background:var(--code-bg);color:#C4D3EE;border:none;font-family:var(--mono);font-size:12.8px;line-height:1.6;padding:12px 14px;resize:vertical}
.lab-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:4px 0 14px}
.lab-status{font-size:12.5px;font-family:var(--disp);letter-spacing:.4px}
.lab-status.run{color:var(--ue)}.lab-status.pass{color:var(--ok)}.lab-status.fail{color:var(--bad)}
.console{background:#05080F;border:1px solid var(--line);border-radius:10px;font-family:var(--mono);font-size:12.5px;line-height:1.6;padding:13px 16px;min-height:64px;white-space:pre-wrap;word-break:break-word;color:#AFC2E2}
.console .c-ok{color:var(--ok)}.console .c-err{color:#FF9B9B}.console .c-dim{color:#5E7290}.console .c-warn{color:var(--gold)}
.checkline{display:flex;gap:9px;align-items:flex-start;font-size:13px;padding:4px 0}
.checkline .ci{flex:none}
.checkline.ok{color:var(--ok)}.checkline.no{color:var(--muted)}
.lab-hint{margin-top:10px}
.lab-hint summary{cursor:pointer;color:var(--gold);font-size:13px}
.lab-hint p{font-size:13px;color:var(--muted);padding:8px 0 0}
.gl-link{font-family:var(--disp);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ue);text-decoration:none;margin-left:10px;padding:3px 9px;border:1px solid var(--line2);border-radius:20px;vertical-align:2px;transition:background .15s,border-color .15s}
.gl-link:hover{background:var(--ue-soft);border-color:var(--ue)}

/* ===== command palette ===== */
.palbtn{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--muted);padding:8px 12px;font-family:var(--body);font-size:13px;transition:border-color .15s,color .15s}
.palbtn:hover{border-color:var(--ue-line);color:var(--text)}
.palbtn .pk{font-family:var(--mono);font-size:10.5px;border:1px solid var(--line2);border-radius:5px;padding:1px 6px;color:var(--dim)}
.palette{position:fixed;inset:0;background:rgba(4,6,12,.72);backdrop-filter:blur(3px);z-index:140;display:grid;justify-items:center;align-items:start;padding-top:12vh;animation:fadein .12s ease}
.pal-box{width:min(620px,92vw);background:var(--panel);border:1px solid var(--line2);border-radius:14px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.pal-input{width:100%;background:var(--panel2);border:none;border-bottom:1px solid var(--line);color:var(--text);font-family:var(--body);font-size:15px;padding:15px 18px;outline:none}
.pal-list{max-height:52vh;overflow-y:auto;padding:6px}
.pal-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;color:#CBD4E4}
.pal-item .pi{flex:none;width:22px;text-align:center}
.pal-item small{color:var(--dim);margin-left:auto;font-size:11px;white-space:nowrap}
.pal-item.active{background:var(--ue-soft);color:var(--ue)}
.pal-item.active small{color:var(--ue)}
.pal-empty{padding:18px;text-align:center;color:var(--muted);font-size:13px}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* ===== weakness heatmap ===== */
.heat{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.heatchip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:border-color .15s}
.heatchip:hover{border-color:var(--ue-line)}
.heatchip b{font-family:var(--disp);font-size:13px}
.heatchip.h-ok b{color:var(--ok)}.heatchip.h-mid b{color:var(--gold)}.heatchip.h-bad b{color:var(--bad)}

/* ===== lesson notes ===== */
.notesbox{margin-top:22px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:16px 20px}
.notesbox h2{font-family:var(--disp);font-size:15px;margin-bottom:10px}
.notesbox textarea{width:100%;min-height:84px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);font-family:var(--body);font-size:13.5px;line-height:1.6;padding:11px 13px;resize:vertical;outline:none}
.notesbox textarea:focus{border-color:var(--ue-line)}
.notesbox .saved{font-size:11px;color:var(--dim);margin-top:6px;height:14px}

/* ===== capstone ===== */
.cap-phase{margin-bottom:16px}
.cap-phase .cp-head{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.cap-phase .cp-num{font-family:var(--disp);font-size:11px;letter-spacing:1.5px;color:var(--ue);border:1px solid var(--ue-line);border-radius:6px;padding:3px 8px;background:var(--ue-soft)}
.cap-phase.done .cp-num{color:var(--ok);border-color:var(--ok);background:var(--ok-soft)}
.cap-step{display:flex;gap:12px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--line)}
.cap-step:last-child{border-bottom:none}
.cap-step input{margin-top:3px;accent-color:var(--ok);width:16px;height:16px;flex:none}
.cap-step .cs-txt{font-size:13.5px;color:#CBD4E4;line-height:1.55}
.cap-step.done .cs-txt{color:var(--dim);text-decoration:line-through;text-decoration-color:var(--line2)}
.cap-step .cs-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.lesson-chip{font-family:var(--disp);font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--ue);background:var(--ue-soft);border:1px solid var(--ue-line);border-radius:20px;padding:2px 9px;cursor:pointer}
.lesson-chip.locked{color:var(--dim);background:none;border-color:var(--line);cursor:default}

/* ===== dojo ===== */
.dojo-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.dojo-tab{background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--muted);padding:9px 16px;font-family:var(--disp);font-size:12.5px;letter-spacing:.5px;transition:all .15s}
.dojo-tab:hover{border-color:var(--ue-line)}
.dojo-tab.active{background:var(--ue-soft);border-color:var(--ue-line);color:var(--ue)}
.type-prompt{font-size:15px;color:#E9EEF7;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--unity);border-radius:10px;padding:14px 18px;margin-bottom:12px}
.type-input{width:100%;background:var(--code-bg);border:1px solid var(--line);border-radius:10px;color:#C4D3EE;font-family:var(--mono);font-size:14px;padding:13px 16px;outline:none}
.type-input:focus{border-color:var(--ue-line)}
.type-input.good{border-color:var(--ok);background:rgba(69,208,126,.06)}
.type-input.bad{border-color:var(--bad)}
.type-timer{font-family:var(--mono);font-size:12px;color:var(--dim)}
.flash-card{background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:34px 26px;text-align:center;cursor:pointer;min-height:150px;display:grid;place-items:center;transition:border-color .15s}
.flash-card:hover{border-color:var(--ue-line)}
.flash-card .fc-side{font-family:var(--disp);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.flash-card .fc-term{font-size:20px;font-weight:600}
.flash-card.unity .fc-side{color:var(--unity)}.flash-card.ue .fc-side{color:var(--ue)}
.predict-code{background:var(--code-bg);border:1px solid var(--line);border-radius:10px;font-family:var(--mono);font-size:13px;line-height:1.7;padding:16px 18px;white-space:pre;overflow-x:auto;color:#C4D3EE;margin-bottom:14px}
.bpwrap{background:#141821;border:1px solid #2A3142;border-radius:12px;padding:18px;overflow-x:auto;margin-bottom:14px}

/* ===== stats ===== */
.stat-chart{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.stat-chart h3{font-family:var(--disp);font-size:13.5px;margin-bottom:10px}
.cal{display:grid;grid-template-rows:repeat(7,12px);grid-auto-flow:column;gap:3px}
.cal .cd{width:12px;height:12px;border-radius:3px;background:var(--panel3)}
.cal .cd.a1{background:rgba(79,168,255,.30)}.cal .cd.a2{background:rgba(79,168,255,.55)}.cal .cd.a3{background:var(--ue)}
.accbar{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px;color:var(--muted)}
.accbar .ab{flex:1;height:8px;background:var(--panel3);border-radius:6px;overflow:hidden}
.accbar .ab div{height:100%;border-radius:6px}

/* ===== ai tutor ===== */
.tutor{margin-top:14px;background:var(--panel);border:1px solid var(--ue-line);border-radius:12px;padding:15px 18px}
.tutor h3{font-family:var(--disp);font-size:13px;color:var(--ue);margin-bottom:8px}
.tutor p{font-size:13.5px;color:#CBD4E4;line-height:1.65;margin-bottom:8px}
.tutor .thinking{color:var(--muted);font-size:13px;animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.45}}

/* ===== confetti ===== */
.cf{position:fixed;top:-14px;z-index:200;width:9px;height:14px;pointer-events:none;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(105vh) rotate(720deg);opacity:.4}}
.CodeMirror-hints{background:var(--panel2)!important;border:1px solid var(--line2)!important;border-radius:9px!important;box-shadow:0 12px 40px rgba(0,0,0,.55)!important;font-family:var(--mono)!important;font-size:12.5px!important;padding:5px!important;z-index:130!important;max-height:230px!important}
.CodeMirror-hint{color:#C4D3EE!important;padding:4px 12px!important;border-radius:6px!important}
li.CodeMirror-hint-active{background:var(--ue-soft)!important;color:var(--ue)!important}
@media (max-width:1020px){.lab-layout{grid-template-columns:1fr}.lab-list{position:static;display:flex;flex-wrap:wrap;gap:4px}.lab-cat{width:100%}}

/* responsive */
@media (max-width:880px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:250px;transform:translateX(-105%);transition:transform .28s;box-shadow:10px 0 40px rgba(0,0,0,.5)}
  .sidebar.open{transform:none}
  .hamb{display:block}
  .grid3,.grid2{grid-template-columns:1fr}
  .statrow{grid-template-columns:repeat(2,1fr)}
  .xrow,.xlate .xh{grid-template-columns:1fr 30px 1fr}
  .lvlmeta .rank{display:none}
  .xpwrap{max-width:none}
}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35;display:none}
.scrim.on{display:block}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="logo"><span class="mark">⇄</span><span>BRIDGE<small>Unity → Unreal</small></span></div>
    <div class="navlabel">Overview</div>
    <button class="navbtn" data-view="dash"><span class="ic">◈</span>Dashboard</button>
    <div class="navlabel">Learning paths</div>

{id:"ue1a", t:"Editor & project anatomy", min:6,
body:`<p>Unreal's editor is your Unity editor with the furniture rearranged and a few extra rooms. The <strong>Viewport</strong> is the Scene view, the <strong>Outliner</strong> is the Hierarchy, the <strong>Details panel</strong> is the Inspector, and the <strong>Content Browser</strong> is the Project window. Two habits change immediately: navigation is right-mouse + WASD by default (like Unity's flythrough, but it is the primary mode), and there is no persistent "Game view" tab — you press <strong>Play In Editor (PIE)</strong> and the viewport becomes the game.</p>
<p>On disk, a project is also familiar but stricter: <code>Content/</code> is your Assets folder, and every asset is a binary <code>.uasset</code> — no loose <code>.meta</code> files, but also no meaningful text diffs for assets. <code>Config/</code> holds INI files (roughly ProjectSettings), and <code>Source/</code> appears only once you add C++. <code>Saved/</code> and <code>Intermediate/</code> are disposable, like Unity's Library.</p>
<p>One conceptual shift: Unreal separates <strong>Editor preferences</strong> (per-user) from <strong>Project Settings</strong> (shipped with the game) very explicitly, and almost everything you'd find in Unity's Project Settings lives under <em>Edit → Project Settings</em>, backed by those INI files.</p>`,

{id:"ue1b", t:"Actors vs GameObjects", min:7,
body:`<p>Here is the single most important mapping of the whole course: a Unity <strong>GameObject</strong> is an empty container that gains behaviour purely through components. An Unreal <strong>Actor</strong> is a real class with inheritance. In Unity you compose a player from GameObject + components; in Unreal you often <em>subclass</em>: <code>AActor → APawn → ACharacter</code>, each level adding built-in behaviour, and then add components on top.</p>
<p>So Unreal is <strong>inheritance-first, composition-second</strong>, while Unity is composition-only. An Actor without components isn't even visible — its transform actually comes from a <strong>Root Component</strong> (a <code>USceneComponent</code>). That's the second surprise: in Unity the Transform lives on the GameObject; in Unreal the transform lives on the root component, and other scene components attach <em>under it</em> in a tree inside a single Actor.</p>
<p>Practical consequence: where a Unity prefab is often a hierarchy of several GameObjects, an Unreal "thing" is usually <em>one Actor</em> containing a component tree. Reserve child Actors for genuinely independent objects.</p>`,
cmp:[["GameObject|empty container","AActor|a class you can subclass"],["Transform on the GameObject","Transform on the Root Component"],["Child GameObjects","Attached Scene Components|inside one Actor"],["gameObject.SetActive(false)","Actor hidden + collision/tick disabled|no single exact switch"],["Destroy(gameObject)","Actor->Destroy()"]],

{q:"The biggest philosophical difference between Actors and GameObjects is…",o:["Actors can't have components","Unreal favours inheritance; you subclass Actor types","Actors have no transform","GameObjects are faster"],a:1,x:"Unreal ships a deep, useful Actor hierarchy (Pawn, Character, etc.) and expects you to subclass it; components complement it."},
{q:"Where does an Actor's transform live?",o:["On the Actor itself","On its Root Component","In the Level","On the GameMode"],a:1,x:"The root USceneComponent carries the transform; the Actor delegates to it."},
{q:"A lamp made of a base mesh, a bulb mesh and a light should usually be…",o:["Three Actors parented together","One Actor with a component tree","A Level per lamp","A GameMode"],a:1,x:"One Actor, multiple attached components — the Unreal idiom for what would be a multi-GameObject prefab in Unity."}]},
{id:"ue1c", t:"Components, the Unreal way", min:6,
body:`<p>Unreal components come in two families. <strong>USceneComponent</strong> has a transform and can attach to other scene components (meshes, cameras, colliders, audio). <strong>UActorComponent</strong> is transform-less pure behaviour — the closest thing to a plain Unity <code>MonoBehaviour</code> doing logic (health, inventory).</p>
<p>The mental shift: in Unity, <em>everything</em> is a component and scripts are components too. In Unreal, gameplay logic usually goes <em>on the Actor class itself</em> (Blueprint graph or C++), and components are used for reusable capabilities. You won't write a "PlayerMovement component" — you'll subclass <code>ACharacter</code>, which already owns a <code>UCharacterMovementComponent</code>.</p>
<p>Getting components also feels familiar: <code>GetComponentByClass</code> ≈ <code>GetComponent&lt;T&gt;()</code>. But because logic lives on Actors, you'll reach for it far less than in Unity.</p>`,

{q:"Where does typical gameplay logic live in Unreal?",o:["Always in components","On the Actor class (BP or C++)","In the Level Blueprint only","In GameInstance"],a:1,x:"Actors are real classes, so their logic lives on them; components are for reusable capabilities."},

{id:"ue1d", t:"Levels, Maps & the Level Blueprint", min:6,
body:`<p>A Unity Scene is an Unreal <strong>Level</strong> (asset type <code>.umap</code>). Loading works similarly (<code>Open Level</code> ≈ <code>SceneManager.LoadScene</code>), and additive loading exists as <strong>Level Streaming</strong> / streaming sublevels — Unreal has done "additive scenes" natively for decades.</p>
<p>Each Level owns a <strong>Level Blueprint</strong>: a script graph bound to that specific map. It's the sanctioned home for one-off scripted moments ("when the player enters this trigger, open that exact door"). Unity has no direct equivalent — you'd create a scene-specific manager GameObject. Keep reusable logic <em>out</em> of it; anything generic belongs in Actor Blueprints or C++.</p>
<p>Also note <strong>World Settings</strong>: a per-level panel that picks the GameMode and other rules — think of it as a scene-scoped slice of Unity's Project Settings. It matters as soon as we hit the Gameplay Framework in Chapter 2.</p>`,

{id:"ue2", t:"The Gameplay Framework", skills:["Choose Pawn vs Character","Use PlayerController correctly","Pick the right class: GameMode vs GameState vs PlayerState","Explain possession"], lessons:[
{id:"ue2a", t:"Pawns & Characters", min:7,
body:`<p>Unity has no opinion about what a "player" is — you build one from a GameObject, a CharacterController and your own script. Unreal ships the opinion: a <strong>Pawn</strong> is any Actor that can be <em>possessed</em> by a Controller (player or AI), and a <strong>Character</strong> is a Pawn specialised for humanoids: capsule collider, skeletal mesh and the mighty <code>UCharacterMovementComponent</code> with walking, falling, swimming, crouching and — crucially — <strong>network prediction</strong> built in.</p>
<p>Rule of thumb: humanoid on legs → subclass <code>ACharacter</code>. Vehicle, turret, drone, chess piece → subclass <code>APawn</code> and supply your own movement (e.g. <code>FloatingPawnMovement</code>). Rewriting CharacterMovement from scratch is the classic newcomer mistake — it's years of engineering, especially for multiplayer.</p>
<p><strong>Possession</strong> is the concept Unity lacks entirely: a Controller can possess and unpossess Pawns at runtime. Switching from human to vehicle isn't "disable one script, enable another" — the PlayerController simply possesses the car Pawn.</p>`,
cmp:[["Player GameObject + CharacterController + your script","ACharacter|capsule + mesh + CharacterMovementComponent"],["Custom vehicle rig","APawn + a movement component"],["Enabling/disabling player scripts to switch control","Controller possession|Possess() / UnPossess()"],["CharacterController.Move","CharacterMovement: AddMovementInput|handles physics states + net prediction"]],
task:"In PIE, press F8 to eject from your possessed pawn and fly freely, then repossess. You just experienced possession first-hand.",
quiz:[
{q:"When should you subclass APawn instead of ACharacter?",o:["Never","For non-humanoid controllables like vehicles or turrets","For NPCs only","When you need a camera"],a:1,x:"Character = humanoid locomotion package. Anything else controllable = Pawn."},
{q:"What does 'possession' mean?",o:["Spawning a Pawn","A Controller taking control of a Pawn","Attaching a camera","Loading a level"],a:1,x:"Controllers possess Pawns; swapping bodies at runtime is a one-node/one-call operation."},
{q:"The strongest reason to keep UCharacterMovementComponent is…",o:["It's required by the editor","Built-in movement modes plus network prediction","It renders the mesh","It's faster than physics"],a:1,x:"Replicated, predicted movement is enormously hard to write; the component gives it to you free."}]},
{id:"ue2b", t:"PlayerController: the brain outside the body", min:6,
body:`<p>In Unity, input and camera logic usually live on the player object itself. Unreal splits identity from body: the <strong>PlayerController</strong> is the persistent "will" of the player, and the Pawn is a disposable body. The Controller survives when the Pawn dies or changes — respawning means spawning a new Pawn and possessing it, without losing input bindings, camera management or UI references.</p>
<p>What belongs where: <em>Pawn/Character</em> → how the body moves and reacts. <em>PlayerController</em> → input routing (it owns the Enhanced Input subsystem), camera management (<code>PlayerCameraManager</code>), HUD/UI, mouse cursor, and anything that should outlive a body. AI has the same split — <code>AIController</code> possesses Pawns just like players do, so an enemy body can be driven by AI or by a player without changes.</p>`,
cmp:[["Input code on the player MonoBehaviour","Input bound on PlayerController (or Pawn)|Controller is the canonical home"],["Camera script on player","PlayerCameraManager via PlayerController"],["Respawn: re-instantiate prefab, rewire references","Spawn new Pawn → Possess()|Controller state persists"],["NavMeshAgent + AI script","AIController possessing the same Pawn class"]],
